<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Period Students</title>
<link rel="stylesheet" href="style.css">

<style>
.main-content {
margin-left:220px;
padding:20px;
}

.student-card {
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
font-size:14px;
}
</style>
</head>

<body class="dashboard-page">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("teacher-sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h2>Assigned Students (This Period)</h2>
<button id="attendBtn" onclick="joinClass()" disabled style="
background:gray;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:15px;
">
⏳ Available 10 min before
</button>
<button onclick="endClass()" style="
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
">
⛔ End Class
</button>
<div id="assignedContainer"></div>
<!-- ✅ PASTE HERE -->
<h3>Class Attendance</h3>

<table id="attendanceTable" style="
width:100%;
border-collapse:collapse;
background:#fff;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
">

<thead style="background:#f1f1f1;">
<tr>
    <th>Date</th>
<th style="padding:10px;">Student</th>
<th>Student Status</th>
<th>Late Join</th>
<th>Teacher Status</th>
<th>Teacher Late</th>
<th>Compensation (mins)</th>
</tr>
</thead>

<tbody id="attendanceBody"></tbody>

</table>
</div>

<script>

const token = localStorage.getItem("token");
let attendanceMarked = false; 
/* GET URL PARAMS */
const params = new URLSearchParams(window.location.search);

/* CLEAN PARAMS */
const cleanedParams = new URLSearchParams();

cleanedParams.append("className", params.get("className")?.trim());
cleanedParams.append("day", params.get("day")?.trim());
cleanedParams.append("startTime", params.get("startTime")?.trim());

const subject = params.get("subject");
const language = params.get("language");
const eca = params.get("eca");

if(subject){
cleanedParams.append("subject", subject.trim());
}

if(language){
cleanedParams.append("language", language.trim());
}

if(eca){
cleanedParams.append("eca", eca.trim());
}

/* LOAD STUDENTS */
async function loadPeriodStudents(){
console.log("TOKEN:", token);
try{
console.log("API URL:", cleanedParams.toString());
const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/teacher/period-students?" + cleanedParams.toString(),
{
headers:{
"Authorization":"Bearer " + token
}
}
);

const data = await res.json();
console.log("Response:", data);
const container = document.getElementById("assignedContainer");
container.innerHTML = "";

/* NO DATA */
if(!data.data || data.data.length === 0){
container.innerHTML = "<p>No students found ❌</p>";
return;
}

/* DISPLAY */
data.data.forEach(d=>{

let label =
d.subject ||
(d.languages?.join(", ")) ||
(d.eca?.join(", ")) ||
"General";

container.innerHTML += `
<div class="student-card">
<b>👤 ${d.student.name}</b><br>
📘 ${label}
</div>
`;

});
renderAttendanceTable(data.data);
updateTeacherStatus(); 
}catch(err){

console.log("FULL ERROR:", err);   // ✅ better debug

document.getElementById("assignedContainer").innerHTML =
"<p style='color:red;'>API ERROR - Check Console</p>";

}

}


window.onload = function(){
loadPeriodStudents();
checkClassTime(); 

};

/* 🔥 TIME CONTROL FUNCTION */
function checkClassTime(){

const params = new URLSearchParams(window.location.search);
const startTime = params.get("startTime");

if(!startTime) return;

const now = new Date();

const [hour, minute] = startTime.split(":");

const classTime = new Date();
classTime.setHours(parseInt(hour));
classTime.setMinutes(parseInt(minute));
classTime.setSeconds(0);

// 10 minutes before
const enableTime = new Date(classTime.getTime() - 10 * 60000);

const btn = document.getElementById("attendBtn");

if(now >= enableTime){
btn.disabled = false;
btn.style.background = "#28a745";
btn.innerText = "🎥 Attend Class";
}else{
btn.disabled = true;
btn.style.background = "gray";
btn.innerText = "⏳ Available 10 min before";
}

}
function updateTeacherStatus(){

const params = new URLSearchParams(window.location.search);
const startTime = params.get("startTime");

if(!startTime) return;

const now = new Date();

const [hour, minute] = startTime.split(":");

const classStart = new Date();
classStart.setHours(parseInt(hour));
classStart.setMinutes(parseInt(minute));
classStart.setSeconds(0);

// class end = +1 hour
const endTime = params.get("endTime");

if(!endTime) return;  // safety

const [endHour, endMinute] = endTime.split(":");

const classEnd = new Date();
classEnd.setHours(parseInt(endHour));
classEnd.setMinutes(parseInt(endMinute));
classEnd.setSeconds(0);

const teacherStatusElements = document.querySelectorAll("[id^='teacher-status-']");

teacherStatusElements.forEach(el => {

// BEFORE CLASS
// BEFORE CLASS
if(now < classStart){
el.innerHTML = "<span style='color:gray;'>Class yet to start</span>";
}

// DURING CLASS (NOT JOINED)
else if(now >= classStart && now <= classEnd){

if(el.innerText !== "Present"){
el.innerHTML = "<span style='color:orange;'>Teacher not yet came</span>";
}

}

// AFTER CLASS (NOT CLICKED)
else if(now > classEnd){

if(!attendanceMarked && el.innerText !== "Present" && el.innerText !== "Absent"){

el.innerHTML = "<span style='color:red;'>Absent</span>";

/* ✅ SAVE ABSENT IN DB */
fetch("https://academy-backend-eatl.onrender.com/api/teacher/attendance",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId: localStorage.getItem("teacherId"),
teacherName: localStorage.getItem("teacherName"),
className: params.get("className"),
subject: params.get("subject") || "General",
day: params.get("day"),
startTime: params.get("startTime"),
date: new Date().toISOString(),
joinTime: null,
endTime: null,
status: "Absent"
})
});

// ✅ ADD THIS LINE HERE (OUTSIDE fetch)
attendanceMarked = true;

}

}

});

}
/* RUN EVERY 10 SECONDS */
setInterval(() => {
checkClassTime();
updateTeacherStatus();
}, 10000);
function renderAttendanceTable(students){

const tbody = document.getElementById("attendanceBody");
tbody.innerHTML = "";

students.forEach(s => {

const today = new Date().toLocaleDateString("en-IN");

tbody.innerHTML += `
<tr>

<td>${today}</td>

<td style="padding:10px;">${s.student.name}</td>

<td id="status-${s.student._id}">
<span style="color:gray;">Pending</span>
</td>

<td id="late-${s.student._id}">0</td>

<td id="teacher-status-${s.student._id}">
<span style="color:gray;">Class yet to start</span>
</td>

<td>0</td>

<td>0</td>

</tr>
`;

});

}
async function joinClass(){
console.log("Attendance Marked ✅");
const params = new URLSearchParams(window.location.search);
const startTime = params.get("startTime");

const now = new Date();
const [hour, minute] = startTime.split(":");

const classStart = new Date();
classStart.setHours(parseInt(hour));
classStart.setMinutes(parseInt(minute));
classStart.setSeconds(0);

if(now < classStart){
alert("Class not started yet ❌");
return;
}

/* ✅ SET PRESENT */
document.querySelectorAll("[id^='teacher-status-']").forEach(el=>{
el.innerHTML = "<span style='color:green;'>Present</span>";
});

const className = params.get("className");
const day = params.get("day");

const subject =
params.get("subject") ||
params.get("language") ||
params.get("eca") ||
"General";

const token = localStorage.getItem("token");
const teacherId = localStorage.getItem("teacherId");

/* API */
try{
await fetch("https://academy-backend-eatl.onrender.com/api/teacher/attendance",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId,
className,
subject,
day,
startTime,   
date: new Date().toISOString(),

joinTime: new Date().toISOString(),  
endTime: null,                        

status: "Present"
})
});

console.log("Attendance Marked ✅");

}catch(err){
console.log("Attendance Error ❌", err);
}

/* MEETING */
let roomName = "academy-" + className + "-" + day + "-" + startTime;

roomName = roomName.replace(/\s+/g, "").replace(/[^a-zA-Z0-9\-]/g,"");

window.open("https://meet.jit.si/" + roomName, "_blank");
attendanceMarked = true;
}
async function endClass(){

const params = new URLSearchParams(window.location.search);

const token = localStorage.getItem("token");

await fetch("https://academy-backend-eatl.onrender.com/api/teacher/end-attendance",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId: localStorage.getItem("teacherId"),
className: params.get("className"),
day: params.get("day"),
startTime: params.get("startTime"),
endTime: new Date().toISOString()
})
});

alert("Class Ended ✅");

}

async function testSaveAttendance(){

const params = new URLSearchParams(window.location.search);

await fetch("https://academy-backend-eatl.onrender.com/api/teacher/attendance",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId: localStorage.getItem("teacherId"),
teacherName: localStorage.getItem("teacherName"),
className: params.get("className"),
subject: params.get("subject") || "General",
day: params.get("day"),
startTime: params.get("startTime"),
date: new Date().toISOString(),
joinTime: null,
endTime: null,
status: "Absent"
})
});

alert("Saved in DB ✅");

}
</script>

</body>
</html>
