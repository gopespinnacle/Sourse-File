<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Compensation</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="dashboard-page">

<!-- ✅ SIDEBAR CONTAINER -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML = data;
});
</script>

<!-- ✅ MAIN CONTENT -->
<div class="main-content">

<h2>Teacher Compensation Classes</h2>

<table border="1">

<thead>
<tr>
<th>Teacher</th>
<th>Class</th>
<th>Subject</th>
<th>Late Minutes</th>
<th>Compensation Required</th>
</tr>
</thead>

<tbody id="compTable"></tbody>

</table>

</div>

<script>

async function loadCompensation(){

const token = localStorage.getItem("token");

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/founder/compensations",
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const table = document.getElementById("compTable");

table.innerHTML="";

data.sessions.forEach(s=>{
table.innerHTML += `
<tr>
<td>${s.teacher.name}</td>
<td>${s.className}</td>
<td>${s.subject}</td>
<td>${s.lateMinutes}</td>
<td>${s.compensationMinutes}</td>
</tr>
`;
});

}

loadCompensation();

</script>

</body>
</html>
