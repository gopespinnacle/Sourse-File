<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Students</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    body {
    margin:0;
}
.main-content {
    margin-left:240px;
    padding:20px;
    width: calc(100% - 240px);   /* 🔥 VERY IMPORTANT */
}

.student-card {
    background:#fff;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.student-name {
    font-size:16px;
    font-weight:bold;
}

.tag {
    display:inline-block;
    background:#eef;
    padding:4px 8px;
    border-radius:6px;
    margin:3px;
    font-size:12px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("teacher-sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h2>My Students</h2>

<div id="studentsContainer"></div>

</div>

<script>

const token = localStorage.getItem("token");

async function loadStudents(){

try{

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/all-period-assignments",
{
headers:{
"Authorization":"Bearer " + token
}
}
);

const data = await res.json();

const container = document.getElementById("studentsContainer");
container.innerHTML = "";

/* 🔥 GROUP BY STUDENT */
let studentMap = {};

data.data.forEach(item=>{

item.students.forEach(st=>{

if(!studentMap[st._id]){
studentMap[st._id] = {
name: st.name,
classes: []
};
}

studentMap[st._id].classes.push({
className: item.className,
subject: item.subject,
day: item.day,
time: item.startTime + " - " + item.endTime
});

});

});

/* DISPLAY */
Object.values(studentMap).forEach(student=>{

let classHTML = "";

student.classes.forEach(c=>{
classHTML += `
<div>
<span class="tag">📘 ${c.subject || "General"}</span>
<span class="tag">🏫 ${c.className}</span>
<span class="tag">📅 ${c.day}</span>
<span class="tag">⏰ ${c.time}</span>
</div>
`;
});

container.innerHTML += `
<div class="student-card">
<div class="student-name">👤 ${student.name}</div>
${classHTML}
</div>
`;

});

}catch(err){

console.log(err);

document.getElementById("studentsContainer").innerHTML =
"<p>Error loading students</p>";

}

}

loadStudents();
</script>

<!-- ✅ ADD HERE -->
<script>
function go(page){
    window.location.href = page;
}

function logout(){
    localStorage.clear();
    window.location.href = "teacher-login.html";
}
</script>
</script>

</body>
</html>
