<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Whiteboard</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
}

.toolbar {
    background:#1e293b;
    padding:10px;
    display:flex;
    gap:10px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.teacher-tools {
    display:none;
}

canvas {
    background:white;
    display:block;
}
</style>
</head>

<body>

<div class="toolbar">
    <div class="teacher-tools" id="teacherTools">
        <button onclick="clearBoard()">🧹 Clear</button>
    </div>

    <button onclick="leaveClass()">🚪 Leave</button>
</div>

<canvas id="board"></canvas>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

/* ================= CANVAS ================= */

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

let drawing = false;

/* ================= ROLE ================= */

if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* ================= SOCKET JOIN ================= */

socket.emit("joinRoom", room);

/* ================= DRAW ================= */

canvas.addEventListener("mousedown", (e) => {

    if(role !== "teacher") return;

    drawing = true;
    draw(e);
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
});

canvas.addEventListener("mousemove", draw);

function draw(e){

    if(!drawing || role !== "teacher") return;

    const x = e.clientX;
    const y = e.clientY;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    ctx.lineTo(x,y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x,y);

    socket.emit("draw", {
        room,
        x,
        y
    });
}

/* ================= RECEIVE DRAW ================= */

socket.on("draw", (data) => {

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    ctx.lineTo(data.x, data.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(data.x, data.y);
});

/* ================= CLEAR ================= */

function clearBoard(){

    if(role !== "teacher") return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    socket.emit("clear", room);
}

socket.on("clear", () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
});

/* ================= LEAVE ================= */

function leaveClass(){
    window.close();
}

</script>

</body>
</html>
