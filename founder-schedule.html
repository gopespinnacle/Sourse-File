<script>

let teachers=[];
let allSchedules=[];
const periods = [
{ name:"P1", start:"08:00", end:"08:40" },
{ name:"P2", start:"09:00", end:"09:40" },
{ name:"P3", start:"10:00", end:"10:40" },
{ name:"P4", start:"11:00", end:"11:40" },
{ name:"P5", start:"12:00", end:"12:40" },
{ name:"P6", start:"15:50", end:"16:50" },
{ name:"P7", start:"18:00", end:"19:00" }
];
async function loadTeachers(){

const token = localStorage.getItem("token");

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/teachers",{

headers:{ "Authorization":"Bearer "+token }

});

const data = await res.json();

if(!data.teachers){
alert("Unable to load teachers");
return;
}

teachers = data.teachers;

const select = document.getElementById("teacher");
const gridSelect = document.getElementById("gridTeacher");

select.innerHTML = "";

teachers.forEach(t=>{

select.innerHTML += `<option value="${t._id}">${t.name}</option>`;

gridSelect.innerHTML += `<option value="${t._id}">${t.name}</option>`;

});
if (teachers.length > 0) {
    loadTeacherOptions();
}
select.addEventListener("change", loadTeacherOptions);
}
function convertToMinutes(time){

    // normalize
    time = time.trim();

    // handle AM/PM
    if (time.includes("AM") || time.includes("PM")) {
        let [t, modifier] = time.split(" ");
        let [h, m] = t.split(":").map(Number);

        if (modifier === "PM" && h !== 12) h += 12;
        if (modifier === "AM" && h === 12) h = 0;

        return h * 60 + m;
    }

    // handle 24h
    let [h, m] = time.split(":").map(Number);
    return h * 60 + m;
}
async function addSchedule(){

const teacherId = document.getElementById("teacher").value;
const day = document.getElementById("day").value;
const className = document.getElementById("className").value;
const subjectValue = document.getElementById("subject").value;
const ecaValue = document.getElementById("eca").value;
const languageValue = document.getElementById("language").value;

// ❗ check at least one selected
if (!subjectValue && !ecaValue && !languageValue) {
    alert("Select at least one: Subject / ECA / Language");
    return;
}

// ✅ ONLY ONE VARIABLE SET
let subject = "";
let eca = "";
let language = "";

if (languageValue !== "") {
    language = languageValue;
} else if (ecaValue !== "") {
    eca = ecaValue;
} else if (subjectValue !== "") {
    subject = subjectValue;
}
const startTime = document.getElementById("startTime").value;
const endTime = document.getElementById("endTime").value;

// ✅ STRICT VALIDATION
if (!startTime || !endTime) {
    alert("Enter time");
    return;
}

if (startTime >= endTime) {
    alert("End time must be after start time");
    return;
}

// ✅ CLASH CHECK
// 🔥 NEW BACKEND CLASH CHECK
const token = localStorage.getItem("token");

const clashRes = await fetch("https://academy-backend-eatl.onrender.com/api/founder/check-clash", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
        teacher: teacherId,
        day,
        startTime,
        endTime
    })
});

const clashData = await clashRes.json();

if (clashData.clash) {
    document.getElementById("clashWarning").style.display = "block";
    document.getElementById("clashWarning").innerText = clashData.message;
    return;
}

document.getElementById("clashWarning").style.display = "none";
const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/add-schedule",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
teacher: teacherId,
day,
className,
subject: subject || "",
eca: eca || "",
language: language || "",
startTime,
endTime
})

});

const data = await res.json();

if(!res.ok){
    document.getElementById("clashWarning").style.display = "block";
    document.getElementById("clashWarning").innerText = data.message || "Error";
    return;
}

document.getElementById("clashWarning").style.display = "none";

alert("✅ Schedule Added Successfully");

loadSchedules();

}
function convertTo12Hour(time){

let [hours, minutes] = time.split(":");

hours = parseInt(hours);

let ampm = hours >= 12 ? "PM" : "AM";

hours = hours % 12;

hours = hours ? hours : 12;

return hours.toString().padStart(2,'0') + ":" + minutes + " " + ampm;

}
async function loadSchedules(){

const token = localStorage.getItem("token");

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/schedules",{

headers:{ "Authorization":"Bearer "+token }

});

const data = await res.json();

if(!data.schedules){
console.log("No schedules found");
return;
}

const tbody = document.querySelector("#scheduleTable tbody");

tbody.innerHTML="";

data.schedules.forEach(s=>{

tbody.innerHTML += `
<tr>
<td>${s.teacher ? s.teacher.name : "Unknown"}</td>
<td>${s.day}</td>
<td>${s.className}</td>

<td>${s.subject || "-"}</td>
<td>${s.eca || "-"}</td>
<td>${s.language || "-"}</td>

<td>${convertTo12Hour(s.startTime)}</td>
<td>${convertTo12Hour(s.endTime)}</td>

<td>
<button onclick="editSchedule('${s._id}')">Edit</button>
<button onclick="deleteSchedule('${s._id}')">Delete</button>
</td>
</tr>
`;
});
allSchedules = data.schedules || [];

buildGrid(allSchedules);
}

loadTeachers();

setTimeout(checkTimeClashLive, 500);

function buildGrid(schedules){

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

// SORT
schedules.sort((a, b) => a.startTime.localeCompare(b.startTime));

// HOURS
const hours = [...new Set(
    schedules.map(s => `${s.startTime}-${s.endTime}`)
)];

// ✅ FIRST define
const thead = document.querySelector("#gridTable thead tr");
const tbody = document.querySelector("#gridTable tbody");

// ✅ THEN use
thead.innerHTML = "<th>Day</th>";

hours.forEach(hour => {
    thead.innerHTML += `<th>${hour}</th>`;
});

tbody.innerHTML = "";

days.forEach(day=>{

let row = `<tr><td><b>${day}</b></td>`;

hours.forEach(hour=>{

const found = schedules.find(s => {
return s.day === day && `${s.startTime}-${s.endTime}` === hour;
});

if(found){

row += `<td>
<div class="class-block ${(found.subject || found.eca || found.language || "general").toLowerCase()}">
${found.className}<br>
${found.subject || found.eca || found.language}<br>
${convertTo12Hour(found.startTime)} - ${convertTo12Hour(found.endTime)}
</div>
</td>`;

}else{

row += `<td></td>`;

}

});

row += "</tr>";

tbody.innerHTML += row;

});

}
function filterGrid(){

const teacherId = document.getElementById("gridTeacher").value;

if(teacherId === "all"){
buildGrid(allSchedules);
return;
}

const filtered = allSchedules.filter(s => s.teacher && s.teacher._id === teacherId);

buildGrid(filtered);

}
async function deleteSchedule(id){

const token = localStorage.getItem("token");

if(!confirm("Delete this schedule?")) return;

await fetch("https://academy-backend-eatl.onrender.com/api/founder/delete-schedule/" + id,{
method:"DELETE",
headers:{
"Authorization":"Bearer " + token
}
});

alert("Schedule deleted");

location.reload();

}


let currentEditId = null;

function editSchedule(id){

    const schedule = allSchedules.find(s => s._id === id);
    if(!schedule) return;

    currentEditId = id;

    // basic values
    document.getElementById("editDay").value = schedule.day;
    document.getElementById("editClass").value = schedule.className;
    document.getElementById("editStart").value = schedule.startTime;
    document.getElementById("editEnd").value = schedule.endTime;

    // 🔥 get teacher data
    const teacher = teachers.find(t => t._id === schedule.teacher._id);

    // SUBJECT dropdown
    const sub = document.getElementById("editSubject");
    sub.innerHTML = '<option value="">Select Subject</option>';
    (teacher.subject || []).forEach(s=>{
        sub.innerHTML += `<option value="${s}">${s}</option>`;
    });

    // ECA dropdown
    const eca = document.getElementById("editEca");
    eca.innerHTML = '<option value="">Select ECA</option>';
    (teacher.eca || []).forEach(e=>{
        eca.innerHTML += `<option value="${e}">${e}</option>`;
    });

    // LANGUAGE dropdown
    const lang = document.getElementById("editLanguage");
    lang.innerHTML = '<option value="">Select Language</option>';
    (teacher.language || []).forEach(l=>{
        lang.innerHTML += `<option value="${l}">${l}</option>`;
    });

    // set selected value
    document.getElementById("editSubject").value = schedule.subject || "";
    document.getElementById("editEca").value = schedule.eca || "";
    document.getElementById("editLanguage").value = schedule.language || "";

    document.getElementById("schedulePopup").style.display = "flex";
}

function downloadPDF(){

    const element = document.getElementById("pdfContent");

    const opt = {
        margin: 5,
        filename: 'timetable.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    };

    setTimeout(() => {
        html2pdf().set(opt).from(element).save();
    }, 500); // wait for render
}
async function checkTimeClashLive() {

    const teacherId = document.getElementById("teacher").value;
    const day = document.getElementById("day").value;

    const startTime = document.getElementById("startTime").value;
    const endTime = document.getElementById("endTime").value;

    const warningBox = document.getElementById("clashWarning");

    // ❌ if empty → hide
    if (!startTime || !endTime) {
        warningBox.style.display = "none";
        return;
    }

    try {
const token = localStorage.getItem("token");

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/check-clash", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
        teacher: teacherId,
        day,
        startTime,
        endTime
    })
});

        const data = await res.json();

        if (data.clash) {
            warningBox.style.display = "block";
            warningBox.innerText = "⚠ " + data.message;
        } else {
            warningBox.style.display = "none";
        }

    } catch (err) {
        console.log("Live clash error:", err);
    }
}
function suggestNextSlot() {

    const teacherId = document.getElementById("teacher").value;
    const day = document.getElementById("day").value;

    const schedules = allSchedules
        .filter(s => s.teacher && s.teacher._id === teacherId && s.day === day)
        .sort((a,b)=> a.endTime.localeCompare(b.endTime));

    if (schedules.length === 0) return;

    const last = schedules[schedules.length - 1];

    let [h,m] = last.endTime.split(":").map(Number);

    // 🔥 ADD BUFFER
    m += 10;

    if(m >= 60){
        h += 1;
        m -= 60;
    }

    const start =
        String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");

    document.getElementById("startTime").value = start;

    // 🔥 ADD DEFAULT CLASS DURATION (40 min)
    m += 40;

    if(m >= 60){
        h += 1;
        m -= 60;
    }

    const end =
        String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");

    document.getElementById("endTime").value = end;
}
