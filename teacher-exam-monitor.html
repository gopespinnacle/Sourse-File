<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Monitoring</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.safe{
color:green;
font-weight:bold;
}

.warning{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Live Exam Monitoring</h2>

<table>

<thead>
<tr>
<th>Student</th>
<th>Tab Switch</th>
<th>Status</th>
</tr>
</thead>

<tbody id="monitorTable"></tbody>

</table>

<script>

const params = new URLSearchParams(window.location.search);
const assessmentId = params.get("assessmentId");

const token = localStorage.getItem("token");

async function loadMonitor(){

const res = await fetch(
"http://academy-backend-jpup.onrender.com/api/auth/teacher/exam-monitor/"+assessmentId,
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const tbody = document.getElementById("monitorTable");

tbody.innerHTML="";

data.activities.forEach(a=>{

let status = "Safe";
let className = "safe";

if(a.tabSwitch >=3){
status = "Warning";
className = "warning";
}

tbody.innerHTML += `
<tr>
<td>${a.student.name}</td>
<td>${a.tabSwitch}</td>
<td class="${className}">${status}</td>
</tr>
`;

});

}

loadMonitor();

setInterval(loadMonitor,3000);

</script>

</body>
</html>
