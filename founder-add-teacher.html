<!DOCTYPE html>
<html>
<head>
    <title>Add Teacher</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
font-family: Arial, sans-serif;
background:#f4f7fb;
}

        .form-container{
            background:white;
            max-width:600px;
            margin:auto;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            color:#123a63;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#123a63;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:#0f2f4f;
        }
        .tag-container{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.tag{
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:14px;
}

.tag.active{
background:#123a63;
color:white;
}
    </style>
</head>
<body class="dashboard-page">

<div id="sidebar-container"></div>
<script>

fetch("sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data;

highlightMenu();

});

function highlightMenu(){

const currentPage = window.location.pathname.split("/").pop();

const items = document.querySelectorAll(".sidebar li");

items.forEach(item => {

if(item.getAttribute("data-page") === currentPage){

item.classList.add("active-menu");

}

});

}

function navigate(page){
window.location.href = page;
}

</script>
<div class="main-content">
<div class="form-container">

<h2>Add Teacher</h2>

<form id="teacherForm">

    <input type="text" id="name" placeholder="Teacher Name" required>

    <input type="email" id="email" placeholder="Email" required>

    <input type="password" id="password" placeholder="Password" required>

    <label>Select Subjects</label>
<div id="subjects" class="tag-container"></div>

<label>Select ECA</label>
<div id="eca" class="tag-container"></div>

<label>Select Languages</label>
<div id="languages" class="tag-container"></div>

    <input type="number" id="salaryMonth" placeholder="Salary / Month"><br><br>



<input type="number" id="sessionsWeek" placeholder="Sessions Per Week"><br><br>

<input type="number" id="salarySession" placeholder="Salary / Session">
<button type="button" onclick="resetSalary()" style="margin-bottom:15px;background:#888;">
Reset Salary Fields
</button>

    <input type="text" id="mobile" placeholder="Mobile Number">

    <input type="text" id="whatsapp" placeholder="WhatsApp Number">

    <input type="number" id="experience" placeholder="Experience (Years)">

  

 

    <button type="button" onclick="submitTeacher()">Create Teacher</button>

</form>

</div>
</div>

<script>

const weeks = 4;

// MONTH → SESSION
document.getElementById("salaryMonth").addEventListener("input", function(){

    const salaryMonth = Number(document.getElementById("salaryMonth").value);
    const sessionsWeek = Number(document.getElementById("sessionsWeek").value);

    if(!salaryMonth || !sessionsWeek) return;

    const sessionsMonth = sessionsWeek * weeks;

    const salarySession = salaryMonth / sessionsMonth;

    document.getElementById("salarySession").value = Math.round(salarySession);

});

// SESSION → MONTH
document.getElementById("salarySession").addEventListener("input", function(){

    const salarySession = Number(document.getElementById("salarySession").value);
    const sessionsWeek = Number(document.getElementById("sessionsWeek").value);

    if(!salarySession || !sessionsWeek) return;

    const sessionsMonth = sessionsWeek * weeks;

    const salaryMonth = salarySession * sessionsMonth;

    document.getElementById("salaryMonth").value = Math.round(salaryMonth);

});

// Recalculate when sessions/week changes
document.getElementById("sessionsWeek").addEventListener("input", function(){

    const salaryMonth = Number(document.getElementById("salaryMonth").value);
    const salarySession = Number(document.getElementById("salarySession").value);
    const sessionsWeek = Number(document.getElementById("sessionsWeek").value);

    if(!sessionsWeek) return;

    const sessionsMonth = sessionsWeek * weeks;

    if(salaryMonth){
        document.getElementById("salarySession").value = Math.round(salaryMonth / sessionsMonth);
    }

    if(salarySession){
        document.getElementById("salaryMonth").value = Math.round(salarySession * sessionsMonth);
    }

});

</script>
<script>

function resetSalary(){

    document.getElementById("salaryMonth").value = "";
    document.getElementById("sessionsWeek").value = "";
    document.getElementById("salarySession").value = "";

}
async function loadSubjects(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/categories/subject");
const data = await res.json();

const container = document.getElementById("subjects");
container.innerHTML = "";

data.data.forEach(s => {
container.innerHTML += `
<div class="tag" onclick="toggleTag(this)">
${s.name}
</div>
`;
});

}
async function loadCategory(type, elementId){

const res = await fetch(`https://academy-backend-eatl.onrender.com/api/founder/categories/${type}`);
const data = await res.json();

const container = document.getElementById(elementId);
container.innerHTML = "";

data.data.forEach(s => {
container.innerHTML += `
<div class="tag" onclick="toggleTag(this)">
${s.name}
</div>
`;
});

}
loadSubjects();
loadCategory("eca","eca");
loadCategory("language","languages");
function toggleTag(el){
    el.classList.toggle("active");
}
function submitTeacher(){

    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login as Founder");
        window.location.href = "founder-login.html";
        return;
    }

    let selectedSubjects = [];
    document.querySelectorAll('#subjects .tag.active').forEach(tag=>{
        selectedSubjects.push(tag.innerText);
    });

    let selectedECA = [];
    document.querySelectorAll('#eca .tag.active').forEach(tag=>{
        selectedECA.push(tag.innerText);
    });

    let selectedLanguages = [];
    document.querySelectorAll('#languages .tag.active').forEach(tag=>{
        selectedLanguages.push(tag.innerText);
    });

    console.log("Subjects:", selectedSubjects);
    console.log("ECA:", selectedECA);
    console.log("Language:", selectedLanguages);

    fetch("https://academy-backend-eatl.onrender.com/api/founder/add-teacher", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name: document.getElementById("name").value.trim(),
            role: "teacher",
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,

            subject: selectedSubjects,
            eca: selectedECA,
            language: selectedLanguages,

            mobile: document.getElementById("mobile").value,
            whatsapp: document.getElementById("whatsapp").value,
           experience: Number(document.getElementById("experience").value) || 0,
salaryMonth: Number(document.getElementById("salaryMonth").value) || 0,
sessionsWeek: Number(document.getElementById("sessionsWeek").value) || 0,
salarySession: Number(document.getElementById("salarySession").value) || 0
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.message){
            alert(data.message);
            window.location.href = "founder-teachers.html";
        }else{
            alert("Error creating teacher");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Server error");
    });
}
</script>
</body>
</html>
