<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Categories</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}

.main-content{
margin-left:240px;
padding:40px;
display:flex;
justify-content:center;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:750px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#123a63;
margin-bottom:20px;
}

.input-row{
display:flex;
gap:10px;
}

input{
padding:12px;
flex:1;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#123a63;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.tab-btn{
background:#e6ecf5;
color:#123a63;
margin:5px;
padding:10px 16px;
border-radius:20px;
border:none;
cursor:pointer;
font-weight:500;
transition:0.2s;
}
button:hover{
background:#0f2f4f;
}
.tab-btn.active{
background:#123a63;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#123a63;
color:white;
}

td,th{
padding:12px;
text-align:center;
border:1px solid #ddd;
}

.action-btn{
padding:6px 10px;
margin:2px;
border-radius:5px;
font-size:12px;
border:none;
color:white;
}

.edit{
background:#28a745;
}

.delete{
background:#dc3545;
}
.sidebar{
width:220px;
height:100vh;
background:#123a63;
color:white;
position:fixed;
left:0;
top:0;
padding:20px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:10px;
cursor:pointer;
border-radius:6px;
}

.sidebar li:hover{
background:#0f2f4f;
}

.sidebar li.active-menu{
background:#0f2f4f;
}
</style>
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>

<div class="main-content">

<div class="container">

<!-- SWITCH BUTTONS -->
<div style="text-align:center;margin-bottom:15px;">
<button class="tab-btn active" onclick="switchType('subject',this)">Subjects</button>
<button class="tab-btn" onclick="switchType('eca',this)">ECA</button>
<button class="tab-btn" onclick="switchType('language',this)">Languages</button>
</div>

<h2 id="title">Manage Subjects</h2>

<div class="input-row">
<input id="subjectName" placeholder="Enter Name">
<button onclick="addCategory()">Add</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="subjectTable"></tbody>

</table>

</div>

</div>

<script>

// LOAD SIDEBAR
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});

// TYPE CONTROL
let TYPE = "subject";

// SWITCH TAB
function switchType(type,btn){

TYPE = type;

// update title
document.getElementById("title").innerText =
type === "subject" ? "Manage Subjects" :
type === "eca" ? "Manage ECA" :
"Manage Languages";

// highlight active button
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

// reload data
loadCategories();

}

// LOAD DATA
async function loadCategories(){

const res = await fetch(`https://academy-backend-eatl.onrender.com/api/founder/categories/${TYPE}`);

let data;

try {
    data = await res.json();
} catch (error) {
    console.log("❌ API not working");
    return;
}

const table = document.getElementById("subjectTable");

table.innerHTML="";

data.data.forEach(s=>{

table.innerHTML += `
<tr>
<td id="name-${s._id}">${s.name}</td>

<td>
<button class="action-btn edit" onclick="editCategory('${s._id}', this)">Edit</button>
<button class="action-btn delete" onclick="deleteCategory('${s._id}')">Delete</button>
</td>
</tr>
`;

});

}

// ADD
async function addCategory(){

const name = document.getElementById("subjectName").value;

await fetch("https://academy-backend-eatl.onrender.com/api/founder/add-category",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
type: TYPE
})
});

document.getElementById("subjectName").value="";

loadCategories();

}

// EDIT
function editCategory(id,btn){

const td = document.getElementById("name-"+id);
const current = td.innerText;

td.innerHTML = `<input id="edit-${id}" value="${current}">`;

btn.innerText = "Save";

btn.onclick = function(){
saveCategory(id);
};

}

// SAVE
async function saveCategory(id){

const newName = document.getElementById("edit-"+id).value;

await fetch(`https://academy-backend-eatl.onrender.com/api/founder/category/${id}`,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name:newName})
});

loadCategories();

}

// DELETE
async function deleteCategory(id){

await fetch(`https://academy-backend-eatl.onrender.com/api/founder/category/${id}`,{
method:"DELETE"
});

loadCategories();

}

// INITIAL LOAD
loadCategories();

</script>

</body>
</html>
