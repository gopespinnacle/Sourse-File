<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Results</title>
</head>

<body>

<h2>My Results</h2>

<table border="1" width="100%" cellpadding="10">
    <thead>
        <tr>
            <th>Assessment</th>
            <th>Subject</th>
            <th>Total Marks</th>
            <th>Marks Obtained</th>
            <th>Percentage</th>
        </tr>
    </thead>
    <tbody id="resultsTable"></tbody>
</table>

<script>

async function loadResults() {

    const response = await fetch("https://academy-backend-eatl.onrender.com/api/auth/student/results", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();

    const table = document.getElementById("resultsTable");

    data.results.forEach(r => {

        const percentage = ((r.marksObtained / r.assessmentId.totalMarks) * 100).toFixed(2);

        const row = `
        <tr>
            <td>${r.assessmentId.title}</td>
            <td>${r.assessmentId.subject}</td>
            <td>${r.assessmentId.totalMarks}</td>
            <td>${r.marksObtained}</td>
            <td>${percentage}%</td>
        </tr>
        `;

        table.innerHTML += row;
    });

}

loadResults();

</script>

</body>
</html>
