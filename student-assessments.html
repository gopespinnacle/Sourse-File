<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Student Assessments</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
background:#1a8f3a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>My Assessments</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Subject</th>
<th>Question Paper</th>
<th>Upload Answer</th>
</tr>
</thead>

<tbody id="assessmentTable"></tbody>

</table>

<script>

const token = localStorage.getItem("token");

async function loadAssessments(){

const res = await fetch(
"http://academy-backend-jpup.onrender.com/api/auth/student/assessments",
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const table = document.getElementById("assessmentTable");

table.innerHTML="";

data.assessments.forEach(a=>{

table.innerHTML += `

<tr>

<td>${a.title}</td>

<td>${a.subject}</td>

<td>
<a href="http://academy-backend-jpup.onrender.com/uploads/${a.questionPaper}" target="_blank">
View PDF
</a>
</td>

<td>

<input type="file" id="file-${a._id}">

<button onclick="uploadAnswer('${a._id}')">
Upload
</button>

</td>

</tr>

`;

});

}

loadAssessments();


async function uploadAnswer(assessmentId){

const fileInput = document.getElementById("file-"+assessmentId);

const formData = new FormData();

formData.append("assessmentId",assessmentId);
formData.append("answer",fileInput.files[0]);

await fetch(
"http://academy-backend-jpup.onrender.com/api/auth/student/upload-answer",
{
method:"POST",
headers:{
"Authorization":"Bearer "+token
},
body:formData
});

alert("Answer uploaded");

}

</script>

</body>
</html>
