<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Whiteboard</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
}

.toolbar {
    background:#1e293b;
    padding:10px;
    display:flex;
    gap:10px;

    position:relative;
    z-index:1000;   /* 🔥 ADD THIS */
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.teacher-tools {
    display:none;
}

canvas {
    display:block;
}

#board {
    background:white;
}

#drawLayer {
    background:transparent;   /* 🔥 IMPORTANT */
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="setTool('pen')">✏️ Pen</button>
<input type="color" id="colorPicker" value="#000000">
<button onclick="setTool('eraser')">🧽 Eraser</button>
    <div class="teacher-tools" id="teacherTools">
        <button onclick="clearBoard()">🧹 Clear</button>
    </div>

    <button onclick="leaveClass()">🚪 Leave</button>
</div>
<input type="file" id="fileInput">

<div id="pdfTab" style="
    display:none;
    position:absolute;
    top:60px;
    left:10px;
    background:#1e293b;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
">
    📄 PDF
</div>
<div id="pdfWindow" style="
    position:absolute;
    top:60px;
    left:60px;
    width:80%;
    height:80%;
    background:white;
    border:2px solid black;
    display:none;
    overflow:auto;
    z-index:10;
">

    <!-- HEADER -->
    <div style="
        height:40px;
        background:#1e293b;
        display:flex;
        justify-content:flex-end;
        align-items:center;
        gap:10px;
        padding:5px;
    ">
        <button onclick="minimizePDF()">🗕</button>
        <button onclick="maximizePDF()">🗖</button>
        <button onclick="closePDF()">❌</button>
    </div>

    <!-- CANVAS -->
    <canvas id="board"></canvas>
    <canvas id="drawLayer" style="
    position:absolute;
    top:0;
    left:0;
    z-index:50;
"></canvas>

</div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const drawCanvas = document.getElementById("drawLayer");
const dctx = drawCanvas.getContext("2d");

// match size
drawCanvas.width = canvas.width;
drawCanvas.height = canvas.height;

// ✅ allow scroll by default
drawCanvas.style.pointerEvents = "none";


canvas.width = canvas.parentElement.clientWidth;
canvas.height = canvas.parentElement.clientHeight - 40;
let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";
let currentColor = "#000000";
document.getElementById("colorPicker").addEventListener("input", (e) => {
    currentColor = e.target.value;
});

function setTool(tool){
    currentTool = tool;

    if(tool === "pen"){
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/pen.png') 2 30, auto";
        drawCanvas.style.pointerEvents = "auto";   // draw ON
    }
    else if(tool === "eraser"){
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/eraser.png') 10 10, auto";
        drawCanvas.style.pointerEvents = "auto";   // draw ON
    }
    else{
        drawCanvas.style.pointerEvents = "none";   // scroll ON
    }
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);

/* DRAW START */
drawCanvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

   

    prevX = e.clientX - rect.left;
    prevY = e.clientY - rect.top;

     drawing = true;

    // ✅ VERY IMPORTANT (reset path)
    dctx.beginPath();
dctx.moveTo(prevX, prevY);
});
drawCanvas.addEventListener("mouseleave", () => {
    drawing = false;
});
/* DRAW END */
drawCanvas.addEventListener("mouseup", () => {
    drawing = false;
});

/* DRAW MOVE */
drawCanvas.addEventListener("mousemove", (e) => {

    if(!drawing || role !== "teacher") return;

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    drawLine(prevX, prevY, x, y, currentTool,currentColor);

    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool,
         color: currentColor 
    });

    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool, color){

    dctx.beginPath();
    dctx.moveTo(x1, y1);
    dctx.lineTo(x2, y2);

    dctx.lineCap = "round";

    if(tool === "eraser"){
        dctx.globalCompositeOperation = "destination-out";
        dctx.lineWidth = 20;
    } else {
        dctx.globalCompositeOperation = "source-over";
        dctx.strokeStyle = color || "black";
        dctx.lineWidth = 2;
    }

    dctx.stroke();
}

/* RECEIVE DRAW */
socket.on("draw", (data) => {
    drawLine(data.prevX, data.prevY, data.x, data.y, data.tool,data.color);
});
socket.on("loadBoard", (dataArray) => {

    dataArray.forEach(d => {
        drawLine(d.prevX, d.prevY, d.x, d.y, d.tool,d.color);
    });

});
/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    socket.emit("clear", room);
}

socket.on("clear", () => {
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
});

/* LEAVE */
function leaveClass(){
    window.close();
}

// ================= FILE UPLOAD =================
document.getElementById("fileInput").addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://academy-backend-eatl.onrender.com/upload-file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
console.log("UPLOAD RESPONSE:", data);
    // 🔥 send to students
    socket.emit("loadPDF", {
    room,
    url: data.url
});
loadPDFToCanvas(data.url);



});

// ================= DISPLAY FILE =================
    
// ✅ DRAW LAYER ABOVE PDF

// ================= RECEIVE =================


socket.on("loadPDF", (data) => {
    loadPDFToCanvas(data.url);
});

async function loadPDFToCanvas(url){

    document.getElementById("pdfWindow").style.display = "block";
    document.getElementById("pdfTab").style.display = "none";

    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;

    const container = document.getElementById("pdfWindow");

    // 🔥 REMOVE OLD PAGES
    const oldCanvases = container.querySelectorAll("canvas.pdfPage");
    oldCanvases.forEach(c => c.remove());

    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.2 });

        const pageCanvas = document.createElement("canvas");
        pageCanvas.className = "pdfPage";

        pageCanvas.width = viewport.width;
        pageCanvas.height = viewport.height;

        const pageCtx = pageCanvas.getContext("2d");

        await page.render({
            canvasContext: pageCtx,
            viewport: viewport
        }).promise;

        container.appendChild(pageCanvas);
    }
    drawCanvas.width = container.scrollWidth;
drawCanvas.height = container.scrollHeight;
}
function minimizePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "block";
}

function maximizePDF(){
    const win = document.getElementById("pdfWindow");

    win.style.top = "60px";   // 🔥 keep below toolbar
    win.style.left = "0";
    win.style.width = "100%";
    win.style.height = "calc(100% - 60px)";  // 🔥 reduce height
}

function closePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "none";

    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

document.getElementById("pdfTab").onclick = function(){
    document.getElementById("pdfWindow").style.display = "block";
    document.getElementById("pdfTab").style.display = "none";
};

</script>

</body>
</html>
