<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assign Students</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h1>Assign Students to Teacher</h1>

<label>Select Teacher</label>
<select id="teacherSelect" onchange="loadTimetable()"></select>

<h3>Teacher Timetable</h3>

<div id="timetableContainer"></div>

</div>

<script>
function formatTime(time){

let [hour, minute] = time.split(":");

hour = parseInt(hour);

let ampm = hour >= 12 ? "PM" : "AM";

hour = hour % 12;
hour = hour ? hour : 12;

return hour.toString().padStart(2,'0') + ":" + minute + " " + ampm;

}
let teachers=[]

async function loadData(){

const token = localStorage.getItem("token");

/* LOAD TEACHERS */

const tRes = await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/teachers",
{
headers:{ "Authorization":"Bearer "+token }
});

const tData = await tRes.json();

teachers = tData.teachers;

const teacherSelect = document.getElementById("teacherSelect");

teacherSelect.innerHTML = "";

teachers.forEach(t=>{
teacherSelect.innerHTML +=
`<option value="${t._id}">${t.name}</option>`;
});

/* LOAD TIMETABLE AFTER TEACHER LOAD */
loadTimetable();

}
async function loadTimetable(){

const token = localStorage.getItem("token");

const teacherId = document.getElementById("teacherSelect").value;

if(!teacherId){
alert("Select teacher");
return;
}

const res = await fetch(
`https://academy-backend-eatl.onrender.com/api/founder/teacher-schedule/${teacherId}`,
{
headers:{ "Authorization":"Bearer "+token }
});

const data = await res.json();
console.log(data);

const container = document.getElementById("timetableContainer");
container.innerHTML = "";

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

days.forEach(day=>{

let row = `<div style="margin-top:20px"><h4>${day}</h4>`;

(data.schedule || data)
.filter(s => s.day === day)
.forEach(s=>{

row += `
<div onclick="openPeriod('${day}','${s.className}','${s.subject || s.eca || s.language}','${s.startTime}','${s.endTime}')"
style="
display:inline-block;
background:#4CAF50;
color:white;
padding:10px;
margin:5px;
border-radius:8px;
cursor:pointer;
">

${s.className}<br>
${s.subject || s.eca || s.language}<br>
${formatTime(s.startTime)} - ${formatTime(s.endTime)}

</div>
`;

});

row += `</div>`;
container.innerHTML += row;

});

}
loadData();
function openPeriod(day, className, subject, startTime, endTime){

const teacherId = document.getElementById("teacherSelect").value;

/* SAVE ALL DATA */
localStorage.setItem("selectedTeacher", teacherId);
localStorage.setItem("selectedClass", className);
localStorage.setItem("selectedSubject", subject);
localStorage.setItem("startTime", startTime);
localStorage.setItem("endTime", endTime);
localStorage.setItem("selectedDay", day);

/* ✅ FIXED DAY */
localStorage.setItem("selectedDay", day);

window.location.href = "assign-period-students.html";

}
</script>

</body>
</html>
