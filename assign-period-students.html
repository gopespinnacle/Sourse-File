<!DOCTYPE html>
<html>
<head>
    <style>
.student-card{
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.student-header{
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.student-name{
    font-size: 18px;
    font-weight: bold;
    color: #123a63;
}

.section{
    margin-top: 10px;
}

.section-title{
    font-size: 14px;
    font-weight: bold;
}

.option-group{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.option{
    padding: 6px 12px;
    border-radius: 20px;
    background: #eee;
    cursor: pointer;
}

.option input{
    display: none;
}

.option.active{
    background: #123a63;
    color: white;
}

.option{
    padding: 6px 12px;
    border-radius: 20px;
    background: #eee;
    cursor: pointer;
    user-select: none;   /* ADD THIS */
}
</style>
<meta charset="UTF-8">
<title>Assign Students</title>

<!-- ✅ ADD THIS -->
<link rel="stylesheet" href="style.css">

</head>

<body class="dashboard-page">

<!-- ✅ SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});


document.addEventListener("click", function(e){

const option = e.target.closest(".option");

if(option){

    const checkbox = option.querySelector("input");

    // toggle checkbox
    checkbox.checked = !checkbox.checked;

    // update UI
    if(checkbox.checked){
        option.classList.add("active");
    }else{
        option.classList.remove("active");
    }

}

});
</script>

<!-- ✅ MAIN CONTENT WRAPPER -->
<div class="main-content">

<h2 id="title"></h2>

<div id="studentList"></div>

<br>
<button onclick="save()">Assign</button>
<h3>Assigned Students</h3>
<div id="assignedContainer"></div>

</div>

<script>
const ALL_SUBJECTS = ["Maths","Science","English"];
const ALL_LANGUAGES = ["English","Tamil"];
const ALL_ECA = ["Drawing","Dance","Music"];
const token = localStorage.getItem("token");

const className = localStorage.getItem("selectedClass");
const subject = localStorage.getItem("selectedSubject");

document.getElementById("title").innerText =
className + " - " + subject;

/* LOAD ALL STUDENTS */
async function loadStudents(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/students",
{
headers:{ "Authorization":"Bearer "+token }
}
);

const data = await res.json();

const container = document.getElementById("studentList");
container.innerHTML = "";

/* LOOP STUDENTS */

data.students.forEach(s=>{

container.innerHTML += `
<div class="student-card">

<div class="student-header">
    <div class="student-name">${s.name}</div>
    <input type="checkbox" class="studentCheck" value="${s._id}">
</div>

<div class="section">
    <div class="section-title">Subjects</div>
    <div class="option-group">
        ${(s.subject || []).map(sub => `
        <label class="option">
            <input type="checkbox" class="subject" value="${sub}">
            ${sub}
        </label>
        `).join("")}
    </div>
</div>

<div class="section">
    <div class="section-title">Language</div>
    <div class="option-group">
        ${(s.language || []).map(l => `
        <label class="option">
            <input type="checkbox" class="language" value="${l}">
            ${l}
        </label>
        `).join("")}
    </div>
</div>

<div class="section">
    <div class="section-title">ECA</div>
    <div class="option-group">
        ${(s.eca || []).map(e => `
        <label class="option">
            <input type="checkbox" class="eca" value="${e}">
            ${e}
        </label>
        `).join("")}
    </div>
</div>

</div>
`;

});

}

window.onload = async function(){

await loadStudents();
await loadAssignedStudents();

};

// (REMOVED - handled inside loadAssignedStudents)

/* SAVE */
async function save(){

const teacherId = localStorage.getItem("selectedTeacher");
const className = localStorage.getItem("selectedClass");
const subject = localStorage.getItem("selectedSubject");
const startTime = localStorage.getItem("startTime");
const endTime = localStorage.getItem("endTime");
const day = localStorage.getItem("selectedDay");

console.log("CHECK DATA:", {
teacherId,
className,
subject,
day,
startTime,
endTime
});
const selected = [];

document.querySelectorAll(".studentCheck:checked").forEach(cb=>{

const parent = cb.closest(".student-card");

const getSelected = (cls) => {
return Array.from(parent.querySelectorAll("."+cls+":checked"))
.map(x => x.value);
};

selected.push({
studentId: cb.value,
studentName: parent.querySelector(".student-name").innerText,  // ✅ ADD THIS
subjects: getSelected("subject"),
languages: getSelected("language"),
eca: getSelected("eca")
});

});

if(selected.length === 0){
alert("Select at least one student");
return;
}

/* 🔥 SEND TO BACKEND */

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/assign-period",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId,
className,
subject,
day,
startTime,
endTime,
assignments: selected
})
}
);

const data = await res.json();

if(!data.assignments){
console.log("No assignments found", data);
return;
}

console.log(data);

if(res.ok){
    displayAssigned(selected);
alert("Saved PER PERIOD ✅🔥");
}else{
alert("Error saving");
}

}
function displayAssigned(data){

const container = document.getElementById("assignedContainer");
container.innerHTML = "";

data.forEach((s, index) => {

const subjectOptions = ALL_SUBJECTS.map(sub => `
<label>
<input type="checkbox" value="${sub}" 
${s.subjects.includes(sub) ? "checked":""}>
${sub}
</label>
`).join("");

const languageOptions = ALL_LANGUAGES.map(l => `
<label>
<input type="checkbox" value="${l}" 
${s.languages.includes(l) ? "checked":""}>
${l}
</label>
`).join("");

const ecaOptions = ALL_ECA.map(e => `
<label>
<input type="checkbox" value="${e}" 
${s.eca.includes(e) ? "checked":""}>
${e}
</label>
`).join("");

container.innerHTML += `

<div style="
border:1px solid #2e7d32;
padding:15px;
margin:10px;
border-radius:12px;
background:#f1f8f4;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
">

<div style="font-size:16px; font-weight:bold; color:#123a63;">
👤 ${s.studentName}
</div>

<div style="margin-top:10px; font-size:14px;">

🏫 Class: ${localStorage.getItem("selectedClass")}<br>
📘 Subject: ${localStorage.getItem("selectedSubject")}<br>
📅 Day: ${localStorage.getItem("selectedDay")}<br>
⏰ Time: ${localStorage.getItem("startTime")} - ${localStorage.getItem("endTime")}

</div>

<div style="margin-top:10px; font-size:14px;">

📚 Subjects: ${s.subjects.join(", ") || "-"}<br>
🗣 Languages: ${s.languages.join(", ") || "-"}<br>
🎯 ECA: ${s.eca.join(", ") || "-"}

</div>

<br>

<button onclick="editStudent(${index})">Edit</button>
<button onclick="saveEdit(${index})">Save</button>
<button onclick="deleteStudent(${index})">Delete</button>

</div>
`;
});

window.assignedData = data;

}
function editStudent(index){

const student = assignedData[index];

const container = document.getElementById("assignedContainer");

const divs = container.children;

const card = divs[index];

card.innerHTML = `

<div id="edit-${index}">

<div><b>👤 ${student.studentName}</b></div>

<br>

<div>📚 Subjects:</div>
${ALL_SUBJECTS.map(sub => `
<label>
<input type="checkbox" value="${sub}" 
${student.subjects.includes(sub) ? "checked":""}>
${sub}
</label>
`).join("")}

<br><br>

<div>🗣 Languages:</div>
${ALL_LANGUAGES.map(l => `
<label>
<input type="checkbox" value="${l}" 
${student.languages.includes(l) ? "checked":""}>
${l}
</label>
`).join("")}

<br><br>

<div>🎯 ECA:</div>
${ALL_ECA.map(e => `
<label>
<input type="checkbox" value="${e}" 
${student.eca.includes(e) ? "checked":""}>
${e}
</label>
`).join("")}

<br><br>

<button onclick="saveEdit(${index})">Save</button>
<button onclick="displayAssigned(assignedData)">Cancel</button>

</div>
`;

}
async function saveEdit(index){

const editDiv = document.getElementById("edit-"+index);

if(!editDiv){
alert("Edit not opened properly");
return;
}

const getChecked = (nameList) => {
return Array.from(editDiv.querySelectorAll("input:checked"))
.map(x => x.value)
.filter(v => nameList.includes(v));
};

assignedData[index].subjects = getChecked(ALL_SUBJECTS);
assignedData[index].languages = getChecked(ALL_LANGUAGES);
assignedData[index].eca = getChecked(ALL_ECA);

/* SAVE TO DB */

await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/assign-period",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId: localStorage.getItem("selectedTeacher"),
className: localStorage.getItem("selectedClass"),
subject: localStorage.getItem("selectedSubject"),
day: localStorage.getItem("selectedDay"),
startTime: localStorage.getItem("startTime"),
endTime: localStorage.getItem("endTime"),
assignments: assignedData
})
}
);

alert("Updated ✅");

/* BACK TO VIEW MODE */
displayAssigned(assignedData);
}
async function loadAssignedStudents(){

const teacherId = localStorage.getItem("selectedTeacher");
if(!teacherId){
console.log("No period selected");
return;
}
const className = localStorage.getItem("selectedClass");
const subject = localStorage.getItem("selectedSubject");
const day = localStorage.getItem("selectedDay");
const startTime = localStorage.getItem("startTime");

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/get-period-assignments",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId,
className,
subject,
day,
startTime
})
}
);

const data = await res.json();

/* CONVERT DB → UI FORMAT */

const formatted = (data.assignments || []).map(a => {

const studentCard = document.querySelector(
`.studentCheck[value="${a.student}"]`
)?.closest(".student-card");

const name = studentCard?.querySelector(".student-name")?.innerText;

return {
    studentId: a.student,
    studentName: name || "Unknown",
    subjects: a.subjects || [],
    languages: a.languages || [],
    eca: a.eca || []
};

});

displayAssigned(formatted);

}

async function deleteStudent(index){

const teacherId = localStorage.getItem("selectedTeacher");
const className = localStorage.getItem("selectedClass");
const subject = localStorage.getItem("selectedSubject");
const day = localStorage.getItem("selectedDay");
const startTime = localStorage.getItem("startTime");

/* REMOVE FROM ARRAY */
assignedData.splice(index,1);

/* 🔥 SEND UPDATED DATA TO DB */
await fetch(
"https://academy-backend-eatl.onrender.com/api/founder/assign-period",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
teacherId,
className,
subject,
day,
startTime,
endTime: localStorage.getItem("endTime"),
assignments: assignedData
})
}
);

alert("Deleted from DB ✅");

/* REFRESH UI */
displayAssigned(assignedData);

}
</script>

</body>
</html>
