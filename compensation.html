<!DOCTYPE html>
<html>
<head>
<title>Compensation</title>

<style>
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #f1f5f9;
    text-align: left;
    padding: 12px;
    font-weight: 600;
}

td {
    padding: 12px;
}

tr {
    border-bottom: 1px solid #e5e7eb;
}

tr:hover {
    background: #f9fafb;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>

</head>

<body style="margin:0; font-family:Arial;">

<div style="display:flex;">

    <!-- SIDEBAR -->
    <div style="width:220px; height:100vh; background:#1e293b; color:white; padding:20px;">
        <h2>Academy</h2>

        <p onclick="location.href='dashboard.html'" style="cursor:pointer;">🏠 Dashboard</p>
        <p onclick="location.href='compensation.html'" style="cursor:pointer;">⏱ Compensation</p>
    </div>

    <!-- MAIN CONTENT -->
    <div style="flex:1; padding:20px; background:#f1f5f9;">

<h2>My Compensation Classes</h2>

<div style="background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

<table width="100%" style="border-collapse:collapse; text-align:left;">
<thead style="background:#e2e8f0;">
<tr>
<th style="padding:10px;">Class</th>
<th style="padding:10px;">Students</th>
<th style="padding:10px;">Date</th>
<th style="padding:10px;">Comp Minutes</th>
<th style="padding:10px;">Used</th>
<th style="padding:10px;">Remaining</th>
<th style="padding:10px;">Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>
</div>
</div>
<script>

const token = localStorage.getItem("token");

async function loadData(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/teacher/compensation-classes",{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const table = document.getElementById("table");

table.innerHTML="";

data.data.forEach(item=>{

const remaining = (item.totalMinutes || 0) - (item.usedMinutes || 0);
const disabled = remaining <= 0 ? "disabled" : "";

table.innerHTML += `
<tr style="border-bottom:1px solid #e5e7eb;">
<td style="padding:10px;">${item.className}</td>

<td style="padding:10px;">
${item.studentNames ? item.studentNames.join(", ") : "-"}
</td>

<td style="padding:10px;">${new Date(item.date).toLocaleDateString()}</td>
<td style="padding:10px;">${item.totalMinutes}</td>
<td style="padding:10px;">${item.usedMinutes || 0}</td>
<td style="padding:10px;">${remaining}</td>
<td style="padding:10px;">
<button ${disabled} style="padding:6px 12px;border-radius:6px;" onclick="startClass('${item._id}')">
Attend Class
</button>
</td>
</tr>
`;

});

}



function startClass(id){

const startTime = new Date().getTime();

const url = "https://meet.jit.si/academy_" + id + "_" + Date.now();

const tab = window.open(url, "_blank");

const timer = setInterval(()=>{

if(tab.closed){

clearInterval(timer);

const endTime = new Date().getTime();

const minutes = Math.floor((endTime - startTime)/60000);

updateMinutes(id, minutes);

}

},1000);

}

async function updateMinutes(id, minutes){

if(minutes < 1){
    alert("Too short");
    return;
}

const res = await fetch("https://academy-backend-eatl.onrender.com/api/teacher/use-compensation",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body: JSON.stringify({
        attendanceId: id,
        usedMinutes: minutes
    })
});

const data = await res.json();

alert(data.message);   // ✅ shows backend message
loadData();


}

loadData();


let openedTabs = {};

function startStudent(id){

// prevent multiple start
if(localStorage.getItem("comp_start_" + id)){
alert("Session already running");
return;
}

const startTime = new Date().getTime();

localStorage.setItem("comp_start_" + id, startTime);

const url = "https://meet.jit.si/student_" + id + "_" + Date.now();

const tab = window.open(url, "_blank");

openedTabs[id] = tab;

const timer = setInterval(()=>{

if(tab.closed){

clearInterval(timer);

if(localStorage.getItem("comp_start_" + id)){
endStudent(id);
}

}

},1000);

}

async function updateStudentMinutes(id, minutes){

if(minutes < 1){
alert("Too short");
return;
}

const res = await fetch("https://academy-backend-eatl.onrender.com/api/teacher/use-student-compensation",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
id: id,
usedMinutes: minutes
})
});

const data = await res.json();

alert(data.message);

loadStudentCompensation();

}

async function checkReminder(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/teacher/pending-compensation");

const data = await res.json();

if(data.data.length > 0){
alert("⚠ You have pending compensation classes!");
}

}

checkReminder();

async function endStudent(id){

const startTime = localStorage.getItem("comp_start_" + id);

if(!startTime){
return; // already handled
}

const endTime = new Date().getTime();

const minutes = Math.floor((endTime - startTime)/60000);

await updateStudentMinutes(id, minutes);

// remove after update
localStorage.removeItem("comp_start_" + id);

}
</script>
    </div>
</div>
</body>
</html>
