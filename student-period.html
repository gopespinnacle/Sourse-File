<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Class</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family:'Segoe UI';
    background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
}

.sidebar h2 {
    text-align:center;
    padding:20px;
}

.sidebar ul {
    list-style:none;
    padding:0;
}

.sidebar ul li {
    padding:15px;
    cursor:pointer;
}

.sidebar ul li:hover {
    background:#1e293b;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:10px;
}

.join { background:green; color:white; }
.disabled { background:gray; color:white; }

</style>
</head>

<body>

<div class="sidebar">
<h2>Student ERP</h2>
<ul>
<li onclick="go('student-dashboard.html')">🏠 Dashboard</li>
<li onclick="go('student-class.html')">📅 My Classes</li>
<li onclick="go('student-homework.html')">📘 Homework</li>
<li onclick="go('student-results.html')">📊 Results</li>
<li onclick="logout()">🚪 Logout</li>
</ul>
</div>

<div class="main">

<h2>Class Details</h2>

<div class="card" id="classInfo"></div>

<div class="card">
<button id="joinBtn" class="btn join">Join Class</button>
</div>

<div class="card">
<h3>Attendance Status</h3>
<p id="attendance">Checking...</p>
</div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href = "student-login.html";
}

/* GET PARAMS */
const params = new URLSearchParams(window.location.search);
const className = params.get("className");
const subject = params.get("subject");
const day = params.get("day");
const startTime = params.get("startTime");
const endTime = params.get("endTime");
const sessionId = params.get("sessionId");
/* DISPLAY */
document.getElementById("classInfo").innerHTML = `
<b>🏫 ${className}</b><br>
📘 ${subject}<br>
📅 ${day}<br>
⏰ ${startTime} - ${endTime}
`;

/* ================= STATUS ================= */

function isLive(){

const now = new Date();

const [sh, sm] = startTime.split(":");
const [eh, em] = endTime.split(":");

const start = new Date();
start.setHours(sh, sm, 0);

const end = new Date();
end.setHours(eh, em, 0);

return now >= start && now <= end;
}

/* ================= JOIN ================= */

document.getElementById("joinBtn").onclick = async () => {

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/student/join-class",
{
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + token
},
body: JSON.stringify({
sessionId: sessionId
})
});

const data = await res.json();

if(data.allowed){
document.getElementById("attendance").innerText = "Present ✅";
window.location.href = data.meetingLink;
}else{
alert(data.message);
}

};

/* ================= ATTENDANCE ================= */

async function loadAttendance(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/student/my-attendance",
{
headers:{ "Authorization":"Bearer " + token }
}
);

const data = await res.json();

const today = new Date().toISOString().split("T")[0];

const record = data.data.find(a =>
a.className === className &&
a.subject === subject
);

document.getElementById("attendance").innerText =
record ? record.status : "Not marked";

}

function logout(){
localStorage.clear();
window.location.href = "student-login.html";
}

function go(page){
window.location.href = page;
}

loadAttendance();

</script>

</body>
</html>
