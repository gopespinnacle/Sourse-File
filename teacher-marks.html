<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marks Entry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Marks Entry</h2>

<label>Select Assessment:</label>
<select id="assessmentSelect"></select>

<table border="1" width="100%" cellpadding="10">
    <thead>
        <tr>
            <th>Student Name</th>
            <th>Marks Obtained</th>
            <th>Save</th>
        </tr>
    </thead>
    <tbody id="marksTable"></tbody>
</table>

<script>

let selectedAssessment = null;

async function loadAssessments() {

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/teacher/assessments", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();
    const select = document.getElementById("assessmentSelect");

    data.assessments.forEach(ass => {
        const option = document.createElement("option");
        option.value = ass._id;
        option.text = ass.title + " (" + ass.className + ")";
        option.dataset.className = ass.className;
        select.appendChild(option);
    });

    loadStudents();
}

async function loadStudents() {

    const select = document.getElementById("assessmentSelect");
    selectedAssessment = select.value;
    const className = select.options[select.selectedIndex].dataset.className;

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/teacher/students", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();

    const filtered = data.students.filter(
        s => s.grade === className
    );

    const table = document.getElementById("marksTable");
    table.innerHTML = "";

    filtered.forEach(student => {

        const row = `
        <tr>
            <td>${student.name}</td>
            <td><input type="number" id="marks-${student._id}" /></td>
            <td>
    <button onclick="saveMarks('${student._id}')">Save</button>
    <button onclick="requestModification('${student._id}')">
        Request Change
    </button>
</td>
        </tr>
        `;

        table.innerHTML += row;
    });
}

async function saveMarks(studentId) {

    const marksObtained = document.getElementById("marks-" + studentId).value;

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/teacher/submit-marks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            assessmentId: selectedAssessment,
            studentId,
            marksObtained
        })
    });

    const data = await response.json();

    if (response.ok) {
        alert(data.message);
    } else {
        alert("Error: " + data.message);
    }
}


async function requestModification(studentId) {

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/teacher/request-modification", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            assessmentId: selectedAssessment,
            studentId
        })
    });

    const data = await response.json();
    alert(data.message);
}

document.getElementById("assessmentSelect").addEventListener("change", loadStudents);

loadAssessments();

</script>

</body>
</html>
