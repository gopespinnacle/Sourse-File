<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Student Mapping</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>
<script>
let allStudents = [];
</script>
<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h1>Teacher - Student Assignments</h1>
<label>Select Teacher:</label>
<select id="teacherFilter">
    <option value="">All Teachers</option>
</select>

<div id="mappingContainer"></div>

</div>
<script>
function getStudentDetails(studentId){
return allStudents.find(s => s._id === studentId) || null;
}
</script>
<script>

async function loadMappings(){

const token = localStorage.getItem("token");

const teacherId = document.getElementById("teacherFilter").value;
if(!teacherId){
document.getElementById("mappingContainer").innerHTML = "Please select a teacher";
return;
}

// ⚠️ REQUIRED DEFAULT VALUES (adjust if needed)
const body = {
    teacherId: teacherId
};

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/get-period-assignments",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body: JSON.stringify(body)
});

const data = await res.json();
console.log("Assignments API Response:", data);
// 🔥 Load all students once
const studentRes = await fetch("https://academy-backend-eatl.onrender.com/api/founder/students",{
headers:{
"Authorization":"Bearer "+token
}
});

const studentDataRes = await studentRes.json();
allStudents = studentDataRes.students || [];
const container = document.getElementById("mappingContainer");
container.innerHTML = "";

for (const item of (data.assignments || [])) {

const studentData = getStudentDetails(item.student);

container.innerHTML += `
<div class="card">

<b>Student Name:</b> ${studentData?.name || "Not found"} <br>

${studentData?.grade ? `<b>Grade:</b> ${studentData.grade} <br>` : ""}

${item.subjects && item.subjects.length ? `<b>Subjects:</b> ${item.subjects.join(", ")} <br>` : ""}

${item.languages && item.languages.length ? `<b>Languages:</b> ${item.languages.join(", ")} <br>` : ""}

${item.eca && item.eca.length ? `<b>ECA:</b> ${item.eca.join(", ")} <br>` : ""}

${item.startTime ? `<b>Class Timing:</b> ${item.startTime} <br>` : ""}

<button onclick="deleteMapping('${item.student}')">Delete</button>

<hr>
</div>
`;

}
}

loadTeachers();
loadMappings();

document.getElementById("teacherFilter").addEventListener("change", loadMappings);


// ❌ REAL DELETE NOT AVAILABLE → WORKAROUND
async function deleteMapping(studentId){

if(!confirm("Delete this assignment?")) return;

const token = localStorage.getItem("token");

// send empty assignments → overwrite
await fetch("https://academy-backend-eatl.onrender.com/api/founder/assign-period",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body: JSON.stringify({
    teacherId:"",
    className:"",
    subject:"",
    day:"",
    startTime:"",
    endTime:"",
    assignments:[]
})
});

alert("Deleted (reset)");
loadMappings();

}


async function loadTeachers(){

const token = localStorage.getItem("token");

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/teachers",{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const dropdown = document.getElementById("teacherFilter");

dropdown.innerHTML = `<option value="">All Teachers</option>`;

(data.teachers || []).forEach(t=>{
const option = document.createElement("option");
option.value = t._id;
option.textContent = t.name;
dropdown.appendChild(option);
});

}

</script>

</body>
</html>
