<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Attendance</title>

<style>
body{font-family:Arial;padding:20px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border:1px solid #ccc;text-align:left;}
</style>

</head>

<body>

<h2>My Attendance</h2>
<h3 id="percent"></h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Class</th>
<th>Status</th>
<th>Join Time</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const token = localStorage.getItem("token");

async function loadAttendance(){

try{

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/student/my-attendance",{
headers:{ "Authorization":"Bearer "+token }
});

const data = await res.json();

const table = document.getElementById("table");
table.innerHTML = "";

/* SAFE CHECK */
if(!data.data || data.data.length === 0){
table.innerHTML = "<tr><td colspan='4'>No attendance data ❌</td></tr>";
return;
}

let present = 0;
let late = 0;
let total = data.data.length;

data.data.forEach(a=>{

if(a.status === "Present") present++;
if(a.status === "Late") late++;

const date = new Date(a.date).toLocaleDateString();
const time = a.joinTime ? new Date(a.joinTime).toLocaleTimeString() : "-";

table.innerHTML += `
<tr>
<td>${date}</td>
<td>${a.className}</td>
<td style="
color:
${a.status==='Present' ? 'green' :
a.status==='Late' ? 'orange' : 'red'}
">
${a.status === "Present" ? "🟢 Present" :
a.status === "Late" ? "🟡 Late" : "🔴 Absent"}
</td>
<td>${time}</td>
</tr>
`;

});

/* PERCENTAGE */
let percent = 0;

if(total > 0){
percent = Math.round(((present + late)/total)*100);
}

document.getElementById("percent").innerText =
`Attendance: ${percent}%`;

}catch(err){

console.log(err);
document.getElementById("table").innerHTML =
"<tr><td colspan='4'>Error loading data ❌</td></tr>";

}

}
loadAttendance();

</script>

</body>
</html>
