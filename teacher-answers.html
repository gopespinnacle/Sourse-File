<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Student Answers</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

input{
width:60px;
padding:5px;
}

button{
padding:5px 10px;
background:#1f7ae0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Student Answers</h2>

<table>

<thead>
<tr>
<th>Student</th>
<th>Answer Sheet</th>
<th>Marks</th>
<th>Save</th>
</tr>
</thead>

<tbody id="answerTable"></tbody>

</table>

<script>

const token = localStorage.getItem("token");

const params = new URLSearchParams(window.location.search);

const assessmentId = params.get("assessmentId");


async function loadAnswers(){

const res = await fetch(
`https://academy-backend-eatl.onrender.com/api/auth/teacher/answers/${assessmentId}`,
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const table = document.getElementById("answerTable");

table.innerHTML="";

data.answers.forEach(a=>{

table.innerHTML += `

<tr>

<td>${a.student.name}</td>

<td>
<a href="https://academy-backend-eatl.onrender.com/uploads/${a.answerFile}" target="_blank">
Download
</a>
</td>

<td>
<input id="marks-${a._id}" type="number" value="${a.marks || ''}">
</td>

<td>
<button onclick="saveMarks('${a._id}')">Save</button>
</td>

</tr>

`;

});

}

loadAnswers();


async function saveMarks(answerId){

const marks = document.getElementById("marks-"+answerId).value;

await fetch(
`https://academy-backend-eatl.onrender.com/api/auth/teacher/give-marks/${answerId}`,
{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({marks})
});

alert("Marks saved");

}

</script>

</body>
</html>
