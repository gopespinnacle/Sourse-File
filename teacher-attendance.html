<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Mark Attendance</h2>

<select id="classSelect"></select>

<table border="1" width="100%" cellpadding="10">
    <thead>
        <tr>
            <th>Name</th>
            <th>Present</th>
            <th>Absent</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>

<script>

async function loadClasses() {

    const response = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/classes", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();

    const select = document.getElementById("classSelect");

    data.classes.forEach(cls => {
        const option = document.createElement("option");
        option.value = cls;
        option.text = cls;
        select.appendChild(option);
    });

    loadStudents();
}

async function loadStudents() {

    const selectedClass = document.getElementById("classSelect").value;

    const response = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/students", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();

    const table = document.getElementById("attendanceTable");
    table.innerHTML = "";

    const filtered = data.students.filter(s => s.grade === selectedClass);

    filtered.forEach(student => {

        const row = `
        <tr>
            <td>${student.name}</td>
            <td><button onclick="markAttendance('${student._id}', '${selectedClass}', 'Present')">Present</button></td>
            <td><button onclick="markAttendance('${student._id}', '${selectedClass}', 'Absent')">Absent</button></td>
        </tr>
        `;

        table.innerHTML += row;
    });

}

async function markAttendance(studentId, className, status) {

    await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/attendance", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            studentId,
            className,
            status
        })
    });

    alert("Attendance saved");

}

document.getElementById("classSelect").addEventListener("change", loadStudents);

loadClasses();

</script>

</body>
</html>
