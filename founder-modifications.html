<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modification Requests</title>
</head>
<body>

<h2>Pending Modification Requests</h2>

<table border="1" width="100%" cellpadding="10">
    <thead>
        <tr>
            <th>Student</th>
            <th>Assessment</th>
            <th>Approve</th>
        </tr>
    </thead>
    <tbody id="requestTable"></tbody>
</table>

<script>

async function loadRequests() {

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/founder/modification-requests", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await response.json();

    const table = document.getElementById("requestTable");
    table.innerHTML = "";

    data.requests.forEach(r => {

        const row = `
        <tr>
            <td>${r.studentId.name}</td>
            <td>${r.assessmentId.title}</td>
            <td>
                <button onclick="approveModification('${r._id}')">Approve</button>
            </td>
        </tr>
        `;

        table.innerHTML += row;
    });
}

async function approveModification(markId) {

    const response = await fetch("http://academy-backend-jpup.onrender.com/api/auth/founder/approve-modification", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            markId: markId
        })
    });

    const data = await response.json();
    alert(data.message);

    loadRequests();
}

loadRequests();

</script>
</body>
</html>
