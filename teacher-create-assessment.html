<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Assessment</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:500px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#123a63;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Assessment</h2>

<label>Title</label>
<input id="title">

<label>Class</label>
<input id="className">

<label>Subject</label>
<input id="subject">

<label>Total Marks</label>
<input id="totalMarks" type="number">
<label>Upload Question Paper (PDF)</label>
<input id="pdf" type="file">
<label>Exam Duration (minutes)</label>
<input id="duration" type="number">

<label>Exam Start Time</label>
<input id="startTime" type="datetime-local">

<button onclick="createAssessment()">Create</button>

</div>

<script>

async function createAssessment(){

const token = localStorage.getItem("token");

const formData = new FormData();

formData.append("title",document.getElementById("title").value);
formData.append("className",document.getElementById("className").value);
formData.append("subject",document.getElementById("subject").value);
formData.append("totalMarks",document.getElementById("totalMarks").value);
formData.append("examDuration",document.getElementById("duration").value);
formData.append("examStartTime",document.getElementById("startTime").value);
formData.append("pdf",document.getElementById("pdf").files[0]);

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/create-assessment",
{
method:"POST",
headers:{
"Authorization":"Bearer "+token
},
body:formData
});

const data = await res.json();

alert(data.message);

}

</script>
</body>
</html>
