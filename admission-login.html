<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply for Admission</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    position:relative;
}

/* SHAPES */

.shape1{
    position:absolute;
    width:350px;
    height:350px;
    background:#ffc300;
    top:-120px;
    left:-120px;
    border-radius:40% 60% 70% 30%;
    opacity:0.25;
    animation:move1 8s infinite ease-in-out;
}

.shape2{
    position:absolute;
    width:300px;
    height:300px;
    background:#2563eb;
    bottom:-100px;
    right:-100px;
    border-radius:60% 40% 30% 70%;
    opacity:0.3;
    animation:move2 10s infinite ease-in-out;
}

.shape3{
    position:absolute;
    width:180px;
    height:180px;
    background:#00d4ff;
    top:15%;
    right:18%;
    border-radius:50%;
    opacity:0.18;
    animation:move3 7s infinite ease-in-out;
}

@keyframes move1{

    0%{
        transform:translateY(0px) rotate(0deg);
    }

    50%{
        transform:translateY(30px) rotate(15deg);
    }

    100%{
        transform:translateY(0px) rotate(0deg);
    }
}

@keyframes move2{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-25px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes move3{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }
}

/* LOGIN CARD */

.login-container{

    width:430px;
    max-width:92%;

    padding:50px 40px;

    border-radius:28px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.35);

    position:relative;
    z-index:10;
}

/* TITLE */

h2{

    text-align:center;

    color:white;

    font-size:42px;

    margin-bottom:40px;

    font-weight:700;
}

/* INPUTS */

input{

    width:100%;

    padding:18px;

    margin-bottom:22px;

    border:none;

    border-radius:14px;

    background:
    rgba(255,255,255,0.12);

    color:white;

    font-size:15px;

    outline:none;

    transition:0.3s;
}

input::placeholder{
    color:rgba(255,255,255,0.7);
}

input:focus{

    background:
    rgba(255,255,255,0.18);

    box-shadow:
    0 0 0 3px rgba(255,195,0,0.25);
}

/* BUTTON */

button{

    width:100%;

    padding:18px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(
        90deg,
        #ffc300,
        #ffb703
    );

    color:black;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 12px 25px rgba(255,195,0,0.35);
}

/* MOBILE */

@media(max-width:768px){

    .login-container{
        padding:40px 25px;
    }

    h2{
        font-size:32px;
    }
}

</style>
</head>

<body>
<div class="shape1"></div>
<div class="shape2"></div>
<div class="shape3"></div>
<div class="login-container">

<h2>Apply for Admission</h2>

<input type="email" id="email" placeholder="Parent Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

async function login(){

    const data = {

        email:
        document.getElementById(
            "email"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value
    };

    const res = await fetch(

        "https://academy-backend-eatl.onrender.com/api/admission-account/login",

        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(data)
        }
    );

    const result = await res.json();

    console.log(result);

    if(result.success){

        localStorage.setItem(
            "admissionToken",
            result.token
        );

        window.location.href =
        "admission-dashboard.html";

    }else{

        alert(result.message);

    }
}

</script>

</body>
</html>
