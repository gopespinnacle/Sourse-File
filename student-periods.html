<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Timetable</title>

<link rel="stylesheet" href="style.css">

<style>

.main-content {
margin-left:220px;
padding:20px;
}

/* GRID */
.timetable-container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 15px;
margin-top: 20px;
}

.day-column {
background: #f8fafc;
border-radius: 12px;
padding: 10px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.day-header {
background: #2c3e50;
color: white;
padding: 6px;
border-radius: 6px;
text-align: center;
font-size: 14px;
font-weight: bold;
margin-bottom: 8px;
}

.period-card {
background: #4CAF50;
color: white;
border-radius: 8px;
padding: 8px;
margin-bottom: 8px;
font-size: 12px;
cursor:pointer;
}

/* COLORS */
.math { background:#3f51b5; }
.science { background:#009688; }
.language { background:#ff9800; }
.eca { background:#9c27b0; }

/* STATUS */
.live { border-left: 4px solid #00e676; }
.upcoming { border-left: 4px solid #ffeb3b; }
.completed { border-left: 4px solid #9e9e9e; opacity:0.7; }

</style>

</head>

<body class="dashboard-page">

<!-- ✅ STUDENT SIDEBAR -->
<div id="sidebar-container"></div>

<script>
fetch("student-sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h1>My Timetable</h1>

<div id="timetable"></div>

</div>

<script>

const token = localStorage.getItem("token");

/* ================= LOAD TIMETABLE ================= */

async function loadTimetable(){

try{

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/student/my-timetable",
{
headers:{ "Authorization":"Bearer "+token }
}
);

const data = await res.json();

console.log("API DATA:", data);

/* GET DATA */
const schedule = data.data || [];

/* NO DATA */
if(schedule.length === 0){
document.getElementById("timetable").innerHTML =
"<p>No classes found ❌</p>";
return;
}

/* RENDER */
renderGrid(schedule);

}catch(err){

console.log(err);
document.getElementById("timetable").innerHTML =
"<p>Error loading timetable ❌</p>";

}

}

/* ================= TIME FORMAT ================= */

function formatTime(time){
let [h, m] = time.split(":");
h = parseInt(h);

let ampm = h >= 12 ? "PM" : "AM";

h = h % 12;
h = h ? h : 12; // 0 → 12

return `${h}:${m} ${ampm}`;
}

/* ================= STATUS ================= */

function getClassStatus(day, startTime, endTime){

const now = new Date();
const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const today = days[now.getDay()];
const todayIndex = days.indexOf(today);
const classIndex = days.indexOf(day);

if(classIndex > todayIndex) return "upcoming";
if(classIndex < todayIndex) return "completed";

const [sh, sm] = startTime.split(":");
const [eh, em] = endTime.split(":");

const start = new Date();
start.setHours(sh, sm, 0);

const end = new Date();
end.setHours(eh, em, 0);

if(now >= start && now <= end) return "live";
if(now < start) return "upcoming";
return "completed";

}

/* ================= RENDER ================= */

function renderGrid(schedule){

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const container = document.getElementById("timetable");
container.innerHTML = "";
container.className = "timetable-container";

const grouped = {};
days.forEach(d => grouped[d] = []);

schedule.forEach(s=>{
if(grouped[s.day]) grouped[s.day].push(s);
});

days.forEach(day=>{

const column = document.createElement("div");
column.className = "day-column";
column.innerHTML = `<div class="day-header">${day}</div>`;

(grouped[day] || []).forEach(s=>{

const div = document.createElement("div");

let type = "period-card";

if(s.subject?.toLowerCase().includes("math")) type += " math";
else if(s.subject?.toLowerCase().includes("science")) type += " science";
else if(s.language) type += " language";
else if(s.eca) type += " eca";

const status = getClassStatus(s.day, s.startTime, s.endTime);

div.className = type + " " + status;

let label = "⚪ DONE";
if(status === "live") label = "🟢 LIVE";
if(status === "upcoming") label = "🟡 UPCOMING";

div.onclick = () => {
window.location.href =
"student-class.html?" +
"className=" + encodeURIComponent(s.className) +
"&subject=" + encodeURIComponent(s.subject || "") +
"&eca=" + encodeURIComponent(s.eca || "") +
"&language=" + encodeURIComponent(s.language || "") +
"&day=" + encodeURIComponent(s.day) +
"&startTime=" + encodeURIComponent(s.startTime);
};

div.innerHTML = `
<div style="display:flex;justify-content:space-between;">
<span>${s.className}</span>
<span>${label}</span>
</div>

<div>
${s.subject || s.language || s.eca || "N/A"}
</div>

<div style="font-size:11px;">
${formatTime(s.startTime)} - ${formatTime(s.endTime)}
</div>
`;

column.appendChild(div);

});

container.appendChild(column);

});

}

/* START */
loadTimetable();

</script>
</body>
</html>
