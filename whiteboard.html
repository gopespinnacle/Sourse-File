<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Whiteboard</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
}

.toolbar {
    background:#1e293b;
    padding:10px;
    display:flex;
    gap:10px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.teacher-tools {
    display:none;
}

canvas {
    background:white;
    display:block;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="setTool('pen')">✏️ Pen</button>
<input type="color" id="colorPicker" value="#000000">
<button onclick="setTool('eraser')">🧽 Eraser</button>
    <div class="teacher-tools" id="teacherTools">
        <button onclick="clearBoard()">🧹 Clear</button>
    </div>

    <button onclick="leaveClass()">🚪 Leave</button>
</div>
<input type="file" id="fileInput">
<canvas id="board"></canvas>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";
let currentColor = "#000000";
document.getElementById("colorPicker").addEventListener("input", (e) => {
    currentColor = e.target.value;
});

function setTool(tool){
    currentTool = tool;

    if(tool === "pen"){
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/pen.png') 2 30, auto";
    }
    else if(tool === "eraser"){
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/eraser.png') 10 10, auto";
    }
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);

/* DRAW START */
canvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    const rect = canvas.getBoundingClientRect();

   

    prevX = e.clientX - rect.left;
    prevY = e.clientY - rect.top;

     drawing = true;

    // ✅ VERY IMPORTANT (reset path)
    ctx.beginPath();
    ctx.moveTo(prevX, prevY);
});
canvas.addEventListener("mouseleave", () => {
    drawing = false;
});
/* DRAW END */
canvas.addEventListener("mouseup", () => {
    drawing = false;
});

/* DRAW MOVE */
canvas.addEventListener("mousemove", (e) => {

    if(!drawing || role !== "teacher") return;

    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    drawLine(prevX, prevY, x, y, currentTool,currentColor);

    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool,
         color: currentColor 
    });

    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool, color){

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);

    ctx.lineCap = "round";

    if(tool === "eraser"){
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = 20;
    } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = color || "black"; // ✅ USE COLOR
        ctx.lineWidth = 2;
    }

    ctx.stroke();
}

/* RECEIVE DRAW */
socket.on("draw", (data) => {
    drawLine(data.prevX, data.prevY, data.x, data.y, data.tool,data.color);
});
socket.on("loadBoard", (dataArray) => {

    dataArray.forEach(d => {
        drawLine(d.prevX, d.prevY, d.x, d.y, d.tool,d.color);
    });

});
/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    socket.emit("clear", room);
}

socket.on("clear", () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
});

/* LEAVE */
function leaveClass(){
    window.close();
}

// ================= FILE UPLOAD =================
document.getElementById("fileInput").addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://academy-backend-eatl.onrender.com/upload-file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
console.log("UPLOAD RESPONSE:", data);
    // 🔥 send to students
    socket.emit("fileShare", {
        room,
        fileUrl: data.url,
        type: file.type
    });
displayFile({
    fileUrl: data.url,
    type: file.type
});

});

// ================= DISPLAY FILE =================
    function displayFile(data){

    const container = document.createElement("div");

    container.style.position = "absolute";
    container.style.top = "60px";
    container.style.left = "20px";
    container.style.background = "white";
    container.style.padding = "10px";
    container.style.zIndex = "999";

    if(data.type.startsWith("image")){
        const img = document.createElement("img");
        img.src = data.fileUrl;
        img.style.width = "400px";
        container.appendChild(img);
    }
    else if(data.type === "application/pdf"){
        const iframe = document.createElement("iframe");
        iframe.src = data.fileUrl;
        iframe.style.width = "500px";
        iframe.style.height = "400px";
        container.appendChild(iframe);
    }
    else{
        const link = document.createElement("a");
        link.href = data.fileUrl;
        link.innerText = "Download File";
        link.target = "_blank";
        container.appendChild(link);
    }

    document.body.appendChild(container);
}

// ================= RECEIVE =================
socket.on("fileShare", (data) => {
    displayFile(data);

});

</script>

</body>
</html>
