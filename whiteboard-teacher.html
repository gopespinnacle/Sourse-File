<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Whiteboard</title>

<style>
body { margin:0; font-family:sans-serif; }

.toolbar {
    background:#0f172a;
    padding:10px;
}

button {
    padding:8px 12px;
    margin-right:5px;
    cursor:pointer;
}

canvas {
    background:white;
    display:block;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="setTool('pen')">Pen</button>
    <button onclick="setTool('eraser')">Eraser</button>
    <button onclick="clearBoard()">Clear</button>
</div>

<canvas id="board"></canvas>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

// ROOM
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

if(!room){
    alert("Room missing ❌");
}

socket.emit("joinRoom", room);

// CANVAS
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

let drawing = false;
let tool = "pen";

// START
canvas.addEventListener("mousedown", () => drawing = true);

// STOP
canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
});

// DRAW
canvas.addEventListener("mousemove", (e) => {
    if(!drawing) return;

    ctx.lineWidth = tool === "eraser" ? 20 : 3;
    ctx.strokeStyle = tool === "eraser" ? "#ffffff" : "#000";

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);

    socket.emit("draw", {
        room,
        x: e.offsetX,
        y: e.offsetY,
        tool
    });
});

// RECEIVE (if multiple teachers)
socket.on("draw", (data) => {
    ctx.lineWidth = data.tool === "eraser" ? 20 : 3;
    ctx.strokeStyle = data.tool === "eraser" ? "#ffffff" : "#000";

    ctx.lineTo(data.x, data.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(data.x, data.y);
});

function setTool(t){
    tool = t;
}

function clearBoard(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    socket.emit("clear", room);
}

// RECEIVE CLEAR
socket.on("clear", () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
});
</script>

</body>
</html>
