<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Management</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data => {
document.getElementById("sidebar-container").innerHTML = data;
});
</script>

<div class="main-content">

        <h1>Students List</h1>

<div class="student-toolbar">

<button class="add-btn" onclick="editStudentId=null;openStudentForm()">
+ Add Student
</button>

<select id="studentSelect" onchange="filterStudentList()">
<option value="">All Students</option>
</select>

</div>
<div id="studentPopup" class="popup-content" style="display:none;">

<h2 id="popupTitle">Add Student</h2>

<label>Name</label>
<input type="text" id="studentName">

<label>Grade</label>
<input type="text" id="studentGrade">

<label>Board</label>
<input type="text" id="studentBoard">

<label>Parent WhatsApp</label>
<input type="text" id="studentMobile">
<label>Select Subjects</label>
<div id="studentSubjects" class="tag-container"></div>

<label>Select ECA</label>
<div id="studentECA" class="tag-container"></div>

<label>Select Languages</label>
<div id="studentLanguages" class="tag-container"></div>
<div class="popup-buttons">
<button onclick="saveStudent()">Save</button>
<button type="button" onclick="closeStudentForm()">Cancel</button>
</div>

</div>

    <div class="table-wrapper">
<table id="studentTable">
        <thead>
            <tr>
              <th>Name</th>
<th>Grade</th>
<th>Subjects</th>  <!-- ADD THIS -->
<th>ECA</th>
<th>Language</th>
<th>Board</th>
<th>Parent Mobile</th>
<th>WhatsApp</th>
<th>Login ID</th>
<th>Password</th>
<th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>
<div id="studentProfilePopup" class="popup">

<div class="popup-content">

<h2>Student Profile</h2>

<p><b>Name:</b> <span id="profileName"></span></p>
<p><b>Grade:</b> <span id="profileGrade"></span></p>
<p><b>Board:</b> <span id="profileBoard"></span></p>
<p><b>Parent Mobile:</b> <span id="profileMobile"></span></p>

<hr>

<p><b>Login ID:</b> <span id="profileLogin"></span></p>
<p><b>Password:</b> <span id="profilePassword"></span></p>

<div style="margin-top:15px">
<button onclick="closeStudentProfile()">Close</button>
</div>

</div>

</div>
<script>




let editStudentId = null;
let students = [];
console.log("SAVE FUNCTION CALLED");
function saveStudents(){
    localStorage.setItem("students", JSON.stringify(students));
}

async function loadStudents(){

const token = localStorage.getItem("token");

const res = await fetch("http://academy-backend-jpup.onrender.com/api/founder/students",{
headers:{
"Authorization":"Bearer "+token
}
});

let data;

try {
    data = await res.json();
} catch (error) {
    console.log("❌ Not JSON response");
    return;
}
students = data.students;
const select = document.getElementById("studentSelect");
select.innerHTML = '<option value="">All Students</option>';

students.forEach(student=>{
const option = document.createElement("option");
option.value = student.name;
option.textContent = student.name;
select.appendChild(option);
});

const tbody = document.querySelector("#studentTable tbody");

tbody.innerHTML="";

data.students.forEach((student,index)=>{

const message = encodeURIComponent(
`Hello Parent,

Welcome to GOPES PINNACLE ONLINE ACADEMY.

Student Name: ${student.name}
Grade: ${student.grade}

Login ID: ${student.loginEmail}
Password: ${student.loginPassword}

Please login and start learning.

Thank you,
Gopes Pinnacle Academy`
);

tbody.innerHTML += `
<tr>
<td style="cursor:pointer;color:#007bff;font-weight:600"
onclick="showStudentProfile(${index})">
${student.name}
</td>
<td>${student.grade}</td>
<td>${student.subject ? student.subject.join(", ") : "-"}</td>
<td>${student.eca ? student.eca.join(", ") : "-"}</td>
<td>${student.language ? student.language.join(", ") : "-"}</td>
<td>${student.board || "-"}</td>
<td>${student.mobile || "-"}</td>

<td>
<a href="https://wa.me/91${student.mobile}?text=${message}" target="_blank">
<button style="background:#25D366;color:white;border:none;padding:6px 10px;border-radius:4px;">
Send WhatsApp
</button>
</a>
</td>

<td>${student.loginEmail || "-"}</td>
<td>${student.loginPassword || "-"}</td>

<td>
<button onclick="editStudent(${index})">Edit</button>
<button onclick="deleteStudent(${index})">Delete</button>
</td>
</tr>
`;
});

}

function openStudentForm(){

document.getElementById("popupTitle").innerText="Add Student";

document.getElementById("studentName").value="";
document.getElementById("studentGrade").value="";
document.getElementById("studentBoard").value="";
document.getElementById("studentMobile").value="";
loadCategoriesForStudent();
document.getElementById("studentPopup").style.display="flex";

}
function closeStudentForm(){
document.getElementById("studentPopup").style.display="none";
}

async function saveStudent(){

console.log("SAVE CLICKED");

let selectedSubjects = [];
document.querySelectorAll('#studentSubjects .tag.active').forEach(tag=>{
selectedSubjects.push(tag.innerText.trim());
});

let selectedECA = [];
document.querySelectorAll('#studentECA .tag.active').forEach(tag=>{
selectedECA.push(tag.innerText.trim());
});

let selectedLanguages = [];
document.querySelectorAll('#studentLanguages .tag.active').forEach(tag=>{
selectedLanguages.push(tag.innerText.trim());
});

console.log("Subjects:", selectedSubjects);
console.log("ECA:", selectedECA);
console.log("Languages:", selectedLanguages);

let name = document.getElementById("studentName").value;
let grade = document.getElementById("studentGrade").value;
let board = document.getElementById("studentBoard").value;
let mobile = document.getElementById("studentMobile").value;

if(!name){
alert("Enter student name");
return;
}

const token = localStorage.getItem("token");

console.log("TOKEN:", token);

try{

let url = "";
let method = "";

if(editStudentId){
url = `http://academy-backend-jpup.onrender.com/api/founder/student/${editStudentId}`;
method = "PUT";
}else{
url = "http://academy-backend-jpup.onrender.com/api/founder/student";
method = "POST";
}

console.log("API URL:", url);

const res = await fetch(url,{
method: method,
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},
body: JSON.stringify({
name,
grade,
board,
mobile,
subject: selectedSubjects,
eca: selectedECA,
language: selectedLanguages
})
});

console.log("POST STATUS:", res.status);

let data;

try {
    data = await res.json();
} catch (error) {
    console.log("❌ Not JSON response");
    return;
}
console.log("RESPONSE:", data);

closeStudentForm();
loadStudents();

}catch(err){
console.log("FETCH ERROR:", err);
}

}
async function deleteStudent(index){

if(!confirm("Delete this student?")) return;

const token = localStorage.getItem("token");

const student = students[index];

await fetch(`http://academy-backend-jpup.onrender.com/api/founder/student/${student._id}`,{
method:"DELETE",
headers:{
"Authorization":"Bearer "+token
}
});

loadStudents();

}
loadStudents();
function editStudent(index){

let student = students[index];

editStudentId = student._id;

document.getElementById("popupTitle").innerText="Edit Student";

document.getElementById("studentName").value = student.name;
document.getElementById("studentGrade").value = student.grade;
document.getElementById("studentBoard").value = student.board || "";
document.getElementById("studentMobile").value = student.mobile || "";

/* LOAD TAGS */
loadCategoriesForStudent().then(()=>{

// SUBJECT
document.querySelectorAll("#studentSubjects .tag").forEach(tag=>{
if(student.subject?.includes(tag.innerText)){
tag.classList.add("active");
}
});

// ECA
document.querySelectorAll("#studentECA .tag").forEach(tag=>{
if(student.eca?.includes(tag.innerText)){
tag.classList.add("active");
}
});

// LANGUAGE
document.querySelectorAll("#studentLanguages .tag").forEach(tag=>{
if(student.language?.includes(tag.innerText)){
tag.classList.add("active");
}
});

});

document.getElementById("studentPopup").style.display="flex";

}
function showStudentProfile(index){

const student = students[index];

document.getElementById("profileName").innerText = student.name;
document.getElementById("profileGrade").innerText = student.grade;
document.getElementById("profileBoard").innerText = student.board || "-";
document.getElementById("profileMobile").innerText = student.mobile || "-";
document.getElementById("profileLogin").innerText = student.loginEmail || "-";
document.getElementById("profilePassword").innerText = student.loginPassword || "-";

document.getElementById("studentProfilePopup").style.display="flex";

}

function closeStudentProfile(){
document.getElementById("studentProfilePopup").style.display="none";
}

function toggleStudentTag(el){
el.classList.toggle("active");
}
async function loadCategoriesForStudent(){

    try{

        // SUBJECTS
        const subRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/subject");
        let subData;
try {
    subData = await subRes.json();
} catch (error) {
    console.log("❌ subject API error");
    return;
}

        const subContainer = document.getElementById("studentSubjects");
        subContainer.innerHTML = "";

        subData.data.forEach(s=>{
            const div = document.createElement("div");
            div.className = "tag";
            div.innerText = s.name;

            div.onclick = function(){
                div.classList.toggle("active");
            };

            subContainer.appendChild(div);
        });

        // ECA
        const ecaRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/eca");
        let ecaData;
try {
    ecaData = await ecaRes.json();   // ✅ CORRECT
} catch (error) {
    console.log("❌ eca API error");
    return;
}

        const ecaContainer = document.getElementById("studentECA");
        ecaContainer.innerHTML = "";

        ecaData.data.forEach(s=>{
            const div = document.createElement("div");
            div.className = "tag";
            div.innerText = s.name;

            div.onclick = function(){
                div.classList.toggle("active");
            };

            ecaContainer.appendChild(div);
        });

        // LANGUAGE
        const langRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/language");
        let langData;
try {
    langData = await langRes.json();   // ✅ CORRECT
} catch (error) {
    console.log("❌ language API error");
    return;
}

        const langContainer = document.getElementById("studentLanguages");
        langContainer.innerHTML = "";

        langData.data.forEach(s=>{
            const div = document.createElement("div");
            div.className = "tag";
            div.innerText = s.name;

            div.onclick = function(){
                div.classList.toggle("active");
            };

            langContainer.appendChild(div);
        });

    }catch(err){
        console.log("LOAD ERROR:", err);
    }

}
