<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
Admission Account Management
</title>

<style>

body{

    font-family:Segoe UI;

    background:#f4f7fb;

    margin:0;

    padding:40px;
}

.container{

    max-width:700px;

    margin:auto;

    background:white;

    padding:40px;

    border-radius:14px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.08);
}

h1{

    margin-bottom:30px;
}

input{

    width:100%;

    padding:14px;

    margin-bottom:18px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:15px;
}

button{

    width:100%;

    padding:14px;

    background:#ffc300;

    border:none;

    border-radius:8px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

.account-card{

    background:#fff;

    border:1px solid #ddd;

    border-radius:10px;

    padding:18px;

    margin-top:15px;
}

.account-card h3{

    margin:0 0 8px 0;
}

.account-card p{

    margin:0;
}

</style>

</head>

<body>

<div class="container">

    <h1>
        Create Admission Login
    </h1>

    <input type="text"
           id="parentName"
           placeholder="Parent Name">

    <input type="email"
           id="email"
           placeholder="Parent Email">

    <input type="password"
           id="password"
           placeholder="Password">

    <button onclick="createAccount()">
        Create Login
    </button>

    <h2 style="margin-top:40px;">
        Created Accounts
    </h2>

    <div id="accountList"></div>

</div>

<script>

/* =========================
   BACKEND URL
========================= */

const API_BASE =
"https://academy-backend-eatl.onrender.com";

/* =========================
   CREATE ACCOUNT
========================= */

async function createAccount(){

    const data = {

        parentName:
        document.getElementById(
            "parentName"
        ).value,

        email:
        document.getElementById(
            "email"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value

    };

    try{

        const res = await fetch(

            `${API_BASE}/api/admission-account/create`,

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(data)
            }

        );

        const result = await res.json();

        if(result.success){

            alert(
                "Admission Login Created"
            );

            // CLEAR INPUTS
            document.getElementById(
                "parentName"
            ).value = "";

            document.getElementById(
                "email"
            ).value = "";

            document.getElementById(
                "password"
            ).value = "";

            loadAccounts();

        }else{

            alert(result.message);

        }

    }catch(err){

        console.log(err);

        alert("Server Error");

    }

}

/* =========================
   LOAD ACCOUNTS
========================= */

async function loadAccounts(){

    try{

        const res = await fetch(

            `${API_BASE}/api/admission-account/all`

        );

        const result = await res.json();

        let html = "";

        result.data.forEach(account=>{

            html += `

            <div class="account-card">

                <h3>
                    ${account.parentName}
                </h3>

                <p>
                    ${account.email}
                </p>

            </div>

            `;

        });

        document.getElementById(
            "accountList"
        ).innerHTML = html;

    }catch(err){

        console.log(err);

    }

}

/* =========================
   INITIAL LOAD
========================= */

loadAccounts();

</script>

</body>
</html>
