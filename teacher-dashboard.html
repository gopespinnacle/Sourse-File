<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">
    <h2>Academy ERP</h2>
    <ul>
        <li><i class="fa fa-chart-line"></i> Dashboard</li>
        <li onclick="goToClasses()">
    <i class="fa fa-book"></i> My Classes
</li>
        <li><i class="fa fa-calendar-check"></i> Attendance</li>
        <li><i class="fa fa-clipboard"></i> Assessments</li>
        <li onclick="location.href='teacher-homework.html'"><i class="fa fa-tasks"></i> Homework</li>
        <li><i class="fa fa-pen"></i> Marks Entry</li>
        <li onclick="logout()"><i class="fa fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main">

    <div class="topbar">
        <h3>Welcome, <span id="teacherName"></span></h3>
        <div class="profile">
            <i class="fa fa-user-circle"></i>
        </div>
    </div>

    <div class="cards">

      <div class="card" onclick="goToPeriods()">
    <i class="fa fa-book"></i>
    <h4>My Classes</h4>
    <p id="totalClasses">0</p>
</div>

        <div class="card" onclick="goToStudentsPage()">
            <i class="fa fa-users"></i>
            <h4>Total Students</h4>
            <p id="totalStudents">0</p>
        </div>

        <div class="card">
            <i class="fa fa-clipboard"></i>
            <h4>Assessments</h4>
            <p id="assessmentCount">0</p>
        </div>
<div class="card" onclick="window.location.href='compensation.html'">
    <h3>My Compensation Classes</h3>
</div>
    </div>

</div>

<script>

const token = localStorage.getItem("token");
const name = localStorage.getItem("name");

if (!token) {
    window.location.href = "teacher-login.html";
}

document.getElementById("teacherName").innerText = name;

async function loadDashboard() {

    const res = await fetch(
        "https://academy-backend-eatl.onrender.com/api/teacher/classes",
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );
if (!res.ok) {
    console.error("API failed:", res.status);
    return;
}
    /* GET PERIOD DATA */
const res2 = await fetch(
    "https://academy-backend-eatl.onrender.com/api/teacher/all-period-assignments",
    {
        headers: {
            "Authorization": "Bearer " + token
        }
    }
);

const data2 = await res2.json();

/* TOTAL PERIODS (My Classes) */
const totalClasses = data2.data.length;

/* UNIQUE STUDENTS */
let studentSet = new Set();

data2.data.forEach(p => {
    if(p.student){
        studentSet.add(p.student._id);
    }
});

const totalStudents = studentSet.size;

/* UPDATE UI */
animateNumber("totalClasses", totalClasses);
animateNumber("totalStudents", totalStudents);

    /* Assessments (this is OK) */
    const res3 = await fetch("https://academy-backend-eatl.onrender.com/api/teacher/assessments", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data3 = await res3.json();
    animateNumber("assessmentCount", data3.assessments.length);
}

function logout(){
    localStorage.clear();
    window.location.href = "teacher-login.html";
}

loadDashboard();
function animateNumber(id, number) {

    if (number === 0) {
        document.getElementById(id).innerText = 0;
        return;
    }

    let count = 0;

    const interval = setInterval(() => {
        count++;
        document.getElementById(id).innerText = count;

        if (count >= number) {
            clearInterval(interval);
        }
    }, 40);
}
function goToClasses(){
    window.location.href = "teacher-classes.html";
}
function goToPeriods(){
    window.location.href = "teacher-periods.html";
}
function goToStudentsPage(){
    window.location.href = "teacher-students.html";
}
</script>

</body>
</html>
