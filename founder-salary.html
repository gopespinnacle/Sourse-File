<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salary Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family:Arial;
    background:#f4f7fb;
    margin:0;
    padding:30px;
}
h1{
    color:#123a63;
}
.section{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
label{display:block;margin-top:12px;font-weight:bold;}
input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
}
button{
    margin-top:15px;
    padding:10px 15px;
    background:#123a63;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th{
    background:#123a63;
    color:white;
    padding:10px;
}
td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<h1>Salary Management</h1>

<!-- ISSUE SALARY -->
<div class="section">
<h2>Issue Salary</h2>

<label>Select Teacher</label>
<select id="teacherSelect" onchange="loadSalary()"></select>

<label>Base Salary</label>
<input type="number" id="baseSalary" readonly>

<label>Select Month</label>
<input type="month" id="salaryMonth">

<label>Bonus</label>
<input type="number" id="bonus" value="0" oninput="calculateNet()">

<label>Deduction</label>
<input type="number" id="deduction" value="0" oninput="calculateNet()">

<label>Net Salary</label>
<input type="number" id="netSalary" readonly>

<label>Payment Mode</label>
<select id="paymentMode">
<option>Cash</option>
<option>Bank Transfer</option>
<option>UPI</option>
</select>

<button onclick="issueSalary()">Issue Salary</button>

</div>

<!-- SALARY HISTORY -->
<div class="section">
<h2>Salary History</h2>

<table>
<thead>
<tr>
<th>Teacher</th>
<th>Month</th>
<th>Salary</th>
<th>Bonus</th>
<th>Deduction</th>
<th>Net</th>
<th>Mode</th>
<th>PDF</th>
</tr>
</thead>
<tbody id="salaryTable"></tbody>
</table>

</div>

<script>

let teachers = JSON.parse(localStorage.getItem("teachers")) || [];
let salaryRecords = JSON.parse(localStorage.getItem("salaryRecords")) || [];

/* Load Teachers */
function loadTeachers(){
    let select=document.getElementById("teacherSelect");
    select.innerHTML="<option value=''>Select Teacher</option>";
    teachers.forEach(t=>{
        select.innerHTML+=
        `<option value="${t.name}|${t.salaryMonth}">
        ${t.name}
        </option>`;
    });
}

/* Load Salary */
function loadSalary(){
    let value=document.getElementById("teacherSelect").value;
    if(!value) return;

    let salary=value.split("|")[1];
    document.getElementById("baseSalary").value=salary;
    calculateNet();
}

/* Calculate Net */
function calculateNet(){
    let base=Number(document.getElementById("baseSalary").value)||0;
    let bonus=Number(document.getElementById("bonus").value)||0;
    let deduction=Number(document.getElementById("deduction").value)||0;

    let net=base+bonus-deduction;
    document.getElementById("netSalary").value=net;
}

/* Issue Salary */
function issueSalary(){

    let teacherValue=document.getElementById("teacherSelect").value;
    let month=document.getElementById("salaryMonth").value;
    let base=Number(document.getElementById("baseSalary").value);
    let bonus=Number(document.getElementById("bonus").value);
    let deduction=Number(document.getElementById("deduction").value);
    let net=Number(document.getElementById("netSalary").value);
    let mode=document.getElementById("paymentMode").value;

    if(!teacherValue || !month){
        alert("Select teacher and month");
        return;
    }

    let name=teacherValue.split("|")[0];

    // Prevent duplicate salary
    let exists = salaryRecords.find(r=>r.teacher===name && r.month===month);
    if(exists){
        alert("Salary already issued for this month!");
        return;
    }

    salaryRecords.push({
        teacher:name,
        month,
        base,
        bonus,
        deduction,
        net,
        mode
    });

    localStorage.setItem("salaryRecords",JSON.stringify(salaryRecords));

    renderSalary();
}

/* Render Table */
function renderSalary(){
    let tbody=document.getElementById("salaryTable");
    tbody.innerHTML="";

    salaryRecords.forEach((r,i)=>{
        tbody.innerHTML+=`
        <tr>
        <td>${r.teacher}</td>
        <td>${r.month}</td>
        <td>₹ ${r.base}</td>
        <td>₹ ${r.bonus}</td>
        <td>₹ ${r.deduction}</td>
        <td>₹ ${r.net}</td>
        <td>${r.mode}</td>
        <td><button onclick="generatePDF(${i})">PDF</button></td>
        </tr>`;
    });
}

/* PDF */
function generatePDF(i){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let r = salaryRecords[i];

    let base = Number(r.base) || 0;
    let bonus = Number(r.bonus) || 0;
    let deduction = Number(r.deduction) || 0;
    let net = Number(r.net) || 0;

    /* ===== OUTER BORDER ===== */
    doc.setDrawColor(18,58,99);
    doc.setLineWidth(1.5);
    doc.rect(10,10,190,277);

    /* ===== HEADER ===== */
    doc.setFont("helvetica","bold");
    doc.setFontSize(20);
    doc.setTextColor(18,58,99);
    doc.text("GOPES PINNACLE ACADEMY",105,30,{align:"center"});

    doc.setFont("helvetica","normal");
    doc.setFontSize(14);
    doc.setTextColor(0,0,0);
    doc.text("Salary Slip",105,45,{align:"center"});

    /* ===== DETAILS ===== */
    doc.setFontSize(12);

    doc.text("Teacher Name : " + r.teacher, 25, 70);
    doc.text("Month        : " + r.month, 25, 85);

    doc.text("Base Salary  : Rs " + base.toLocaleString(), 25, 105);
    doc.text("Bonus        : Rs " + bonus.toLocaleString(), 25, 120);
    doc.text("Deduction    : Rs " + deduction.toLocaleString(), 25, 135);

    doc.setFont("helvetica","bold");
    doc.text("Net Salary   : Rs " + net.toLocaleString(), 25, 155);

    /* Divider */
    doc.setDrawColor(200);
    doc.line(25,170,185,170);

    doc.setFont("helvetica","normal");
    doc.text("Authorized Signature",140,230);

    doc.save(
        r.teacher.replace(/\s/g,"_") + "_Salary_" + r.month + ".pdf"
    );
}

/* INIT */
loadTeachers();
renderSalary();

</script>

</body>
</html>
