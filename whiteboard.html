<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Whiteboard</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
}

.toolbar {
    background:#1e293b;
    padding:10px;
    display:flex;
    gap:10px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.teacher-tools {
    display:none;
}

canvas {
    background:white;
    display:block;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="setTool('pen')">✏️ Pen</button>
<button onclick="setTool('eraser')">🧽 Eraser</button>
    <div class="teacher-tools" id="teacherTools">
        <button onclick="clearBoard()">🧹 Clear</button>
    </div>

    <button onclick="leaveClass()">🚪 Leave</button>
</div>

<canvas id="board"></canvas>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";

function setTool(tool){
    currentTool = tool;
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);

/* DRAW START */
canvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    drawing = true;
    prevX = e.clientX;
    prevY = e.clientY;
});

/* DRAW END */
canvas.addEventListener("mouseup", () => {
    drawing = false;
});

/* DRAW MOVE */
canvas.addEventListener("mousemove", (e) => {

    if(!drawing || role !== "teacher") return;

  const rect = canvas.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;
    drawLine(prevX, prevY, x, y, currentTool);

    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool
    });

    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool){

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);

    ctx.lineCap = "round";

    if(tool === "eraser"){
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = 20;
    } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
    }

    ctx.stroke();
}

/* RECEIVE DRAW */
socket.on("draw", (data) => {
    drawLine(data.prevX, data.prevY, data.x, data.y, data.tool);
});

/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    socket.emit("clear", room);
}

socket.on("clear", () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
});

/* LEAVE */
function leaveClass(){
    window.close();
}

</script>

</body>
</html>
