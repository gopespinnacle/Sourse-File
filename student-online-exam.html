<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Online Exam</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

.timer{
font-size:28px;
color:red;
margin-bottom:20px;
}

iframe{
border:1px solid #ccc;
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
padding:10px;
}

button{
padding:10px 20px;
background:#123a63;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Online Exam</h2>
<video id="camera" width="200" autoplay></video>
<div class="timer" id="timer">Loading Timer...</div>

<iframe id="questionPaper"
width="100%"
height="500px"></iframe>

<h3>Your Answer</h3>

<textarea id="answer"></textarea>

<br><br>

<button onclick="submitExam()">Submit Exam</button>

<script>

const params = new URLSearchParams(window.location.search);
/* START CAMERA */

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => {

document.getElementById("camera").srcObject = stream;

})
.catch(err => {

alert("Camera access required for exam");

});
/* SEND CAMERA SNAPSHOT */

setInterval(()=>{

const video = document.getElementById("camera");

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

const image = canvas.toDataURL("image/jpeg");

fetch(
"https://academy-backend-eatl.onrender.com/api/auth/student/upload-camera",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
assessmentId,
image
})
});

},3000);
/* FULLSCREEN LOCK */

function startFullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}

}

window.onload = startFullscreen;
/* DETECT EXIT FROM FULLSCREEN */

document.addEventListener("fullscreenchange", () => {

if (!document.fullscreenElement) {

alert("You exited fullscreen. This action is recorded.");

}

});
/* TAB SWITCH DETECTION */

let tabSwitchCount = 0;

document.addEventListener("visibilitychange", () => {

if (document.hidden) {

tabSwitchCount++;

alert("Warning: Tab switching detected!");

if(tabSwitchCount >= 3){

alert("Exam terminated due to suspicious activity");

submitExam();

}

}

});
/* BLOCK COPY / PASTE */

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){

if(e.ctrlKey && (e.key === "c" || e.key === "v")){

e.preventDefault();

alert("Copy/Paste is disabled during exam");

}

});
/* SEND ACTIVITY EVERY 5 SECONDS */

setInterval(async()=>{

await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/student/exam-activity",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
assessmentId,
tabSwitch:tabSwitchCount
})
});

},5000);
const assessmentId = params.get("assessmentId");

const token = localStorage.getItem("token");

let remainingSeconds = 0;

/* LOAD EXAM */

async function loadExam(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/student/assessments",
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const exam = data.assessments.find(a => a._id === assessmentId);

document.getElementById("questionPaper").src =
"https://academy-backend-eatl.onrender.com/uploads/"+exam.questionPaper;

/* TIMER CALCULATION */

const startTime = new Date(exam.examStartTime);

const durationSeconds = exam.examDuration * 60;

const now = new Date();

const elapsedSeconds = Math.floor((now - startTime)/1000);

remainingSeconds = durationSeconds - elapsedSeconds;

if(remainingSeconds < 0){
remainingSeconds = 0;
}

startTimer();

}

/* TIMER */

function startTimer(){

setInterval(()=>{

if(remainingSeconds <= 0){

submitExam();

return;

}

remainingSeconds--;

const minutes = Math.floor(remainingSeconds/60);
const seconds = remainingSeconds % 60;

document.getElementById("timer").innerText =
"Time Left: "+minutes+" : "+seconds;

},1000);

}

/* SUBMIT EXAM */

async function submitExam(){

const answer = document.getElementById("answer").value;

await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/student/submit-online-exam",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
assessmentId,
answer
})
});

alert("Exam submitted");

}

loadExam();

</script>

</body>
</html>
