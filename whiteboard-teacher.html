<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Whiteboard</title>

<style>
body { margin:0; font-family:sans-serif; }

.toolbar {
    background:#0f172a;
    padding:10px;
}

button {
    padding:8px 12px;
    margin-right:5px;
    cursor:pointer;
}

canvas {
    background:white;
    display:block;
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="setTool('pen')">Pen</button>
    <button onclick="setTool('eraser')">Eraser</button>
    <button onclick="clearBoard()">Clear</button>
</div>

<canvas id="board"></canvas>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://academy-backend-eatl.onrender.com");

// ✅ SAME ROOM FOR BOTH
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

if(!room){
    alert("Room missing ❌");
}
socket.emit("joinRoom", room);
socket.emit("teacherJoined", room);

// CANVAS
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 50;

let drawing = false;
let tool = "pen";
let lastX = 0;
let lastY = 0;

// START
canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    lastX = e.offsetX;
    lastY = e.offsetY;
});

// STOP
canvas.addEventListener("mouseup", () => {
    drawing = false;
});

// DRAW
canvas.addEventListener("mousemove", (e) => {
    if(!drawing) return;

    ctx.lineWidth = tool === "eraser" ? 20 : 3;
    ctx.strokeStyle = tool === "eraser" ? "#ffffff" : "#000";

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();

    socket.emit("draw", {
        room,
        x1: lastX,
        y1: lastY,
        x2: e.offsetX,
        y2: e.offsetY,
        tool
    });

    lastX = e.offsetX;
    lastY = e.offsetY;
});

// RECEIVE (optional multi-teacher)
socket.on("draw", (data) => {
    ctx.lineWidth = data.tool === "eraser" ? 20 : 3;
    ctx.strokeStyle = data.tool === "eraser" ? "#ffffff" : "#000";

    ctx.beginPath();
    ctx.moveTo(data.x1, data.y1);
    ctx.lineTo(data.x2, data.y2);
    ctx.stroke();
});

function setTool(t){
    tool = t;
}

function clearBoard(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    socket.emit("clear", room);
}

// RECEIVE CLEAR
socket.on("clear", () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
});
</script>

</body>
</html>
