<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Assessment Management</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:40px;
}

.section{
background:white;
padding:25px;
margin-bottom:30px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
background:#123a63;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Assessment Management</h1>

<div class="section">

<h2>All Assessments</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Class</th>
<th>Subject</th>
<th>Total Marks</th>
</tr>
</thead>

<tbody id="assessmentTable"></tbody>

</table>

</div>

<div class="section">

<h2>Modification Requests</h2>

<table>

<thead>
<tr>
<th>Student</th>
<th>Assessment</th>
<th>Approve</th>
</tr>
</thead>

<tbody id="requestTable"></tbody>

</table>

</div>

<script>

const token = localStorage.getItem("token");


/* LOAD ALL ASSESSMENTS */

async function loadAssessments(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/assessments",{

headers:{
"Authorization":"Bearer "+token
}

});

const data = await res.json();

const table = document.getElementById("assessmentTable");

data.assessments.forEach(a=>{

table.innerHTML += `

<tr>

<td>${a.title}</td>
<td>${a.className}</td>
<td>${a.subject}</td>
<td>${a.totalMarks}</td>

</tr>

`;

});

}

loadAssessments();



/* LOAD MODIFICATION REQUESTS */

async function loadRequests(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/founder/modification-requests",{

headers:{
"Authorization":"Bearer "+token
}

});

const data = await res.json();

const table = document.getElementById("requestTable");

data.requests.forEach(r=>{

table.innerHTML += `

<tr>

<td>${r.studentId.name}</td>

<td>${r.assessmentId.title}</td>

<td>
<button onclick="approve('${r._id}')">
Approve
</button>
</td>

</tr>

`;

});

}

loadRequests();



/* APPROVE */

async function approve(markId){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/founder/approve-modification",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
markId:markId
})

});

const data = await res.json();

alert(data.message);

location.reload();

}

</script>

</body>
</html>
