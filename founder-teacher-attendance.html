<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>Teacher Attendance</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.container{
padding:30px;
}

h1{
margin-bottom:20px;
}

select{
padding:10px;
font-size:16px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f1f1f1;
}

.present{
color:green;
font-weight:bold;
}

.late{
color:orange;
font-weight:bold;
}

.absent{
color:red;
font-weight:bold;
}

.compensationBox{

margin-top:30px;
padding:20px;
background:white;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

</style>

</head>

<body class="dashboard-page">

<!-- SIDEBAR -->

<div id="sidebar-container"></div>

<!-- MAIN CONTENT -->

<div class="main-content">

<div class="container">

<h1>Teacher Attendance Report</h1>

<select id="teacherSelect">
<option value="">Select Teacher</option>
</select>

<table>

<thead>

<tr>
<th>Date</th>
<th>Class</th>
<th>Subject</th>
<th>Time</th>
<th>Status</th>
<th>Late Minutes</th>
<th>Compensation Minutes</th>
</tr>

</thead>

<tbody id="attendanceTable"></tbody>

</table>

<div class="compensationBox">

<h3>Total Compensation Minutes:</h3>

<h2 id="totalCompensation">0</h2>

</div>

</div>

</div>

<script>

/* ================= SIDEBAR LOAD ================= */

fetch("sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data;

highlightMenu();

});


function highlightMenu(){

const currentPage = window.location.pathname.split("/").pop();

const items = document.querySelectorAll(".sidebar li");

items.forEach(item => {

if(item.getAttribute("data-page") === currentPage){

item.classList.add("active-menu");

}

});

}

function navigate(page){
window.location.href = page;
}


/* ================= TOKEN CHECK ================= */

const token = localStorage.getItem("token");

if(!token){
window.location.href="founder-login.html";
}


/* ================= LOAD TEACHERS ================= */

async function loadTeachers(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/founder/teachers",
{
headers:{
"Authorization":"Bearer "+token
}
}
);

const data = await res.json();

const select = document.getElementById("teacherSelect");

data.teachers.forEach(t=>{

select.innerHTML +=
`<option value="${t._id}">${t.name}</option>`;

});

}

loadTeachers();



/* ================= TEACHER CHANGE ================= */

document
.getElementById("teacherSelect")
.addEventListener("change",loadAttendance);



/* ================= LOAD ATTENDANCE ================= */

async function loadAttendance(){

const teacherId =
document.getElementById("teacherSelect").value;

if(!teacherId) return;

const res = await fetch(

"https://academy-backend-eatl.onrender.com/api/auth/founder/teacher-attendance-report/"+teacherId,

{
headers:{
"Authorization":"Bearer "+token
}
}

);

const data = await res.json();

const table =
document.getElementById("attendanceTable");

table.innerHTML="";

data.sessions.forEach(s=>{

let statusClass = "";

if(s.status==="Present") statusClass="present";
if(s.status==="Late") statusClass="late";
if(s.status==="Absent") statusClass="absent";

table.innerHTML +=

`<tr>

<td>${new Date(s.date).toLocaleDateString()}</td>

<td>${s.className}</td>

<td>${s.subject}</td>

<td>${s.startTime} - ${s.endTime}</td>

<td class="${statusClass}">
${s.status}
</td>

<td>${s.lateMinutes || 0}</td>

<td>${s.compensationMinutes || 0}</td>

</tr>`;

});


document.getElementById("totalCompensation")
.innerText = data.totalCompensation;

}

</script>

</body>
</html>
