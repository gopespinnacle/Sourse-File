<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Classes</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>

<script>
fetch("teacher-sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h1>My Classes</h1>
<h2>Assigned Students</h2>
<div id="assignedClasses"></div>
<div id="liveClassBox" class="live-class-box" style="display:none">

<h3 style="color:red;">🔴 LIVE NOW</h3>

<p id="liveClassName"></p>

<p id="liveStudentCount"></p>

</div>
<div id="nextClassBox" class="next-class-box">

<h3>Next Class</h3>

<p id="nextClassName">No upcoming class</p>

<p id="nextClassTimer"></p>

</div>

<h2>Today's Classes</h2>
<div id="todayClasses" class="class-grid"></div>

<h2 style="margin-top:40px;">Upcoming Classes</h2>
<div id="upcomingClasses" class="class-grid"></div>

<h2 style="margin-top:40px;">Completed Classes</h2>
<div id="completedClasses" class="class-grid"></div>

</div>

<script>
function convertTo12Hour(time){

let [hours, minutes] = time.split(":");

hours = parseInt(hours);

let ampm = hours >= 12 ? "PM" : "AM";

hours = hours % 12;

hours = hours ? hours : 12;

return hours.toString().padStart(2,'0') + ":" + minutes + " " + ampm;

}
async function loadClasses(){

const token = localStorage.getItem("token");

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/today-sessions",
{
headers:{
"Authorization":"Bearer " + token
}
});

const data = await res.json();

const todayContainer = document.getElementById("todayClasses");
const upcomingContainer = document.getElementById("upcomingClasses");
const completedContainer = document.getElementById("completedClasses");
let nextSession = null;
let nextStartTime = null;
data.sessions.forEach(session => {

const now = new Date();

const [sh,sm] = session.startTime.split(":");
const [eh,em] = session.endTime.split(":");

const start = new Date();
start.setHours(sh,sm,0);

const end = new Date();
end.setHours(eh,em,0);
if(now < start){

if(!nextSession || start < nextStartTime){
nextSession = session;
nextStartTime = start;
}

}
/* open 15 minutes before class */

const openTime = new Date(start.getTime() - 15*60000);

let disabled = true;
let text = "Not Started";

if(now >= openTime && now <= end){
disabled = false;
text = "Open Class";
}
/* LIVE CLASS DISPLAY */

if(now >= start && now <= end){

document.getElementById("liveClassBox").style.display = "block";

document.getElementById("liveClassName").innerText =
session.className + " - " + session.subject;

document.getElementById("liveStudentCount").innerText =
"Students Joined: " + (session.joinedStudents?.length || 0);

}

if(now > end){
text = "Completed";
}

/* CREATE CARD */

const card = `
<div class="class-card">

<h3>${session.className}</h3>

<p>${convertTo12Hour(session.startTime)} - ${convertTo12Hour(session.endTime)}</p>

<button ${disabled ? "disabled":""}
onclick='openClass(${JSON.stringify(session)})'>

${text}

</button>

</div>
`;

/* ADD CARD TO CORRECT SECTION */

/* ADD CARD TO CORRECT SECTION */

if(now > end){

/* completed class */
completedContainer.innerHTML += card;

}else if(now >= openTime && now <= end){

/* live class */
todayContainer.innerHTML += card;

}else{

/* future class */
upcomingContainer.innerHTML += card;

}

});
/* SHOW NEXT CLASS */

if(nextSession){

document.getElementById("nextClassName").innerText =
nextSession.className + " - " + nextSession.subject;

startCountdown(nextStartTime);

}else{

document.getElementById("nextClassName").innerText =
"No more classes today";

document.getElementById("nextClassTimer").innerText = "";

}
}

loadClasses();
loadAssignedClasses();

function openClass(session){

localStorage.setItem("sessionId", session._id);
localStorage.setItem("className", session.className);
localStorage.setItem("subject", session.subject);

window.location.href = "teacher-class.html";

}
function startCountdown(startTime){

setInterval(()=>{

const now = new Date();

const diff = startTime - now;

if(diff <= 0){
document.getElementById("nextClassTimer").innerText = "Starting now";
return;
}

const minutes = Math.floor(diff/60000);
const seconds = Math.floor((diff%60000)/1000);

document.getElementById("nextClassTimer").innerText =
"Starts in " + minutes + "m " + seconds + "s";

},1000);

}
async function loadAssignedClasses(){

const token = localStorage.getItem("token");

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/my-assignments",
{
headers:{
"Authorization":"Bearer " + token
}
});

const data = await res.json();

const container = document.getElementById("assignedClasses");

container.innerHTML = "";

/* GROUP DISPLAY */

data.classes.forEach(c=>{

container.innerHTML += `
<div style="
background:#fff;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
">

<h3>${c.className} - ${c.subject}</h3>

<b>Students:</b><br>

${c.students.map(s=>`<div>• ${s.name}</div>`).join("")}

</div>
`;

});

}
</script>

</body>
</html>
