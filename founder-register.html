<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Founder Register</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.register-box {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.register-box h2 {
    margin-bottom: 20px;
}

.register-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.register-box button {
    width: 100%;
    padding: 10px;
    background: #1e3c72;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.register-box button:hover {
    background: #16325c;
}
</style>
</head>

<body>

<div class="register-box">
    <h2>Founder Registration</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="registerFounder()">Register</button>

    <p style="margin-top:15px;">
        Already have account? 
        <a href="founder-login.html">Login</a>
    </p>
</div>

<script>
async function registerFounder() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
    }

    const response = await fetch("https://academy-backend-eatl.onrender.com/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            email,
            password,
            role: "founder"   // 🔥 IMPORTANT: Hardcoded
        })
    });

    const data = await response.json();

    if (response.ok) {
    alert(data.message || "Founder registered successfully");
    window.location.href = "founder-login.html";
} else {
    alert(data.message || data.error || "Something went wrong");
}
}
</script>

</body>
</html>
