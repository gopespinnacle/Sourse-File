<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: 'Segoe UI';
    background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
}

.sidebar h2 {
    text-align:center;
    padding:20px;
}

.sidebar ul {
    list-style:none;
    padding:0;
}

.sidebar ul li {
    padding:15px;
    cursor:pointer;
    transition:0.3s;
}

.sidebar ul li:hover {
    background:#1e293b;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
}

/* TOPBAR */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
/* CLASS SECTION */
.class-box {
    margin-top:30px;
}

.class-item {
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="sidebar">
    <div style="text-align:center; padding:40px;">
    <img src="images/logo.png" style="width:170px;">
</div>
    <ul>
        <li>🏠 Dashboard</li>
        <li onclick="go('student-class.html')">📅 My Classes</li>
        <li onclick="go('student-homework.html')">📘 Homework</li>
        <li onclick="go('student-results.html')">📊 Results</li>
        <li onclick="logout()">🚪 Logout</li>
    </ul>
</div>

<div class="main">

<div class="topbar">
    <h2>Welcome, <span id="studentName"></span></h2>
</div>
<div class="class-box">
<h3>My Classes</h3>
<div id="classList"></div>
</div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href = "student-login.html";
}

async function loadDashboard(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/student/dashboard",
{
headers:{
"Authorization":"Bearer " + token
}
}
);

const data = await res.json();

document.getElementById("studentName").innerText = data.name;
/* CLASS LIST */

const container = document.getElementById("classList");
container.innerHTML = "";

data.classes.forEach(c=>{
container.innerHTML += `
<div class="class-item">
📘 ${c.subject || "General"} |
🏫 ${c.className} |
📅 ${c.day} |
⏰ ${c.startTime} - ${c.endTime}
</div>
`;
});

}

function logout(){
localStorage.clear();
window.location.href = "student-login.html";
}

function go(page){
window.location.href = page;
}

loadDashboard();

</script>

</body>
</html>
