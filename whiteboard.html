<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/body-pix"></script>
<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const drawCanvas = document.getElementById("drawLayer");
const dctx = drawCanvas.getContext("2d", {
    willReadFrequently: true
});

// 🔥 ADD HERE (exactly here)
const mainBoard = document.getElementById("mainBoard");
const mainCtx = mainBoard.getContext("2d", {
    willReadFrequently: true
});
// 🔥 SCREEN DRAW SETUP
const screenCanvas = document.getElementById("screenDraw");
const screenCtx = screenCanvas.getContext("2d");

// match size properly
function resizeScreenCanvas(){
    screenCanvas.width = screenCanvas.offsetWidth;
    screenCanvas.height = screenCanvas.offsetHeight;
}
resizeScreenCanvas();
window.addEventListener("resize", resizeScreenCanvas);
function getPDFHistoryKey(){
    const pdf = localStorage.getItem("currentPDF") || "default";
    return "pdfHistory_" + pdf;
}
function getHistoryKey(){
    const type = localStorage.getItem("canvasType") || "white";
    return "boardHistory_" + type;
}
// ✅ DRAW ONLY ON MAIN BOARD (NEW ADDITION)
// ===== UNIVERSAL DRAW (MOBILE + MOUSE + STYLUS) =====

let isDrawingPointer = false;

mainBoard.addEventListener("pointerdown", (e) => {

    if(role !== "teacher") return;

    e.preventDefault();

    // 🔥 TEXT TOOL
    if(currentTool === "text"){

        const rect = mainBoard.getBoundingClientRect();

        const x = (e.clientX - rect.left) * (mainBoard.width / rect.width);

        const y = (e.clientY - rect.top) * (mainBoard.height / rect.height);

        createTextInput(x, y);

        return;
    }

    // 🔥 PEN + ERASER ONLY
    if(currentTool !== "pen" && currentTool !== "eraser"){
        return;
    }

    isDrawingPointer = true;

    const rect = mainBoard.getBoundingClientRect();

    prevX = (e.clientX - rect.left) * (mainBoard.width / rect.width);

    prevY = (e.clientY - rect.top) * (mainBoard.height / rect.height);

});

mainBoard.addEventListener("pointermove", (e) => {
    
    e.preventDefault();   // 🔥 VERY IMPORTANT (mobile fix)

    if(!isDrawingPointer) return;
    if(role !== "teacher") return;
if(currentTool !== "pen" && currentTool !== "eraser") return;

    const rect = mainBoard.getBoundingClientRect();

    const x = (e.clientX - rect.left) * (mainBoard.width / rect.width);
    const y = (e.clientY - rect.top) * (mainBoard.height / rect.height);

    mainCtx.beginPath();
mainCtx.moveTo(prevX, prevY);
mainCtx.lineTo(x, y);

mainCtx.lineCap = "round";

// 🔥 ERASER
if(currentTool === "eraser"){

    mainCtx.globalCompositeOperation = "destination-out";
    mainCtx.lineWidth = 25;

}else{

    mainCtx.globalCompositeOperation = "source-over";
    mainCtx.strokeStyle = currentColor;
    mainCtx.lineWidth = 2;
}

mainCtx.stroke();
// 🔥 SAVE DRAWING HISTORY
let key = getHistoryKey();

let history = JSON.parse(localStorage.getItem(key) || "[]");

history.push({
    x1: prevX,
    y1: prevY,
    x2: x,
    y2: y,
    tool: currentTool === "eraser" ? "eraser" : "pen",
    color: currentColor
});

localStorage.setItem(key, JSON.stringify(history));
    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool === "eraser" ? "eraser" : "pen",
        color: currentColor,
        sender: socket.id
    });

    prevX = x;
    prevY = y;
});
mainBoard.addEventListener("pointerup", () => {
    isDrawingPointer = false;
});

mainBoard.addEventListener("pointerleave", () => {
    isDrawingPointer = false;
});

// 🔥 SCREEN DRAW POINTER EVENTS
screenCanvas.addEventListener("pointerdown", (e) => {
    if(role !== "teacher") return;

    isDrawingPointer = true;

    const rect = screenCanvas.getBoundingClientRect();

    prevX = (e.clientX - rect.left) * (screenCanvas.width / rect.width);
    prevY = (e.clientY - rect.top) * (screenCanvas.height / rect.height);
});

screenCanvas.addEventListener("pointermove", (e) => {

    if(!isDrawingPointer) return;
    if(role !== "teacher") return;

    const rect = screenCanvas.getBoundingClientRect();

    const x = (e.clientX - rect.left) * (screenCanvas.width / rect.width);
    const y = (e.clientY - rect.top) * (screenCanvas.height / rect.height);

    screenCtx.beginPath();
    screenCtx.moveTo(prevX, prevY);
    screenCtx.lineTo(x, y);
    screenCtx.strokeStyle = currentColor;
    screenCtx.lineWidth = 3;
    screenCtx.lineCap = "round";
    screenCtx.stroke();

    socket.emit("screenDraw", {
        room,
        prevX,
        prevY,
        x,
        y,
        color: currentColor
    });

    prevX = x;
    prevY = y;
});

screenCanvas.addEventListener("pointerup", () => {
    isDrawingPointer = false;
});
// 🔥 ADD THIS (important)

// full screen size
mainBoard.width = window.innerWidth;
mainBoard.height = window.innerHeight - 90;

// match size


// ✅ allow scroll by default
drawCanvas.style.pointerEvents = "none";


canvas.width = canvas.parentElement.clientWidth;
canvas.height = canvas.parentElement.clientHeight - 40;
drawCanvas.width = window.innerWidth;
drawCanvas.height = window.innerHeight - 90;
let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";
let currentColor = "#000000";
let typingInput = null;
document.getElementById("colorPicker").addEventListener("input", (e) => {
    currentColor = e.target.value;
});

function setTool(tool){

    if(tool === "pen"){
        currentTool = "pen";

        mainBoard.style.touchAction = "none";   // disable scroll
    }

    else if(tool === "eraseDraw"){
        currentTool = "eraser";

        mainBoard.style.touchAction = "none";
    }
else if(tool === "text"){

    currentTool = "text";

    mainBoard.style.touchAction = "none";
}
    else if(tool === "eraser"){   // BACK TO DOC

    currentTool = "none";

    isDrawingPointer = false;

    mainBoard.style.touchAction = "auto";

    // 🔥 CLOSE TEXTBOX
    if(typingInput){

        typingInput.remove();

        typingInput = null;
    }
}
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);
if(role === "teacher"){

    socket.emit("teacherJoined", {
        room
    });

}

// ✅ START VIDEO CALL
(async () => {

    await initMedia();
    setupPeer();

    socket.emit("ready", room);

socket.on("ready", async () => {
    if(role === "teacher"){
        await createOffer();
    }
});

})();

// 🔥 LOAD HISTORY AFTER REFRESH
window.addEventListener("load", () => {

    const type = localStorage.getItem("canvasType") || "white";

    // set dropdown
    document.querySelector("select").value = type;

    // draw background + drawing
    changeCanvasType(type);

    // ✅ ADD THIS PART (PDF RESTORE)
    const savedPDF = localStorage.getItem("currentPDF");
const pdfOpen = localStorage.getItem("pdfOpen");

if(savedPDF && pdfOpen === "true"){
    loadPDFToCanvas(savedPDF);
}

});
/* DRAW START */
drawCanvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;

    prevX = (e.clientX - rect.left) * scaleX;
    prevY = (e.clientY - rect.top) * scaleY;

    drawing = true;

    // ✅ ONLY start path (no drawing here)
    dctx.beginPath();
    dctx.moveTo(prevX, prevY);
});
/* DRAW MOVE */
drawCanvas.addEventListener("mousemove", (e) => {

    if(e.buttons !== 1) return;   // 🔥 ADD THIS LINE
    if(!drawing || role !== "teacher") return;

    if(!drawing || role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
const scaleY = drawCanvas.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;

    drawLine(prevX, prevY, x, y, currentTool,currentColor);

    socket.emit("draw", {
    room,
    prevX,
    prevY,
    x,
    y,
    tool: currentTool,
    color: currentColor,
    sender: socket.id
});
    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool, color){

    const activeCtx = dctx;

    activeCtx.lineCap = "round";
    activeCtx.lineJoin = "round";     // ✅ smooth corners
activeCtx.miterLimit = 1;         // ✅ prevents sharp edges

    if(tool === "eraser"){
        activeCtx.globalCompositeOperation = "destination-out";
        activeCtx.lineWidth = 20;
    } else {
        activeCtx.globalCompositeOperation = "source-over";
        activeCtx.strokeStyle = color || "black";
        activeCtx.lineWidth = 3;
    }

    // 🔥 KEY FIX (smooth continuous drawing)
    activeCtx.beginPath();
    activeCtx.moveTo(x1, y1);
    activeCtx.lineTo(x2, y2);
    activeCtx.stroke();

    if(document.getElementById("pdfWindow").style.display === "block"){

    let key = getPDFHistoryKey();
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.push({
        x1, y1, x2, y2, tool, color
    });

    localStorage.setItem(key, JSON.stringify(history));
} 

}

// SEND OFFER
async function createOffer(){

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("offer", { room, offer });
}

// RECEIVE OFFER
socket.on("offer", async (data) => {

    // ALWAYS ensure peer exists
    if(!pc){
        setupPeer();
    }

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("answer", { room, answer });
});

// RECEIVE ANSWER
socket.on("answer", async (data) => {

    if(!pc) return;

    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
});

socket.on("ice-candidate", async (data) => {

    if(!pc) return;

    try{
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch(e){
        console.error("ICE ERROR:", e);
    }
});

/* RECEIVE DRAW */
socket.on("draw", (data) => {

    // 🔥 prevent drawing your own data again
    if(data.sender === socket.id) return;

    // PDF open → draw on drawLayer
    if(document.getElementById("pdfWindow").style.display === "block"){
        drawLine(data.prevX, data.prevY, data.x, data.y, data.tool, data.color);
        return;
    }

    if(role === "student"){

    let key = getHistoryKey();

    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.push({
        x1: data.prevX,
        y1: data.prevY,
        x2: data.x,
        y2: data.y,
        tool: data.tool,
        color: data.color
    });

    localStorage.setItem(key, JSON.stringify(history));
}

    // main board → draw here
    mainCtx.beginPath();
    mainCtx.moveTo(data.prevX, data.prevY);
    mainCtx.lineTo(data.x, data.y);

    mainCtx.lineCap = "round";

    if(data.tool === "eraser"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = data.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});
socket.on("textDraw", (data) => {

    // clear old text
    mainCtx.clearRect(
        0,
        0,
        mainBoard.width,
        mainBoard.height
    );

    // draw latest text
    drawBigText(data.text, data.color);

});
/* RECEIVE DRAW */
// ✅ ✅ ADD EXACTLY HERE (NEW CODE)
socket.on("screenDraw", (data) => {

    screenCtx.beginPath();
    screenCtx.moveTo(data.prevX, data.prevY);
    screenCtx.lineTo(data.x, data.y);

    screenCtx.strokeStyle = data.color;
    screenCtx.lineWidth = 3;
    screenCtx.lineCap = "round";
    screenCtx.stroke();
});


socket.on("canvasTypeChanged", (data) => {

    // update dropdown only
    document.querySelector("select").value = data.type;

    // 🔥 STOP LOOP
    localStorage.setItem("canvasType", data.type);

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

    if(data.type === "white"){
        mainBoard.style.background = "white";
    }
    else if(data.type === "four"){
        drawFourLines();
    }
    else if(data.type === "one"){
        drawOneLines();
    }

    loadCanvasHistory(data.type);
});
socket.on("loadBoard", (dataArray) => {

    // 🔥 TEACHER IGNORE
    if(role === "teacher") return;

    dataArray.forEach(d => {
        drawLine(d.prevX, d.prevY, d.x, d.y, d.tool, d.color);
    });

});
/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    // clear drawing
    mainCtx.clearRect(0,0,mainBoard.width,mainBoard.height);

function drawFourLines(){

    mainBoard.style.background = "white";

    const gap = 60;  // space between each set

    for(let y = 0; y < mainBoard.height; y += gap){

        // top thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();

        // middle thick line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 20);
        mainCtx.lineTo(mainBoard.width, y + 20);
        mainCtx.strokeStyle = "#8b0000";
        mainCtx.lineWidth = 1.5;
        mainCtx.stroke();

        // bottom thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 40);
        mainCtx.lineTo(mainBoard.width, y + 40);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function drawOneLines(){

    mainBoard.style.background = "white";

    const gap = 40;

    for(let y = 0; y < mainBoard.height; y += gap){

        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#002366";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function loadCanvasHistory(type){

    const key = "boardHistory_" + type;
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    // CLEAR
    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    // REDRAW BACKGROUND
    if(type === "white"){
        mainBoard.style.background = "white";
    }
    else if(type === "four"){
        drawFourLines();
    }
    else if(type === "one"){
        drawOneLines();
    }

    // 🔥 REDRAW SAVED DRAWINGS
    history.forEach(d => {

        mainCtx.beginPath();

        mainCtx.moveTo(d.x1, d.y1);
        mainCtx.lineTo(d.x2, d.y2);

        mainCtx.lineCap = "round";

        if(d.tool === "eraser"){

            mainCtx.globalCompositeOperation = "destination-out";
            mainCtx.lineWidth = 20;

        }else{

            mainCtx.globalCompositeOperation = "source-over";
            mainCtx.strokeStyle = d.color;
            mainCtx.lineWidth = 2;
        }

        mainCtx.stroke();
    });
}

function drawText(text, x, y, color){

    mainCtx.globalCompositeOperation = "source-over";

    mainCtx.font = "28px Arial";

    mainCtx.fillStyle = color || "black";

    mainCtx.fillText(text, x, y);
}
function drawBigText(text, color){

    mainCtx.globalCompositeOperation = "source-over";

    mainCtx.font = "80px Arial";

    mainCtx.fillStyle = color || "black";

    // multi line support
    const lines = text.split("\n");

    let startY = 300;

    lines.forEach((line, index) => {

        mainCtx.fillText(
            line,
            80,
            startY + (index * 100)
        );

    });
}

async function saveAsPDF(){

    // ================= CASE 3 (UPLOADED PDF + DRAWING) =================

    const pages = document.querySelectorAll(".pdfPage");

    for(let i = 0; i < pages.length; i++){

        const pageCanvas = pages[i];

        // create temp canvas
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = pageCanvas.width;
        tempCanvas.height = pageCanvas.height;

        const tempCtx = tempCanvas.getContext("2d");

        // draw PDF page
        tempCtx.drawImage(pageCanvas, 0, 0);

        // draw annotations
        tempCtx.drawImage(drawCanvas, 0, 0);

        const imgData = tempCanvas.toDataURL("image/png");

        if(i > 0) pdf.addPage();

        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
    }

    pdf.save("annotated.pdf");
}

let localStream;

let cartoonCanvas;
let cartoonCtx;

async function initMedia(){

    localStream = await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:false
    });

    const localVideo =
        document.getElementById("localVideo");

    localVideo.srcObject = localStream;

    await localVideo.play();

    cartoonCanvas =
        document.getElementById("cartoonCanvas");

    cartoonCtx =
        cartoonCanvas.getContext("2d");

    function renderCartoon(){

        cartoonCanvas.width =
            localVideo.videoWidth;

        cartoonCanvas.height =
            localVideo.videoHeight;

        // draw video
        cartoonCtx.drawImage(
            localVideo,
            0,
            0,
            cartoonCanvas.width,
            cartoonCanvas.height
        );

        // cartoon effect
        let frame =
            cartoonCtx.getImageData(
                0,
                0,
                cartoonCanvas.width,
                cartoonCanvas.height
            );

        let data = frame.data;

        for(let i=0;i<data.length;i+=4){

            data[i] =
                Math.round(data[i]/32)*32;

            data[i+1] =
                Math.round(data[i+1]/32)*32;

            data[i+2] =
                Math.round(data[i+2]/32)*32;
        }

        cartoonCtx.putImageData(frame,0,0);

        requestAnimationFrame(renderCartoon);
    }

    renderCartoon();

    // 🔥 SEND FILTERED VIDEO
    const filteredStream =
        cartoonCanvas.captureStream(25);

    const audioTrack =
        localStream.getAudioTracks()[0];

    if(audioTrack){

        filteredStream.addTrack(audioTrack);
    }

    localStream = filteredStream;
}
