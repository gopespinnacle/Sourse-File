<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Periods</title>
<link rel="stylesheet" href="style.css">
<style>
 .main-content {
margin-left: 220px; /* adjust based on sidebar width */
padding: 20px;
}
.timetable-container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 15px;
margin-top: 20px;
align-items: start;
width: 100%;
}

.day-column {
    min-height: auto;
background: #f8fafc;
border-radius: 12px;
padding: 10px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.day-header {
background: #2c3e50;
color: white;
padding: 6px;
border-radius: 6px;
text-align: center;
font-size: 14px;
font-weight: bold;
margin-bottom: 8px;
}

.period-card {
background: linear-gradient(135deg, #4f46e5, #3b82f6);
color: white;
border-radius: 12px;
padding: 10px;
margin-bottom: 10px;
font-size: 12px;
line-height: 1.4;
transition: 0.3s;
cursor: pointer;
}

.period-card:hover {
transform: translateY(-3px);
box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* SUBJECT COLORS */
.math { background:#3f51b5; }
.science { background:#009688; }
.language { background:#ff9800; }
.eca { background:#9c27b0; }
.live {
border-left: 4px solid #00e676;
}

.upcoming {
border-left: 4px solid #ffeb3b;
}

.completed {
border-left: 4px solid #9e9e9e;
opacity: 0.7;
}

.starting-soon {
border-left: 4px solid orange;
}

.disabled {
opacity: 0.4;
pointer-events: none;
}
</style>
</head>

<body class="dashboard-page">

<div id="sidebar-container"></div>

<script>
fetch("teacher-sidebar.html")
.then(res => res.text())
.then(data=>{
document.getElementById("sidebar-container").innerHTML=data;
});
</script>

<div class="main-content">

<h1>My Timetable</h1>

<div id="timetable"></div>

<h2 style="margin-top:30px;">Assigned Students</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Class</th>
<th>Subject</th>
<th>Day</th>
<th>Time</th>
<th>Students</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>

<script>

const token = localStorage.getItem("token");
let studentData = [];

async function loadStudentCounts(){
const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/teacher/all-period-assignments",
{
headers:{ "Authorization":"Bearer " + token }
}
);

const data = await res.json();
studentData = data.data || [];
}
/* LOAD TIMETABLE */

async function loadTimetable(){

    const res = await fetch(
        "https://academy-backend-eatl.onrender.com/api/teacher/all-period-assignments",
        {
            headers:{ "Authorization":"Bearer "+token }
        }
    );

    const data = await res.json();

    studentData = data.data || [];

    renderGrid(studentData); 

}



/* LOAD STUDENTS FROM PERIOD DB */

async function loadStudents(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/teacher/all-period-assignments",
{
headers:{ "Authorization":"Bearer "+token }
}
);

const data = await res.json();

const table = document.getElementById("studentTable");

table.innerHTML = "";

data.data.forEach(d=>{

table.innerHTML += `
<tr>
<td>${d.className}</td>
<td>${d.subject}</td>
<td>${d.day}</td>
<td>${d.startTime} - ${d.endTime}</td>
<td>${d.student ? d.student.name : "-"}</td>
</tr>
`;

});

}
function formatTime(time){

let [hour, minute] = time.split(":");

hour = parseInt(hour);

let ampm = hour >= 12 ? "PM" : "AM";

hour = hour % 12;
hour = hour ? hour : 12; // 0 → 12

return `${hour}:${minute} ${ampm}`;
}
function getClassStatus(day, startTime, endTime){

const now = new Date();

const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const todayName = days[now.getDay()];

/* BLOCK OTHER DAYS */
if(day !== todayName){
    return "disabled";
}

/* START TIME */
const [sh, sm] = startTime.split(":");
const start = new Date();
start.setHours(sh, sm, 0);

/* ✅ FIX: USE REAL END TIME */
const [eh, em] = endTime.split(":");
const end = new Date();
end.setHours(eh, em, 0);

/* 10 MIN BEFORE */
const tenMinBefore = new Date(start.getTime() - 10 * 60000);

/* STARTING SOON */
if(now >= tenMinBefore && now < start){
    return "starting-soon";
}

/* LIVE */
if(now >= start && now <= end){
    return "live";
}

/* UPCOMING */
if(now < tenMinBefore){
    return "upcoming";
}

/* DONE */
return "completed";
}

function getTimeText(startTime, endTime){

const now = new Date();

/* START */
const [sh, sm] = startTime.split(":");
const start = new Date();
start.setHours(sh, sm, 0);

/* END */
const [eh, em] = endTime.split(":");
const end = new Date();
end.setHours(eh, em, 0);

/* BEFORE CLASS */
if(now < start){

const diff = Math.floor((start - now)/1000);

const min = Math.floor(diff / 60);
const sec = diff % 60;

return `⏳ Starts in ${min}:${sec.toString().padStart(2,'0')}`;
}

/* DURING CLASS */
if(now >= start && now <= end){

const diff = Math.floor((end - now)/1000);

const min = Math.floor(diff / 60);
const sec = diff % 60;

return `🟢 Ends in ${min}:${sec.toString().padStart(2,'0')}`;
}

/* AFTER */
return "⚪ Completed";

}
function renderGrid(schedule){

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const container = document.getElementById("timetable");
container.innerHTML = "";

container.className = "timetable-container";

/* GROUP BY DAY */
const grouped = {};

days.forEach(d => grouped[d] = []);

schedule.forEach(s=>{

    grouped[s.day].push({
        className: s.className,
        subject: s.subject,
        language: s.language,
        eca: s.eca,
        day: s.day,
        startTime: s.startTime,
        endTime: s.endTime,
        students: s.student ? [s.student] : []
    });

});
// 🔥 SORT BY TIME
days.forEach(day => {
    grouped[day].sort((a, b) => a.startTime.localeCompare(b.startTime));
});
/* TIME FORMAT */
function formatTime(t){
let [h,m] = t.split(":");
h = parseInt(h);

let ampm = h >= 12 ? "PM" : "AM";
h = h % 12 || 12;

return `${h}:${m} ${ampm}`;
}

/* BUILD UI */
days.forEach(day=>{

const column = document.createElement("div");
column.className = "day-column";
column.innerHTML = `<div class="day-header">${day}</div>`;
grouped[day].forEach(s=>{

const match = studentData.find(p => {

const classMatch = p.className.trim() === s.className.trim();

const subjectMatch =
(p.subject && s.subject && p.subject === s.subject) ||
(p.languages && (p.languages.includes(s.subject) || p.languages.includes(s.language))) ||
(p.eca && (p.eca.includes(s.subject) || p.eca.includes(s.eca)));

const dayMatch = p.day === s.day;

const timeMatch = p.startTime.trim().startsWith(s.startTime.trim());

return classMatch && subjectMatch && dayMatch && timeMatch;

});

const count = match?.students?.length || 0;

const div = document.createElement("div");
const timeText = getTimeText(s.startTime, s.endTime);
/* CLICK */
div.style.cursor = "pointer";

div.onclick = () => {

const status = getClassStatus(s.day, s.startTime, s.endTime);

/* ❌ BLOCK IF NOT LIVE OR STARTING SOON */
if(status !== "live" && status !== "starting-soon"){
    alert("Class is not active now ❌");
    return;
}

window.location.href =
"period-students.html?" +
"className=" + encodeURIComponent(s.className) +
"&subject=" + encodeURIComponent(s.subject || "") +
"&eca=" + encodeURIComponent(s.eca || "") +
"&language=" + encodeURIComponent(s.language || "") +
"&day=" + encodeURIComponent(s.day) +
"&startTime=" + encodeURIComponent(s.startTime)+
"&endTime=" + encodeURIComponent(s.endTime);
};

/* TYPE */
let typeClass = "period-card";

if(s.subject?.toLowerCase().includes("math")) typeClass += " math";
else if(s.subject?.toLowerCase().includes("science")) typeClass += " science";
else if(s.language) typeClass += " language";
else if(s.eca) typeClass += " eca";

/* STATUS */
const status = getClassStatus(s.day, s.startTime, s.endTime);

div.className = typeClass + " " + status;

/* LABEL */
let statusLabel = "";

if(status === "live") statusLabel = "🟢 LIVE";
else if(status === "starting-soon") statusLabel = "⏳ Starts in 10 mins";
else if(status === "upcoming") statusLabel = "🟡 UPCOMING";
else if(status === "completed") statusLabel = "⚪ DONE";
else statusLabel = "❌ Not Today";

/* HTML */
div.innerHTML = `

<div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
<span>${s.className}</span>
<span>${statusLabel}</span>
</div>

<div style="margin-top:4px;">
📘 ${s.subject || s.eca || s.language}
</div>

<div style="margin-top:4px;">
⏰ ${formatTime(s.startTime)} - ${formatTime(s.endTime)}<br>
${timeText}
</div>

<div style="margin-top:4px;">
👥 ${count} students
</div>

`;

column.appendChild(div);

});

container.appendChild(column);

});

}
setInterval(() => {
    loadTimetable();
}, 10000);
loadTimetable();
loadStudents();

</script>

</body>
</html>
