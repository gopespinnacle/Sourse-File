<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Whiteboard</title>

<style>

    /* 🔥 REMOVE BLUE DEBUG TEXT */
body > pre,
body > code {
    display: none !important;
}

body > div[style*="white-space"] {
    display: none !important;
}
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
}

.toolbar {
    background:#1e293b;
    padding:10px;
    display:flex;
    gap:10px;

    position:relative;
    z-index:1000;   /* 🔥 ADD THIS */
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.teacher-tools {
    display:none;
}

canvas {
    display:block;
}

#board {
    background:white;
}

#drawLayer {
    background:transparent;   /* 🔥 IMPORTANT */
}

video {
    background: black;
}
#mainBoard {
    touch-action: none;
}
</style>
</head>

<body>

<div class="toolbar">
    <select onchange="changeCanvasType(this.value)">
    <option value="white">White Canvas</option>
    <option value="four">Four Line Canvas</option>
    <option value="one">One Line Canvas</option>
</select>
    <button onclick="setTool('pen')">✏️ Pen</button>
<input type="color" id="colorPicker" value="#000000">
<button onclick="setTool('eraser')">Back to DOC</button>
    <div class="teacher-tools" id="teacherTools">
        <button onclick="clearBoard()">🧹 Clear</button>
    </div>
<button onclick="setTool('eraseDraw')">🧽 Erase</button>
<button onclick="saveAsPDF()">💾 Save PDF</button>
    <button onclick="leaveClass()">🚪 Leave</button>
</div>
<!-- VIDEO SECTION -->
<div style="
    position:fixed;
    top:70px;
    right:10px;
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:5px;
">
    <video id="remoteVideo" autoplay playsinline style="
    width:220px;
    height:150px;
    object-fit:cover;
    border-radius:10px;
"></video>

<video id="localVideo" autoplay muted playsinline style="
    width:100px;
    height:70px;
    position:absolute;
    bottom:5px;
    right:5px;
    object-fit:cover;
    border-radius:10px;
"></video>
</div>
<input type="file" id="fileInput">

<div id="pdfTab" style="
    display:none;
    position:absolute;
    top:60px;
    left:10px;
    background:#1e293b;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
">
    📄 PDF
</div>
<canvas id="mainBoard" style="
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    bottom:0;   /* 🔥 THIS IS THE FIX */
    background:white;
    z-index:1;
"></canvas>
<div id="pdfWindow" style="
    position:absolute;
    top:60px;
    left:60px;
    width:80%;
    height:80%;
    background:white;
    border:2px solid black;
    display:none;
    overflow:auto;
    z-index:10;
">

    <!-- HEADER -->
    <div style="
        height:40px;
        background:#1e293b;
        display:flex;
        justify-content:flex-end;
        align-items:center;
        gap:10px;
        padding:5px;
    ">
        <button onclick="minimizePDF()">🗕</button>
        <button onclick="maximizePDF()">🗖</button>
        <button onclick="closePDF()">❌</button>
    </div>

    <!-- CANVAS -->
    <canvas id="board"></canvas>
    <canvas id="drawLayer" style="
    position:absolute;
    top:0;
    left:0;
    z-index:50;
"></canvas>

</div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const drawCanvas = document.getElementById("drawLayer");
const dctx = drawCanvas.getContext("2d");

// 🔥 ADD HERE (exactly here)
const mainBoard = document.getElementById("mainBoard");
const mainCtx = mainBoard.getContext("2d");
function getPDFHistoryKey(){
    const pdf = localStorage.getItem("currentPDF") || "default";
    return "pdfHistory_" + pdf;
}
function getHistoryKey(){
    const type = localStorage.getItem("canvasType") || "white";
    return "boardHistory_" + type;
}
// ✅ DRAW ONLY ON MAIN BOARD (NEW ADDITION)

let mainDrawing = false;

mainBoard.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    mainDrawing = true;

    const rect = mainBoard.getBoundingClientRect();

const scaleX = mainBoard.width / rect.width;
const scaleY = mainBoard.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;

    mainCtx.beginPath();           // ✅ ADD THIS
prevX = x;
prevY = y;

mainCtx.beginPath();
mainCtx.moveTo(x, y); // ✅ ADD THIS
});

mainBoard.addEventListener("mouseup", () => {
    mainDrawing = false;
});

mainBoard.addEventListener("mouseleave", () => {
    mainDrawing = false;
});

mainBoard.addEventListener("mousemove", (e) => {
let lastEmitTime = 0;
    if(!mainDrawing || role !== "teacher" || currentTool === "none") return;

    const rect = mainBoard.getBoundingClientRect();

    

const scaleX = mainBoard.width / rect.width;
const scaleY = mainBoard.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;
    // 🔥 draw on mainBoard ONLY
    mainCtx.beginPath();        // ✅ reset path each move
mainCtx.moveTo(prevX, prevY);
mainCtx.lineTo(x, y);

// 🔥 SAVE MAIN BOARD DRAWING ALSO
let key = getHistoryKey();
let history = JSON.parse(localStorage.getItem(key) || "[]");

history.push({
    x1: prevX / mainBoard.width,
    y1: prevY / mainBoard.height,
    x2: x / mainBoard.width,
    y2: y / mainBoard.height,
    tool: currentTool,
    color: currentTool === "eraser" ? "erase" : currentColor
});


// ================= MOBILE TOUCH SUPPORT (MAIN BOARD) =================

// TOUCH START
mainBoard.addEventListener("touchstart", (e) => {
    if(role !== "teacher") return;
    if(currentTool === "none") return;

    e.preventDefault();
    mainDrawing = true;

    const rect = mainBoard.getBoundingClientRect();
    const touch = e.touches[0];

    prevX = (touch.clientX - rect.left) * (mainBoard.width / rect.width);
    prevY = (touch.clientY - rect.top) * (mainBoard.height / rect.height);
});

// TOUCH MOVE
mainBoard.addEventListener("touchmove", (e) => {
    if(!mainDrawing || role !== "teacher" || currentTool === "none") return;

    e.preventDefault();

    const rect = mainBoard.getBoundingClientRect();
    const touch = e.touches[0];

    const x = (touch.clientX - rect.left) * (mainBoard.width / rect.width);
    const y = (touch.clientY - rect.top) * (mainBoard.height / rect.height);

    mainCtx.beginPath();
    mainCtx.moveTo(prevX, prevY);
    mainCtx.lineTo(x, y);
    mainCtx.strokeStyle = currentColor;
    mainCtx.lineWidth = 2;
    mainCtx.stroke();

    prevX = x;
    prevY = y;
});

// TOUCH END
mainBoard.addEventListener("touchend", () => {
    mainDrawing = false;
});

localStorage.setItem(key, JSON.stringify(history));
    mainCtx.lineCap = "round";
    mainCtx.lineWidth = 3; 

    if(currentTool === "eraser"){

    mainCtx.globalCompositeOperation = "source-over";
    mainCtx.strokeStyle = "white";   // 🔥 FAKE ERASER
    mainCtx.lineWidth = 20;

} else {
    mainCtx.globalCompositeOperation = "source-over";
    mainCtx.strokeStyle = currentColor;
    mainCtx.lineWidth = 2;
}


    mainCtx.stroke();

    const now = Date.now();

if(!window.lastEmitTime) window.lastEmitTime = 0;

if(now - window.lastEmitTime > 30){

    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool,
        color: currentTool === "eraser" ? "erase" : currentColor,
        sender: socket.id
    });

    window.lastEmitTime = now;
}
    // 🔥 redraw background after erasing
if(currentTool === "eraser"){
    const type = localStorage.getItem("canvasType");

    if(type === "four") drawFourLines();
    else if(type === "one") drawOneLines();
}
// 🔥 redraw background after drawing
    prevX = x;
    prevY = y;
});
// 🔥 ADD THIS (important)

// full screen size
mainBoard.width = window.innerWidth;
mainBoard.height = window.innerHeight - 90;

// match size


// ✅ allow scroll by default
drawCanvas.style.pointerEvents = "none";


canvas.width = canvas.parentElement.clientWidth;
canvas.height = canvas.parentElement.clientHeight - 40;
drawCanvas.width = canvas.width;
drawCanvas.height = canvas.height;
let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";
let currentColor = "#000000";
document.getElementById("colorPicker").addEventListener("input", (e) => {
    currentColor = e.target.value;
});

function setTool(tool){

    if(tool === "pen"){
        currentTool = "pen";
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/pen.png') 2 30, auto";
        drawCanvas.style.pointerEvents = "auto";
    }

    else if(tool === "eraseDraw"){
        // 👉 REAL ERASER
        currentTool = "eraser";
        canvas.style.cursor = "url('https://www.gopespinnacle.com/images/eraser.png') 10 10, auto";
        drawCanvas.style.pointerEvents = "auto";
    }

    else if(tool === "eraser"){
    currentTool = "none";   // 🔥 disables drawing
    drawCanvas.style.pointerEvents = "none";
    mainDrawing = false;
}
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);

// ✅ START VIDEO CALL
(async () => {

    await initMedia();
    setupPeer();

    socket.emit("ready", room);

socket.on("ready", async () => {
    if(role === "teacher"){
        await createOffer();
    }
});

})();

// 🔥 LOAD HISTORY AFTER REFRESH
window.addEventListener("load", () => {

    const type = localStorage.getItem("canvasType") || "white";

    // set dropdown
    document.querySelector("select").value = type;

    // draw background + drawing
    changeCanvasType(type);

    // ✅ ADD THIS PART (PDF RESTORE)
    const savedPDF = localStorage.getItem("currentPDF");
const pdfOpen = localStorage.getItem("pdfOpen");

if(savedPDF && pdfOpen === "true"){
    loadPDFToCanvas(savedPDF);
}

});
/* DRAW START */
drawCanvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;

    prevX = (e.clientX - rect.left) * scaleX;
    prevY = (e.clientY - rect.top) * scaleY;

    drawing = true;

    // ✅ ONLY start path (no drawing here)
    dctx.beginPath();
    dctx.moveTo(prevX, prevY);
});
/* DRAW MOVE */
drawCanvas.addEventListener("mousemove", (e) => {

    if(e.buttons !== 1) return;   // 🔥 ADD THIS LINE
    if(!drawing || role !== "teacher") return;

    if(!drawing || role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
const scaleY = drawCanvas.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;

    drawLine(prevX, prevY, x, y, currentTool,currentColor);

    socket.emit("draw", {
    room,
    prevX,
    prevY,
    x,
    y,
    tool: currentTool,
    color: currentColor,
    sender: socket.id
});
    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool, color){

    const activeCtx =
        document.getElementById("pdfWindow").style.display === "block"
        ? dctx
        : mainCtx;

    activeCtx.lineCap = "round";
    activeCtx.lineJoin = "round";     // ✅ smooth corners
activeCtx.miterLimit = 1;         // ✅ prevents sharp edges

    if(tool === "eraser"){
        activeCtx.globalCompositeOperation = "destination-out";
        activeCtx.lineWidth = 20;
    } else {
        activeCtx.globalCompositeOperation = "source-over";
        activeCtx.strokeStyle = color || "black";
        activeCtx.lineWidth = 3;
    }

    // 🔥 KEY FIX (smooth continuous drawing)
    activeCtx.beginPath();
    activeCtx.moveTo(x1, y1);
    activeCtx.lineTo(x2, y2);
    activeCtx.stroke();

    if(document.getElementById("pdfWindow").style.display === "block"){

    let key = getPDFHistoryKey();
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.push({
        x1, y1, x2, y2, tool, color
    });

    localStorage.setItem(key, JSON.stringify(history));
} 

}

// SEND OFFER
async function createOffer(){

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("offer", { room, offer });
}

// RECEIVE OFFER
socket.on("offer", async (data) => {

    // ALWAYS ensure peer exists
    if(!pc){
        setupPeer();
    }

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("answer", { room, answer });
});

// RECEIVE ANSWER
socket.on("answer", async (data) => {

    if(!pc) return;

    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
});

socket.on("ice-candidate", async (data) => {

    if(!pc) return;

    try{
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch(e){
        console.error("ICE ERROR:", e);
    }
});

/* RECEIVE DRAW */
socket.on("draw", (data) => {

    // 🔥 prevent drawing your own data again
    if(data.sender === socket.id) return;

    // PDF open → draw on drawLayer
    if(document.getElementById("pdfWindow").style.display === "block"){
        drawLine(data.prevX, data.prevY, data.x, data.y, data.tool, data.color);
        return;
    }

    // main board → draw here
    mainCtx.beginPath();
    mainCtx.moveTo(data.prevX, data.prevY);
    mainCtx.lineTo(data.x, data.y);

    mainCtx.lineCap = "round";

    if(data.tool === "eraser" || data.color === "erase"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = data.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});
socket.on("loadBoard", (dataArray) => {

    dataArray.forEach(d => {
        drawLine(d.prevX, d.prevY, d.x, d.y, d.tool,d.color);
    });

});
/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    // clear drawing
    mainCtx.clearRect(0,0,mainBoard.width,mainBoard.height);

    // clear only current canvas history
    localStorage.removeItem(getHistoryKey());

    // 🔥 redraw background lines
    const type = localStorage.getItem("canvasType") || "white";

    if(type === "four") drawFourLines();
    else if(type === "one") drawOneLines();

    socket.emit("clear", room);
}
socket.on("clear", () => {
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    mainCtx.clearRect(0,0,mainBoard.width,mainBoard.height);
});
/* LEAVE */
function leaveClass(){
    window.close();
}

// ================= FILE UPLOAD =================
document.getElementById("fileInput").addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://academy-backend-eatl.onrender.com/upload-file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
console.log("UPLOAD RESPONSE:", data);
    // 🔥 send to students
    socket.emit("loadPDF", {
    room,
    url: data.url
});
localStorage.setItem("currentPDF", data.url);
loadPDFToCanvas(data.url);



});

// ================= DISPLAY FILE =================
    
// ✅ DRAW LAYER ABOVE PDF

// ================= RECEIVE =================


socket.on("loadPDF", (data) => {
    localStorage.setItem("currentPDF", data.url);  // ✅ ADD THIS
    loadPDFToCanvas(data.url);
});

socket.on("closePDF", () => {

    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "none";

    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

    drawCanvas.style.pointerEvents = "none";

    drawCanvas.width = 0;
    drawCanvas.height = 0;

    localStorage.setItem("pdfOpen", "false");
});
async function loadPDFToCanvas(url){
    drawCanvas.style.pointerEvents = "auto";
localStorage.setItem("pdfOpen", "true");
    document.getElementById("pdfWindow").style.display = "block";
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    document.getElementById("pdfTab").style.display = "none";

    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;

    const container = document.getElementById("pdfWindow");

    // 🔥 REMOVE OLD PAGES
    const oldCanvases = container.querySelectorAll("canvas.pdfPage");
    oldCanvases.forEach(c => c.remove());

    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.2 });

        const pageCanvas = document.createElement("canvas");
        pageCanvas.className = "pdfPage";

        pageCanvas.width = viewport.width;
        pageCanvas.height = viewport.height;

        const pageCtx = pageCanvas.getContext("2d");

        await page.render({
            canvasContext: pageCtx,
            viewport: viewport
        }).promise;

        container.appendChild(pageCanvas);
    }
    drawCanvas.width = container.scrollWidth;
drawCanvas.height = container.scrollHeight;

// ✅ LOAD SAVED PDF DRAWING
let key = getPDFHistoryKey();
let history = JSON.parse(localStorage.getItem(key) || "[]");

history.forEach(d => {
    drawLine(d.x1, d.y1, d.x2, d.y2, d.tool, d.color);
});
}

function minimizePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "block";
}

function maximizePDF(){
    const win = document.getElementById("pdfWindow");

    win.style.top = "60px";   // 🔥 keep below toolbar
    win.style.left = "0";
    win.style.width = "100%";
    win.style.height = "calc(100% - 60px)";  // 🔥 reduce height
}

function closePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "none";

    // ✅ clear drawing
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

    // ✅ disable drawing layer interaction
    drawCanvas.style.pointerEvents = "none";

    // ✅ OPTIONAL: reset size (prevents ghost area)
    drawCanvas.width = 0;
    drawCanvas.height = 0;

    // ✅ mark PDF closed
    localStorage.setItem("pdfOpen", "false");
    socket.emit("closePDF", { room });
}
document.getElementById("pdfTab").onclick = function(){
    document.getElementById("pdfWindow").style.display = "block";
    document.getElementById("pdfTab").style.display = "none";
};

function changeCanvasType(type){

    // 🔥 SAVE SELECTED TYPE
    localStorage.setItem("canvasType", type);

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "white"){
        mainBoard.style.background = "white";
    }
    else if(type === "four"){
        drawFourLines();
    }
    else if(type === "one"){
        drawOneLines();
    }

    // 🔥 LOAD THAT CANVAS DRAWING
    loadCanvasHistory(type);
}

function drawFourLines(){

    mainBoard.style.background = "white";

    const gap = 60;  // space between each set

    for(let y = 0; y < mainBoard.height; y += gap){

        // top thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();

        // middle thick line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 20);
        mainCtx.lineTo(mainBoard.width, y + 20);
        mainCtx.strokeStyle = "#8b0000";
        mainCtx.lineWidth = 1.5;
        mainCtx.stroke();

        // bottom thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 40);
        mainCtx.lineTo(mainBoard.width, y + 40);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function drawOneLines(){

    mainBoard.style.background = "white";

    const gap = 40;

    for(let y = 0; y < mainBoard.height; y += gap){

        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#002366";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function loadCanvasHistory(type){

    const key = "boardHistory_" + type;
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "white"){
        mainBoard.style.background = "white";
    }
    else if(type === "four"){
        drawFourLines();
    }
    else if(type === "one"){
        drawOneLines();
    }

    let cleaned = [];

// build clean drawing list
history.forEach(d => {

    if(d.tool === "eraser"){

        // remove nearby strokes
        cleaned = cleaned.filter(line => {
            return !(
                Math.abs(line.x2 - d.x2) < 20 &&
                Math.abs(line.y2 - d.y2) < 20
            );
        });

    } else {
        cleaned.push(d);
    }
});

// draw only cleaned strokes
cleaned.forEach(d => {
    drawLine(d.x1, d.y1, d.x2, d.y2, d.tool, d.color);
});
}

function redrawCanvas(){
    const type = localStorage.getItem("canvasType") || "white";

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "four") drawFourLines();
    else if(type === "one") drawOneLines();

    // redraw all drawing
    const key = getHistoryKey();
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.forEach(d => {

    mainCtx.beginPath();
    mainCtx.moveTo(d.x1 * mainBoard.width, d.y1 * mainBoard.height);
mainCtx.lineTo(d.x2 * mainBoard.width, d.y2 * mainBoard.height);

    if(d.tool === "eraser"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = d.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});
}

async function saveAsPDF(){

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const isPDFOpen = document.getElementById("pdfWindow").style.display === "block";

    // ================= CASE 1 & 2 (WHITE / LINES) =================
    if(!isPDFOpen){

        // convert mainBoard to image
        const imgData = mainBoard.toDataURL("image/png");

        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
        pdf.save("whiteboard.pdf");

        return;
    }

    // ================= CASE 3 (UPLOADED PDF + DRAWING) =================

    const pages = document.querySelectorAll(".pdfPage");

    for(let i = 0; i < pages.length; i++){

        const pageCanvas = pages[i];

        // create temp canvas
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = pageCanvas.width;
        tempCanvas.height = pageCanvas.height;

        const tempCtx = tempCanvas.getContext("2d");

        // draw PDF page
        tempCtx.drawImage(pageCanvas, 0, 0);

        // draw annotations
        tempCtx.drawImage(drawCanvas, 0, 0);

        const imgData = tempCanvas.toDataURL("image/png");

        if(i > 0) pdf.addPage();

        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
    }

    pdf.save("annotated.pdf");
}
