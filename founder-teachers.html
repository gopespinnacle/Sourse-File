<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teachers Management</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.main-content{
    padding:40px;
    background:#f4f7fb;
}
h1{ margin-bottom:25px; color:#123a63; }

.add-btn{
    background:#2e63b6;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}
.add-btn:hover{ background:#1f4e91; }

.filter-section{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
    margin-bottom:25px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);

}
th{
    background:#123a63;
    color:white;
    padding:14px;
    text-align:center;
}
td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}
tr:hover{ background:#f8f9fb; }

.action-btn{
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:3px;
}
.edit-btn{ background:#ffc107; }
.delete-btn{ background:#dc3545; color:white; }
/* EDIT MODAL */

.edit-modal-box{
    background:white;
    width:420px;
    max-height:80vh;
    overflow-y:auto;
    margin:40px auto;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.edit-modal-box h2{
    margin-bottom:20px;
    color:#123a63;
}

.edit-modal-box input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}
.tag-container{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.tag{
padding:8px 14px;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:14px;
}

.tag.active{
background:#123a63;
color:white;
}
.edit-modal-box button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:8px;
}

.edit-modal-box button:first-child{
    background:#123a63;
    color:white;
}

.edit-modal-box button:last-child{
    background:#888;

<script>

fetch("sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data;

highlightMenu();

});

function highlightMenu(){

const currentPage = window.location.pathname.split("/").pop();

const items = document.querySelectorAll(".sidebar li");

items.forEach(item => {

if(item.getAttribute("data-page") === currentPage){

item.classList.add("active-menu");

}

});

}

function navigate(page){
window.location.href = page;
}

</script>

<!-- EDIT TEACHER MODAL -->

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); overflow-y:auto;">

<div class="edit-modal-box">

<h2>Edit Teacher</h2>

<input id="editName" placeholder="Teacher Name">

<div id="editSubjects" class="tag-container"></div>

<label>Select ECA</label>

<div id="editLanguages" class="tag-container"></div>

<input type="number" id="editSessionsWeek" placeholder="Sessions / Week">

<script>
let editingTeacherId = null;
async function editTeacher(id){

const token = localStorage.getItem("token");

const res = await fetch(`http://academy-backend-jpup.onrender.com/api/founder/teacher/${id}`,{
headers:{ "Authorization":"Bearer " + token }
});

const data = await res.json();
const t = data.teacher;

editingTeacherId = id;

document.getElementById("editName").value = t.name;
loadEditCategories(t);

document.getElementById("editExperience").value = t.experience || "";
document.getElementById("editSalaryMonth").value = t.salaryMonth || "";
document.getElementById("editSessionsWeek").value = t.sessionsWeek || "";
document.getElementById("editSalarySession").value = t.salarySession || "";
document.getElementById("editMobile").value = t.mobile || "";
document.getElementById("editWhatsapp").value = t.whatsapp || "";

document.getElementById("editModal").style.display = "block";
document.getElementById("editSalaryMonth").oninput = calculateSession;
document.getElementById("editSalarySession").oninput = calculateMonth;
document.getElementById("editSessionsWeek").oninput = recalculateSalary;
}
async function updateTeacher(){

const token = localStorage.getItem("token");

// ✅ ADD THIS BLOCK
let selectedSubjects = [];
document.querySelectorAll('#editSubjects .tag.active').forEach(tag=>{
selectedSubjects.push(tag.innerText);
});

let selectedECA = [];
document.querySelectorAll('#editEca .tag.active').forEach(tag=>{
selectedECA.push(tag.innerText);
});

let selectedLanguages = [];
document.querySelectorAll('#editLanguages .tag.active').forEach(tag=>{
selectedLanguages.push(tag.innerText);
});

await fetch(`http://academy-backend-jpup.onrender.com/api/founder/update-teacher/${editingTeacherId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body: JSON.stringify({

name: document.getElementById("editName").value,

// ✅ REPLACED HERE
subject: selectedSubjects,
eca: selectedECA,
language: selectedLanguages,

experience: document.getElementById("editExperience").value,
salaryMonth: document.getElementById("editSalaryMonth").value,
sessionsWeek: document.getElementById("editSessionsWeek").value,
salarySession: document.getElementById("editSalarySession").value,
mobile: document.getElementById("editMobile").value,
whatsapp: document.getElementById("editWhatsapp").value

})

});

alert("Teacher Updated");

closeModal();
loadTeachers();

}
const workingDays = 5;

function calculateSession(){

const salaryMonth = Number(document.getElementById("editSalaryMonth").value);
const sessionsWeek = Number(document.getElementById("editSessionsWeek").value);

if(!salaryMonth || !sessionsWeek) return;

const sessionsMonth = sessionsWeek * workingDays;

document.getElementById("editSalarySession").value =
Math.round(salaryMonth / sessionsMonth);

}

function calculateMonth(){

const salarySession = Number(document.getElementById("editSalarySession").value);
const sessionsWeek = Number(document.getElementById("editSessionsWeek").value);

if(!salarySession || !sessionsWeek) return;

const sessionsMonth = sessionsWeek * workingDays;

document.getElementById("editSalaryMonth").value =
Math.round(salarySession * sessionsMonth);

}

function recalculateSalary(){

const salaryMonth = Number(document.getElementById("editSalaryMonth").value);
const salarySession = Number(document.getElementById("editSalarySession").value);
const sessionsWeek = Number(document.getElementById("editSessionsWeek").value);

if(!sessionsWeek) return;

const sessionsMonth = sessionsWeek * workingDays;

if(salaryMonth){
document.getElementById("editSalarySession").value =
Math.round(salaryMonth / sessionsMonth);
}

if(salarySession){
document.getElementById("editSalaryMonth").value =
Math.round(salarySession * sessionsMonth);
}

}
function closeModal(){
document.getElementById("editModal").style.display="none";
}
let teachers = [];

async function loadTeachers(){

    const token = localStorage.getItem("token");

   const response = await fetch("http://academy-backend-jpup.onrender.com/api/founder/teachers",{
    headers:{
        "Authorization":"Bearer " + token
    }
});

    const data = await response.json();
    teachers = data.teachers;

    renderTeachers();
    populateInvoiceDropdown();
    populateFilters();
    renderConsolidatedReport();
}

function renderTeachers(){

    const tbody = document.querySelector("#teacherTable tbody");
    tbody.innerHTML = "";

    teachers.forEach((t)=>{

        tbody.innerHTML += `
        <tr>
            <td>${t.name}</td>
            <td>${t.subject ? t.subject.join(", ") : "-"}</td>
            <td>${t.eca ? t.eca.join(", ") : "-"}</td>         <!-- ✅ ADD -->

<td>${t.language ? t.language.join(", ") : "-"}</td> <!-- ✅ ADD -->
            <td>${t.experience ? t.experience + " yrs" : "-"}</td>
            <td>${t.salaryMonth ? "₹ " + Number(t.salaryMonth).toLocaleString() : "-"}</td>
            <td>${t.sessionsWeek || "-"}</td>
<td>${t.salarySession ? "₹ " + Number(t.salarySession).toLocaleString() : "-"}</td>
<td>${t.attendanceDays || 0}</td>
            <td>${new Date(t.createdAt).toLocaleDateString()}</td>
            <td>
    <button class="action-btn" onclick="viewDetails('${t._id}')">Details</button>
    <button class="action-btn edit-btn" onclick="editTeacher('${t._id}')">Edit</button>
    <button class="action-btn delete-btn" onclick="deleteTeacher('${t._id}')">Delete</button>
    <button class="action-btn" onclick="updateAttendance('${t._id}')">
Attendance
</button>
</td>
        </tr>`;
    });

}
function populateInvoiceDropdown(){

    const select = document.getElementById("invoiceTeacher");
    select.innerHTML = `<option value="">Select Teacher</option>`;

    teachers.forEach(t=>{
        select.innerHTML += `<option value="${t._id}">${t.name}</option>`;
    });
}
function populateFilters(){

    const nameSelect = document.getElementById("filterName");
    const subjectSelect = document.getElementById("filterSubject");

    nameSelect.innerHTML = `<option value="">Filter by Teacher Name</option>`;
    subjectSelect.innerHTML = `<option value="">Filter by Subject</option>`;

    const subjects = new Set();

    teachers.forEach(t=>{
        nameSelect.innerHTML += `<option value="${t.name}">${t.name}</option>`;
        if(t.subject){
            subjects.add(t.subject);
        }
    });

    subjects.forEach(sub=>{
        subjectSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
    });
}
function renderConsolidatedReport(){

    const subjectMap = {};

    teachers.forEach(t=>{

        if(!t.subject) return;

        if(!subjectMap[t.subject]){
            subjectMap[t.subject] = {
                count: 0,
                total: 0
            };
        }

        subjectMap[t.subject].count++;
        subjectMap[t.subject].total += Number(t.salaryMonth || 0);
    });

    const body = document.querySelector("#consolidatedTable tbody");
    body.innerHTML = "";

    for(let sub in subjectMap){

        body.innerHTML += `
        <tr>
            <td>${sub}</td>
            <td>${subjectMap[sub].count}</td>
            <td>₹ ${subjectMap[sub].total.toLocaleString()}</td>
        </tr>`;
    }
}
async function viewDetails(id){

    const token = localStorage.getItem("token");

    const response = await fetch(`http://academy-backend-jpup.onrender.com/api/founder/teacher/${id}`,{
        headers:{
            "Authorization":"Bearer " + token
        }
    });

    const data = await response.json();
    const t = data.teacher;

    alert(`
Name: ${t.name}
Email: ${t.email}

Subject: ${t.subject ? t.subject.join(", ") : "-"}
ECA: ${t.eca ? t.eca.join(", ") : "-"}
Language: ${t.language ? t.language.join(", ") : "-"}

Experience: ${t.experience || "-"} yrs

Salary / Month: ₹ ${t.salaryMonth || "-"}
Sessions / Week: ${t.sessionsWeek || "-"}
Salary / Session: ₹ ${t.salarySession || "-"}

Attendance Days: ${t.attendanceDays || 0}

Mobile: ${t.mobile || "-"}
WhatsApp: ${t.whatsapp || "-"}

Assigned Students: ${t.assignedStudents ? t.assignedStudents.length : 0}
Assigned Classes: ${t.assignedClasses ? t.assignedClasses.length : 0}

Created: ${new Date(t.createdAt).toLocaleString()}
Updated: ${new Date(t.updatedAt).toLocaleString()}
`);
}
async function deleteTeacher(id){

const confirmDelete = confirm("Are you sure you want to delete this teacher?");
if(!confirmDelete) return;

const token = localStorage.getItem("token");

const response = await fetch(`http://academy-backend-jpup.onrender.com/api/founder/delete-teacher/${id}`,{
method:"DELETE",
headers:{
"Authorization":"Bearer " + token
}
});

const data = await response.json();

if(response.ok){
alert("Teacher Deleted Successfully");
loadTeachers();
}else{
alert(data.message || "Delete failed");
}

}
</script>

document.getElementById("filterName").value = "";

loadTeachers();

}

async function updateAttendance(id){

const days = prompt("Enter present days for this month");

if(!days) return;

const token = localStorage.getItem("token");

await fetch(`http://academy-backend-jpup.onrender.com/api/auth/founder/update-attendance/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body: JSON.stringify({
attendanceDays: days
})

});

alert("Attendance updated");

loadTeachers();

}
async function loadEditCategories(teacher){

const subjectsArr = teacher.subject || [];
const ecaArr = teacher.eca || [];
const langArr = teacher.language || [];

// SUBJECT
const subRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/subject");
const subData = await subRes.json();

const subContainer = document.getElementById("editSubjects");
subContainer.innerHTML = "";

subData.data.forEach(s => {
const active = subjectsArr.includes(s.name) ? "active" : "";

subContainer.innerHTML += `
<div class="tag ${active}" onclick="toggleTag(this)">
${s.name}
</div>`;
});

// ECA
const ecaRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/eca");
const ecaData = await ecaRes.json();

const ecaContainer = document.getElementById("editEca");
ecaContainer.innerHTML = "";

ecaData.data.forEach(s => {
const active = ecaArr.includes(s.name) ? "active" : "";

ecaContainer.innerHTML += `
<div class="tag ${active}" onclick="toggleTag(this)">
${s.name}
</div>`;
});

// LANGUAGE
const langRes = await fetch("http://academy-backend-jpup.onrender.com/api/founder/categories/language");
const langData = await langRes.json();

const langContainer = document.getElementById("editLanguages");
langContainer.innerHTML = "";

langData.data.forEach(s => {
const active = langArr.includes(s.name) ? "active" : "";

langContainer.innerHTML += `
<div class="tag ${active}" onclick="toggleTag(this)">
${s.name}
</div>`;
});
}
function toggleTag(el){
el.classList.toggle("active");
}
function applyFilter() {

    let name = document.querySelectorAll("select")[1].value.toLowerCase();
    let subject = document.querySelectorAll("select")[2].value.toLowerCase();

    let rows = document.querySelectorAll("table tbody tr");

    rows.forEach(row => {

        let teacherName = row.cells[0].innerText.toLowerCase();
        let teacherSubject = row.cells[1].innerText.toLowerCase();

        if (
            (name === "" || teacherName.includes(name)) &&
            (subject === "" || teacherSubject.includes(subject))
        ) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }

    });
}
