<body>

</div>

        <span>📺 Live</span>

            <button onclick="minimizePiP()">➖</button>

        </div>
    </div>

   <!-- REMOTE VIDEO -->
<video id="remoteVideo" autoplay playsinline></video>

<!-- DRAW -->
<canvas id="screenDraw"></canvas>

<!-- TEACHER VIDEO INSIDE -->

    <video id="localVideo" autoplay muted playsinline></video>

</div>

</div>
        <!-- LOCAL SMALL PREVIEW -->
    
<input type="file" id="fileInput">

<div id="pdfTab" style="
    display:none;
    position:absolute;
    top:60px;
    left:10px;
    background:#1e293b;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
">
    📄 PDF
</div>

<video id="screenVideo"
    autoplay
     muted
    playsinline
    style="
        position:absolute;
        top:80px;
        left:0;
        width:100%;
        height:calc(100% - 80px);
        object-fit:contain;
        background:black;
        z-index:2;
        display:none;
    ">
</video>
<canvas id="mainBoard" style="
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    bottom:0;   /* 🔥 THIS IS THE FIX */
  background:transparent;
z-index:5;
pointer-events:auto;
"></canvas>
<div id="pdfWindow" style="
    position:absolute;
    top:60px;
    left:60px;
    width:80%;
    height:80%;
    background:white;
    border:2px solid black;
    display:none;
    overflow:auto;
    z-index:10;
">

    <!-- HEADER -->
    <div style="
        height:40px;
        background:#1e293b;
        display:flex;
        justify-content:flex-end;
        align-items:center;
        gap:10px;
        padding:5px;
    ">
        <button onclick="minimizePDF()">🗕</button>
        <button onclick="maximizePDF()">🗖</button>
        <button onclick="closePDF()">❌</button>
    </div>

    <!-- CANVAS -->
    <canvas id="board"></canvas>
    <canvas id="drawLayer" style="
    position:absolute;
    top:0;
    left:0;
    z-index:50;
"></canvas>

</div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

const params = new URLSearchParams(window.location.search);
const room = params.get("room");
const role = params.get("role");

const socket = io("https://academy-backend-eatl.onrender.com", {
    transports: ["websocket"]
});

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const drawCanvas = document.getElementById("drawLayer");
const dctx = drawCanvas.getContext("2d");

// 🔥 ADD HERE (exactly here)
const mainBoard = document.getElementById("mainBoard");
const mainCtx = mainBoard.getContext("2d");
const screenVideo = document.getElementById("screenVideo");
// 🔥 SCREEN DRAW SETUP
const screenCanvas = document.getElementById("screenDraw");
const screenCtx = screenCanvas.getContext("2d");

// match size properly
function resizeScreenCanvas(){
    screenCanvas.width = screenCanvas.offsetWidth;
    screenCanvas.height = screenCanvas.offsetHeight;
}
resizeScreenCanvas();
window.addEventListener("resize", resizeScreenCanvas);
function getPDFHistoryKey(){
    const pdf = localStorage.getItem("currentPDF") || "default";
    return "pdfHistory_" + pdf;
}
function getHistoryKey(){
    const type = localStorage.getItem("canvasType") || "white";
    return "boardHistory_" + type;
}
// ✅ DRAW ONLY ON MAIN BOARD (NEW ADDITION)
// ===== UNIVERSAL DRAW (MOBILE + MOUSE + STYLUS) =====

let isDrawingPointer = false;
// 🔥 ENABLE DRAW ONLY FOR TEACHER
if(role === "teacher"){
    mainBoard.style.pointerEvents = "auto";
}
mainBoard.addEventListener("pointerdown", (e) => {
    if(role !== "teacher") return;
    if(currentTool !== "pen") return;   // 🔥 ONLY allow pen

    e.preventDefault();

    isDrawingPointer = true;

    const rect = mainBoard.getBoundingClientRect();

    prevX = (e.clientX - rect.left) * (mainBoard.width / rect.width);
    prevY = (e.clientY - rect.top) * (mainBoard.height / rect.height);
});

mainBoard.addEventListener("pointermove", (e) => {
    e.preventDefault();   // 🔥 VERY IMPORTANT (mobile fix)

    if(!isDrawingPointer) return;
    if(role !== "teacher") return;
    if(currentTool !== "pen") return;

    const rect = mainBoard.getBoundingClientRect();

    const x = (e.clientX - rect.left) * (mainBoard.width / rect.width);
    const y = (e.clientY - rect.top) * (mainBoard.height / rect.height);

    mainCtx.beginPath();
    mainCtx.moveTo(prevX, prevY);
    mainCtx.lineTo(x, y);

    mainCtx.strokeStyle = currentColor;
    mainCtx.lineWidth = 2;

    mainCtx.lineCap = "round";   // 🔥 ADD (smooth line)
    mainCtx.stroke();

    socket.emit("draw", {
        room,
        prevX,
        prevY,
        x,
        y,
        tool: currentTool,
        color: currentColor,
        sender: socket.id
    });

    prevX = x;
    prevY = y;
});
mainBoard.addEventListener("pointerup", () => {
    isDrawingPointer = false;
});

mainBoard.addEventListener("pointerleave", () => {
    isDrawingPointer = false;
});

// 🔥 SCREEN DRAW POINTER EVENTS
screenCanvas.addEventListener("pointerdown", (e) => {
    if(role !== "teacher") return;

    isDrawingPointer = true;

    const rect = screenCanvas.getBoundingClientRect();

    prevX = (e.clientX - rect.left) * (screenCanvas.width / rect.width);
    prevY = (e.clientY - rect.top) * (screenCanvas.height / rect.height);
});

screenCanvas.addEventListener("pointermove", (e) => {

    if(!isDrawingPointer) return;
    if(role !== "teacher") return;

    const rect = screenCanvas.getBoundingClientRect();

    const x = (e.clientX - rect.left) * (screenCanvas.width / rect.width);
    const y = (e.clientY - rect.top) * (screenCanvas.height / rect.height);

    screenCtx.beginPath();
    screenCtx.moveTo(prevX, prevY);
    screenCtx.lineTo(x, y);
    screenCtx.strokeStyle = currentColor;
    screenCtx.lineWidth = 3;
    screenCtx.lineCap = "round";
    screenCtx.stroke();

    socket.emit("screenDraw", {
        room,
        prevX,
        prevY,
        x,
        y,
        color: currentColor
    });

    prevX = x;
    prevY = y;
});

screenCanvas.addEventListener("pointerup", () => {
    isDrawingPointer = false;
});
// 🔥 ADD THIS (important)

// full screen size
mainBoard.width = window.innerWidth;
mainBoard.height = window.innerHeight - 90;

// match size


// ✅ allow scroll by default
drawCanvas.style.pointerEvents = "none";


canvas.width = canvas.parentElement.clientWidth;
canvas.height = canvas.parentElement.clientHeight - 40;
drawCanvas.width = canvas.width;
drawCanvas.height = canvas.height;
let drawing = false;
let prevX = 0;
let prevY = 0;

/* ✅ TOOL */
let currentTool = "pen";
let currentColor = "#000000";
document.getElementById("colorPicker").addEventListener("input", (e) => {
    currentColor = e.target.value;
});

function setTool(tool){

    if(tool === "pen"){
        currentTool = "pen";

        mainBoard.style.touchAction = "none";   // disable scroll
    }

    else if(tool === "eraseDraw"){
        currentTool = "eraser";

        mainBoard.style.touchAction = "none";
    }

    else if(tool === "eraser"){   // BACK TO DOC
        currentTool = "none";

        isDrawingPointer = false;

        mainBoard.style.touchAction = "auto";   // enable scroll
    }
}

/* ROLE */
if(role === "teacher"){
    document.getElementById("teacherTools").style.display = "block";
}

/* JOIN */
socket.emit("joinRoom", room);

// ✅ START VIDEO CALL
(async () => {

    await initMedia();
    setupPeer();

    socket.emit("ready", room);

socket.on("ready", async () => {
    if(role === "teacher"){
        await createOffer();
    }
});

})();

// 🔥 LOAD HISTORY AFTER REFRESH
window.addEventListener("load", () => {

    const type = localStorage.getItem("canvasType") || "white";

    // set dropdown
    document.querySelector("select").value = type;

    // draw background + drawing
    changeCanvasType(type);

    // ✅ ADD THIS PART (PDF RESTORE)
    const savedPDF = localStorage.getItem("currentPDF");
const pdfOpen = localStorage.getItem("pdfOpen");

if(savedPDF && pdfOpen === "true"){
    loadPDFToCanvas(savedPDF);
}

});
/* DRAW START */
drawCanvas.addEventListener("mousedown", (e) => {
    if(role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;

    prevX = (e.clientX - rect.left) * scaleX;
    prevY = (e.clientY - rect.top) * scaleY;

    drawing = true;

    // ✅ ONLY start path (no drawing here)
    dctx.beginPath();
    dctx.moveTo(prevX, prevY);
});
/* DRAW MOVE */
drawCanvas.addEventListener("mousemove", (e) => {

    if(e.buttons !== 1) return;   // 🔥 ADD THIS LINE
    if(!drawing || role !== "teacher") return;

    if(!drawing || role !== "teacher") return;

    const rect = drawCanvas.getBoundingClientRect();

    const scaleX = drawCanvas.width / rect.width;
const scaleY = drawCanvas.height / rect.height;

const x = (e.clientX - rect.left) * scaleX;
const y = (e.clientY - rect.top) * scaleY;

    drawLine(prevX, prevY, x, y, currentTool,currentColor);

    socket.emit("draw", {
    room,
    prevX,
    prevY,
    x,
    y,
    tool: currentTool,
    color: currentColor,
    sender: socket.id
});
    prevX = x;
    prevY = y;
});

/* 🔥 DRAW FUNCTION WITH ERASER */
function drawLine(x1, y1, x2, y2, tool, color){

    const activeCtx =
        document.getElementById("pdfWindow").style.display === "block"
        ? dctx
        : mainCtx;

    activeCtx.lineCap = "round";
    activeCtx.lineJoin = "round";     // ✅ smooth corners
activeCtx.miterLimit = 1;         // ✅ prevents sharp edges

    if(tool === "eraser"){
        activeCtx.globalCompositeOperation = "destination-out";
        activeCtx.lineWidth = 20;
    } else {
        activeCtx.globalCompositeOperation = "source-over";
        activeCtx.strokeStyle = color || "black";
        activeCtx.lineWidth = 3;
    }

    // 🔥 KEY FIX (smooth continuous drawing)
    activeCtx.beginPath();
    activeCtx.moveTo(x1, y1);
    activeCtx.lineTo(x2, y2);
    activeCtx.stroke();

    if(document.getElementById("pdfWindow").style.display === "block"){

    let key = getPDFHistoryKey();
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.push({
        x1, y1, x2, y2, tool, color
    });

    localStorage.setItem(key, JSON.stringify(history));
} 

}

// SEND OFFER
async function createOffer(){

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("offer", { room, offer });
}

// RECEIVE OFFER
socket.on("offer", async (data) => {

    // ALWAYS ensure peer exists
    if(!pc){
        setupPeer();
    }

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("answer", { room, answer });
});

// RECEIVE ANSWER
socket.on("answer", async (data) => {

    if(!pc) return;

    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
});

socket.on("ice-candidate", async (data) => {

    if(!pc) return;

    try{
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch(e){
        console.error("ICE ERROR:", e);
    }
});

/* RECEIVE DRAW */
socket.on("draw", (data) => {

    // 🔥 prevent drawing your own data again
    if(data.sender === socket.id) return;

    // PDF open → draw on drawLayer
    if(document.getElementById("pdfWindow").style.display === "block"){
        drawLine(data.prevX, data.prevY, data.x, data.y, data.tool, data.color);
        return;
    }

    // main board → draw here
    mainCtx.beginPath();
    mainCtx.moveTo(data.prevX, data.prevY);
    mainCtx.lineTo(data.x, data.y);

    mainCtx.lineCap = "round";

    if(data.tool === "eraser" || data.color === "erase"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = data.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});

/* RECEIVE DRAW */
socket.on("draw", (data) => {

    if(data.sender === socket.id) return;

    if(document.getElementById("pdfWindow").style.display === "block"){
        drawLine(data.prevX, data.prevY, data.x, data.y, data.tool, data.color);
        return;
    }

    mainCtx.beginPath();
    mainCtx.moveTo(data.prevX, data.prevY);
    mainCtx.lineTo(data.x, data.y);

    mainCtx.lineCap = "round";

    if(data.tool === "eraser" || data.color === "erase"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = data.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});


// ✅ ✅ ADD EXACTLY HERE (NEW CODE)
socket.on("screenDraw", (data) => {

    screenCtx.beginPath();
    screenCtx.moveTo(data.prevX, data.prevY);
    screenCtx.lineTo(data.x, data.y);

    screenCtx.strokeStyle = data.color;
    screenCtx.lineWidth = 3;
    screenCtx.lineCap = "round";
    screenCtx.stroke();
});
socket.on("loadBoard", (dataArray) => {

    dataArray.forEach(d => {
        drawLine(d.prevX, d.prevY, d.x, d.y, d.tool,d.color);
    });

});
/* CLEAR */
function clearBoard(){
    if(role !== "teacher") return;

    // clear drawing
    mainCtx.clearRect(0,0,mainBoard.width,mainBoard.height);

    // clear only current canvas history
    localStorage.removeItem(getHistoryKey());

    // 🔥 redraw background lines
    const type = localStorage.getItem("canvasType") || "white";

    if(type === "four") drawFourLines();
    else if(type === "one") drawOneLines();

    socket.emit("clear", room);
}
socket.on("clear", () => {
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    mainCtx.clearRect(0,0,mainBoard.width,mainBoard.height);
});
/* LEAVE */
function leaveClass(){
    window.close();
}

// ================= FILE UPLOAD =================
document.getElementById("fileInput").addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://academy-backend-eatl.onrender.com/upload-file", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
console.log("UPLOAD RESPONSE:", data);
    // 🔥 send to students
    socket.emit("loadPDF", {
    room,
    url: data.url
});
localStorage.setItem("currentPDF", data.url);
loadPDFToCanvas(data.url);



});

// ================= DISPLAY FILE =================
    
// ✅ DRAW LAYER ABOVE PDF

// ================= RECEIVE =================


socket.on("loadPDF", (data) => {
    localStorage.setItem("currentPDF", data.url);  // ✅ ADD THIS
    loadPDFToCanvas(data.url);
});

socket.on("closePDF", () => {

    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "none";

    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

    drawCanvas.style.pointerEvents = "none";

    drawCanvas.width = 0;
    drawCanvas.height = 0;

    localStorage.setItem("pdfOpen", "false");
});
async function loadPDFToCanvas(url){
    drawCanvas.style.pointerEvents = "auto";
localStorage.setItem("pdfOpen", "true");
    document.getElementById("pdfWindow").style.display = "block";
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    document.getElementById("pdfTab").style.display = "none";

    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;

    const container = document.getElementById("pdfWindow");

    // 🔥 REMOVE OLD PAGES
    const oldCanvases = container.querySelectorAll("canvas.pdfPage");
    oldCanvases.forEach(c => c.remove());

    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.2 });

        const pageCanvas = document.createElement("canvas");
        pageCanvas.className = "pdfPage";

        pageCanvas.width = viewport.width;
        pageCanvas.height = viewport.height;

        const pageCtx = pageCanvas.getContext("2d");

        await page.render({
            canvasContext: pageCtx,
            viewport: viewport
        }).promise;

        container.appendChild(pageCanvas);
    }
    drawCanvas.width = container.scrollWidth;
drawCanvas.height = container.scrollHeight;

// ✅ LOAD SAVED PDF DRAWING
let key = getPDFHistoryKey();
let history = JSON.parse(localStorage.getItem(key) || "[]");

history.forEach(d => {
    drawLine(d.x1, d.y1, d.x2, d.y2, d.tool, d.color);
});
}

function minimizePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "block";
}

function maximizePDF(){
    const win = document.getElementById("pdfWindow");

    win.style.top = "60px";   // 🔥 keep below toolbar
    win.style.left = "0";
    win.style.width = "100%";
    win.style.height = "calc(100% - 60px)";  // 🔥 reduce height
}

function closePDF(){
    document.getElementById("pdfWindow").style.display = "none";
    document.getElementById("pdfTab").style.display = "none";

    // ✅ clear drawing
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);

    // ✅ disable drawing layer interaction
    drawCanvas.style.pointerEvents = "none";

    // ✅ OPTIONAL: reset size (prevents ghost area)
    drawCanvas.width = 0;
    drawCanvas.height = 0;

    // ✅ mark PDF closed
    localStorage.setItem("pdfOpen", "false");
    socket.emit("closePDF", { room });
}
document.getElementById("pdfTab").onclick = function(){
    document.getElementById("pdfWindow").style.display = "block";
    document.getElementById("pdfTab").style.display = "none";
};

function changeCanvasType(type){

    // 🔥 SAVE SELECTED TYPE
    localStorage.setItem("canvasType", type);

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "white"){
    mainBoard.style.background = "transparent";
}
    else if(type === "four"){
        drawFourLines();
    }
    else if(type === "one"){
        drawOneLines();
    }

    // 🔥 LOAD THAT CANVAS DRAWING
    loadCanvasHistory(type);
}

function drawFourLines(){

    mainBoard.style.background = "transparent";

    const gap = 60;  // space between each set

    for(let y = 0; y < mainBoard.height; y += gap){

        // top thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();

        // middle thick line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 20);
        mainCtx.lineTo(mainBoard.width, y + 20);
        mainCtx.strokeStyle = "#8b0000";
        mainCtx.lineWidth = 1.5;
        mainCtx.stroke();

        // bottom thin line
        mainCtx.beginPath();
        mainCtx.moveTo(0, y + 40);
        mainCtx.lineTo(mainBoard.width, y + 40);
        mainCtx.strokeStyle = "#035096";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function drawOneLines(){

    mainBoard.style.background = "transparent";

    const gap = 40;

    for(let y = 0; y < mainBoard.height; y += gap){

        mainCtx.beginPath();
        mainCtx.moveTo(0, y);
        mainCtx.lineTo(mainBoard.width, y);
        mainCtx.strokeStyle = "#002366";
        mainCtx.lineWidth = 1;
        mainCtx.stroke();
    }
}

function loadCanvasHistory(type){

    const key = "boardHistory_" + type;
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "white"){
        mainBoard.style.background = "white";
    }
    else if(type === "four"){
        drawFourLines();
    }
    else if(type === "one"){
        drawOneLines();
    }

    let cleaned = [];

// build clean drawing list
history.forEach(d => {

    if(d.tool === "eraser"){

        // remove nearby strokes
        cleaned = cleaned.filter(line => {
            return !(
                Math.abs(line.x2 - d.x2) < 20 &&
                Math.abs(line.y2 - d.y2) < 20
            );
        });

    } else {
        cleaned.push(d);
    }
});

// draw only cleaned strokes
cleaned.forEach(d => {
    drawLine(d.x1, d.y1, d.x2, d.y2, d.tool, d.color);
});
}

function redrawCanvas(){
    const type = localStorage.getItem("canvasType") || "white";

    mainCtx.clearRect(0, 0, mainBoard.width, mainBoard.height);

    if(type === "four") drawFourLines();
    else if(type === "one") drawOneLines();

    // redraw all drawing
    const key = getHistoryKey();
    let history = JSON.parse(localStorage.getItem(key) || "[]");

    history.forEach(d => {

    mainCtx.beginPath();
    mainCtx.moveTo(d.x1 * mainBoard.width, d.y1 * mainBoard.height);
mainCtx.lineTo(d.x2 * mainBoard.width, d.y2 * mainBoard.height);

    if(d.tool === "eraser"){
        mainCtx.globalCompositeOperation = "destination-out";
        mainCtx.lineWidth = 20;
    } else {
        mainCtx.globalCompositeOperation = "source-over";
        mainCtx.strokeStyle = d.color;
        mainCtx.lineWidth = 2;
    }

    mainCtx.stroke();
});
}

async function saveAsPDF(){

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const isPDFOpen = document.getElementById("pdfWindow").style.display === "block";

    // ================= CASE 1 & 2 (WHITE / LINES) =================
    if(!isPDFOpen){

        // convert mainBoard to image
        const imgData = mainBoard.toDataURL("image/png");

        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
        pdf.save("whiteboard.pdf");

        return;
    }

    // ================= CASE 3 (UPLOADED PDF + DRAWING) =================

    const pages = document.querySelectorAll(".pdfPage");

    for(let i = 0; i < pages.length; i++){

        const pageCanvas = pages[i];

        // create temp canvas
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = pageCanvas.width;
        tempCanvas.height = pageCanvas.height;

        const tempCtx = tempCanvas.getContext("2d");

        // draw PDF page
        tempCtx.drawImage(pageCanvas, 0, 0);

        // draw annotations
        tempCtx.drawImage(drawCanvas, 0, 0);

        const imgData = tempCanvas.toDataURL("image/png");

        if(i > 0) pdf.addPage();

        pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
    }

    pdf.save("annotated.pdf");
}

async function stopScreenShare(){

    if(!screenStream) return;

    const videoTrack = localStream.getVideoTracks()[0];

    const sender = pc.getSenders().find(s =>
        s.track && s.track.kind === "video"
    );

    if(sender){

    await sender.replaceTrack(videoTrack);

    // 🔥 RETURN CAMERA
    const offer = await pc.createOffer();

    socket.emit("offer", {
        room,
        offer
    });
}

    screenStream.getTracks().forEach(track => track.stop());

    screenStream = null;
}

const pip = document.getElementById("screenContainer");
const header = document.getElementById("pipHeader");

let isDragging = false;
let offsetX, offsetY;

header.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - pip.offsetLeft;
    offsetY = e.clientY - pip.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    pip.style.left = (e.clientX - offsetX) + "px";
    pip.style.top = (e.clientY - offsetY) + "px";
    pip.style.right = "auto";
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

function minimizePiP(){
    pip.classList.toggle("minimized");
}

// RESET

    pip.style.top = "80px";
    pip.style.right = "20px";
    pip.style.left = "auto";
    pip.style.width = "350px";
    pip.style.height = "220px";
    pip.classList.remove("minimized");
}

    if(!localStream) return;

    isAudioOn = !isAudioOn;
    audioTrack.enabled = isAudioOn;

    // change button text
    event.target.innerText = isAudioOn ? "🎤 Mute" : "🔇 Unmute";
}

// 📷 TOGGLE VIDEO
function toggleVideo(){

    if(!localStream) return;

    isVideoOn = !isVideoOn;
