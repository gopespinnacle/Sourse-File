<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Homework</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
}

.container{
width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div class="container">

<h2>Assign Homework</h2>

<label>Class</label>
<select id="className">
<option value="Grade-8">Grade-8</option>
<option value="Grade-9">Grade-9</option>
<option value="Grade-10">Grade-10</option>
</select>

<label>Subject</label>
<input type="text" id="subject">

<label>Homework</label>
<textarea id="homework"></textarea>

<label>Due Date</label>
<input type="date" id="dueDate">

<button onclick="submitHomework()">Assign Homework</button>

</div>

<script>

async function submitHomework(){

const token = localStorage.getItem("token");

if(!token){
alert("Teacher not logged in");
return;
}

const className = document.getElementById("className").value;
const subject = document.getElementById("subject").value;
const homework = document.getElementById("homework").value;
const dueDate = document.getElementById("dueDate").value;

try{

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/homework",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
className,
subject,
homework,
dueDate
})
});

const data = await res.json();

console.log("SERVER RESPONSE:",data);

alert(data.message);

}catch(error){

console.error("FETCH ERROR:",error);
alert("Server error");

}

}

</script>

</body>
</html>
