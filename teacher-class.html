<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Attendance</title>
</head>

<body>

<h2>Live Class Attendance</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Student</th>
<th>Status</th>
<th>Join Time</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<button onclick="submitAttendance()">Save Attendance</button>

<script>
const className = localStorage.getItem("className");
const subject = localStorage.getItem("subject");
const sessionId = localStorage.getItem("sessionId");
const token = localStorage.getItem("token");

let attendanceData = {};

/* LOAD STUDENTS + SESSION */
async function loadStudents(){

const res1 = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/today-sessions",{
headers:{ "Authorization":"Bearer "+token }
});

const data1 = await res1.json();

// find current session
const session = data1.sessions.find(s => s._id === sessionId);

// get students
const res2 = await fetch(
`https://academy-backend-eatl.onrender.com/api/auth/teacher/students?className=${className}&subject=${subject}`,
{
headers:{ "Authorization":"Bearer "+token }
});

const data2 = await res2.json();

const table = document.getElementById("studentTable");
table.innerHTML = "";

/* LOOP STUDENTS */
data2.students.forEach(s=>{

const studentId = s.student._id;
const studentName = s.student.name;

// check if online
const isOnline = session?.joinedStudents?.includes(studentId);

const status = isOnline ? "Present" : "Absent";

// save auto attendance
attendanceData[studentId] = status;

table.innerHTML += `
<tr>

<td>${studentName}</td>

<td style="color:${isOnline ? 'green':'red'}">
${isOnline ? "Online" : "Offline"}
</td>

<td>
${isOnline ? new Date().toLocaleTimeString() : "-"}
</td>

</tr>
`;

});

}

/* SAVE ATTENDANCE */
async function submitAttendance(){

for(const studentId in attendanceData){

await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/attendance",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({

studentId:studentId,
className:"Live Class",
status:attendanceData[studentId]

})
}
);

}

alert("Attendance saved");

}

/* AUTO REFRESH EVERY 5 SEC */
setInterval(loadStudents, 5000);

/* FIRST LOAD */
loadStudents();

</script>

</body>
</html>
