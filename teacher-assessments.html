<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Teacher Assessments</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:40px;
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.edit{
background:#1f7ae0;
color:white;
}

.delete{
background:#e03a3a;
color:white;
}

.send{
background:#1a8f3a;
color:white;
}

</style>

</head>

<body>

<h2>My Assessments</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Class</th>
<th>Subject</th>
<th>PDF</th>
<th>Edit</th>
<th>Delete</th>
<th>Send</th>
</tr>
</thead>

<tbody id="assessmentTable"></tbody>

</table>

<script>

const token = localStorage.getItem("token");

async function loadAssessments(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/auth/teacher/assessments",
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const table = document.getElementById("assessmentTable");

table.innerHTML="";

data.assessments.forEach(a=>{

let pdfLink = a.questionPaper
? `<a href="https://academy-backend-eatl.onrender.com/uploads/${a.questionPaper}" target="_blank">View PDF</a>`
: "No PDF";

let sendButton = a.sentToStudents
? "Sent"
: `<button class="send" onclick="sendAssessment('${a._id}')">Send</button>`;

table.innerHTML += `
<tr>

<td>${a.title}</td>

<td>${a.className}</td>

<td>${a.subject}</td>

<td>${pdfLink}</td>

<td>
<button class="edit" onclick="editAssessment('${a._id}')">
Edit
</button>
</td>

<td>
<button class="delete" onclick="deleteAssessment('${a._id}')">
Delete
</button>
</td>

<td>
${sendButton}
</td>

</tr>
`;

});

}

loadAssessments();


async function deleteAssessment(id){

if(!confirm("Delete this assessment?")) return;

await fetch(
`https://academy-backend-eatl.onrender.com/api/auth/teacher/delete-assessment/${id}`,
{
method:"DELETE",
headers:{
"Authorization":"Bearer "+token
}
});

loadAssessments();

}


async function sendAssessment(id){

await fetch(
`https://academy-backend-eatl.onrender.com/api/auth/teacher/send-assessment/${id}`,
{
method:"PUT",
headers:{
"Authorization":"Bearer "+token
}
});

alert("Assessment sent to students");

loadAssessments();

}


function editAssessment(id){

window.location.href =
"teacher-create-assessment.html?id="+id;

}

</script>

</body>
</html>
