<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Management</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="dashboard-page">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Founder Panel</h2>
    <ul>
        <li onclick="window.location.href='founder-dashboard.html'">Dashboard</li>
        <li onclick="window.location.href='founder-students.html'">Students</li>
        <li onclick="window.location.href='founder-teachers.html'">Teachers</li>
        <li class="active">Attendance</li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1>Attendance Management</h1>

<!-- Attendance Controls -->
<div class="attendance-controls">
    <select id="studentSelect">
        <option value="">Select Student</option>
    </select>

    <button onclick="submitAttendance('Present')" class="present-btn">Present</button>
    <button onclick="submitAttendance('Absent')" class="absent-btn">Absent</button>
</div>

<br>

<!-- Filter Section -->
<div class="filter-section">
    <input type="date" id="filterDate">
    <button onclick="filterByDate()">Filter Date</button>
    <button onclick="clearDateFilter()">Reset</button>

    <select id="studentFilter">
        <option value="">All Students</option>
    </select>
    <button onclick="filterByStudent()">Filter Student</button>
    <button onclick="clearStudentFilter()">Reset</button>
</div>

<br>

<h3 id="todaySummary"></h3>
<h3 id="monthlySummary"></h3>

<div class="export-section">
    <button onclick="downloadPDF()">Download PDF</button>
    <button onclick="exportExcel()">Export Excel</button>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</div>

<br>

<canvas id="attendanceChart" height="100"></canvas>

<br>

<table id="attendanceTable">
<thead>
<tr>
<th>Student</th>
<th>Status</th>
<th>Date</th>
<th>Time</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

let students = JSON.parse(localStorage.getItem("students")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

/* LOAD STUDENTS */
function loadStudents(){
    let select = document.getElementById("studentSelect");
    let filter = document.getElementById("studentFilter");

    select.innerHTML = '<option value="">Select Student</option>';
    filter.innerHTML = '<option value="">All Students</option>';

    students.forEach(student=>{
        select.innerHTML += `<option value="${student.name}">${student.name}</option>`;
        filter.innerHTML += `<option value="${student.name}">${student.name}</option>`;
    });
}

/* SAVE */
function saveAttendance(){
    localStorage.setItem("attendance", JSON.stringify(attendance));
}

/* SUBMIT */
window.submitAttendance = function(status){

    let name = document.getElementById("studentSelect").value;
    if(name===""){ alert("Select student"); return; }

    let now = new Date();
    let date = now.toLocaleDateString();
    let time = now.toLocaleTimeString("en-GB",{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    let exists = attendance.find(a=>a.name===name && a.date===date);
    if(exists){ alert("Attendance already marked today!"); return; }

    attendance.push({name,status,date,time});
    saveAttendance();
    renderAttendance();
}

/* RENDER */
function renderAttendance(){

    const tbody = document.querySelector("#attendanceTable tbody");
    tbody.innerHTML="";

    attendance.forEach((a,index)=>{

        let badge = a.status==="Present"
            ? `<span class="badge present-badge">● Present</span>`
            : `<span class="badge absent-badge">● Absent</span>`;

        let rowClass = a.status==="Present" ? "present-row" : "absent-row";

        tbody.innerHTML += `
        <tr class="${rowClass}">
            <td>${a.name}</td>
            <td id="status-${index}">${badge}</td>
            <td>${a.date}</td>
            <td>${a.time}</td>
            <td>
                <button onclick="editAttendance(${index})">Edit</button>
                <button onclick="deleteAttendance(${index})">Delete</button>
            </td>
        </tr>`;
    });

    updateTodaySummary();
    updateMonthlySummary();
    updateChart();
}

/* EDIT */
window.editAttendance = function(index){
    let td = document.getElementById(`status-${index}`);
    td.innerHTML = `
    <select onchange="updateStatus(${index}, this.value)">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select>`;
}

window.updateStatus = function(index,newStatus){
    attendance[index].status=newStatus;
    saveAttendance();
    renderAttendance();
}

/* DELETE */
window.deleteAttendance = function(index){
    if(confirm("Delete record?")){
        attendance.splice(index,1);
        saveAttendance();
        renderAttendance();
    }
}

/* FILTER DATE */
window.filterByDate = function(){
    let selectedDate = document.getElementById("filterDate").value;
    if(selectedDate===""){ renderAttendance(); return; }
    let formatted = new Date(selectedDate).toLocaleDateString();
    let filtered = attendance.filter(a=>a.date===formatted);
    displayFiltered(filtered);
}

window.clearDateFilter = function(){
    document.getElementById("filterDate").value="";
    renderAttendance();
}

/* FILTER STUDENT */
window.filterByStudent = function(){
    let name = document.getElementById("studentFilter").value;
    if(name===""){ renderAttendance(); return; }
    let filtered = attendance.filter(a=>a.name===name);
    displayFiltered(filtered);
}

window.clearStudentFilter = function(){
    document.getElementById("studentFilter").value="";
    renderAttendance();
}

function displayFiltered(data){
    const tbody = document.querySelector("#attendanceTable tbody");
    tbody.innerHTML="";
    data.forEach(record=>{
        let realIndex = attendance.indexOf(record);
        tbody.innerHTML += `
        <tr>
            <td>${record.name}</td>
            <td id="status-${realIndex}">${record.status}</td>
            <td>${record.date}</td>
            <td>${record.time}</td>
            <td>
                <button onclick="editAttendance(${realIndex})">Edit</button>
                <button onclick="deleteAttendance(${realIndex})">Delete</button>
            </td>
        </tr>`;
    });
}

/* SUMMARY */
function updateTodaySummary(){
    let today = new Date().toLocaleDateString();
    let todayRecords = attendance.filter(a=>a.date===today);
    let present = todayRecords.filter(a=>a.status==="Present").length;
    let total = students.length;
    let percent = total>0 ? ((present/total)*100).toFixed(0) : 0;

    document.getElementById("todaySummary").innerHTML =
    `Today's Attendance: ${present}/${total}
     <div class="progress">
        <div class="progress-bar" style="width:${percent}%">${percent}%</div>
     </div>`;
}

function updateMonthlySummary(){
    let now=new Date();
    let month=now.getMonth();
    let year=now.getFullYear();

    let monthRecords=attendance.filter(a=>{
        let d=new Date(a.date);
        return d.getMonth()===month && d.getFullYear()===year;
    });

    let present=monthRecords.filter(a=>a.status==="Present").length;
    document.getElementById("monthlySummary").innerText=
    "This Month Present Count: "+present;
}

/* CHART */
let chart;
function updateChart(){
    let present = attendance.filter(a=>a.status==="Present").length;
    let absent = attendance.filter(a=>a.status==="Absent").length;

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("attendanceChart"),{
        type:"doughnut",
        data:{
            labels:["Present","Absent"],
            datasets:[{
                data:[present,absent],
                backgroundColor:["#28a745","#dc3545"]
            }]
        }
    });
}

/* PDF */
window.downloadPDF = async function(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    // =========================
    // LOAD LOGO SAFELY
    // =========================
    try{
        const img = new Image();
        img.src = "images/logo.png";

        await new Promise((resolve, reject)=>{
            img.onload = resolve;
            img.onerror = reject;
        });

        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        const dataURL = canvas.toDataURL("image/png");

        doc.addImage(dataURL, "PNG", 15, 10, 30, 30);

    }catch(e){
        console.log("Logo not loaded");
    }

    // =========================
    // HEADER SECTION
    // =========================

    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text("GOPES PINNACLE ACADEMY", 105, 20, { align: "center" });

    doc.setFontSize(14);
    doc.setFont("helvetica", "normal");
    doc.text("Attendance Report", 105, 30, { align: "center" });

    doc.setFontSize(10);
    doc.text("Generated on: " + new Date().toLocaleString(), 105, 38, { align: "center" });

    doc.line(15, 45, 195, 45);

    y = 55;

    // =========================
    // TABLE HEADER
    // =========================

    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);

    doc.text("Student", 20, y);
    doc.text("Status", 80, y);
    doc.text("Date", 120, y);
    doc.text("Time", 160, y);

    doc.line(15, y + 3, 195, y + 3);

    y += 12;

    // =========================
    // TABLE CONTENT
    // =========================

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);

    attendance.forEach(a => {

        if(y > 270){
            doc.addPage();
            y = 20;
        }

        doc.text(a.name, 20, y);
        doc.text(a.status, 80, y);
        doc.text(a.date, 120, y);
        doc.text(a.time, 160, y);

        y += 10;
    });

    // =========================
    // FOOTER
    // =========================

    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text("Confidential Document - Gopes Pinnacle Academy", 105, 285, { align: "center" });

    doc.save("Gopes_Pinnacle_Attendance_Report.pdf");
}

/* EXCEL */
window.exportExcel = function(){
    let ws = XLSX.utils.json_to_sheet(attendance);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Attendance");
    XLSX.writeFile(wb,"attendance.xlsx");
}

/* DARK MODE */
window.toggleDarkMode = function(){
    document.body.classList.toggle("dark-mode");
}

loadStudents();
renderAttendance();

});
</script>

</body>
</html>
