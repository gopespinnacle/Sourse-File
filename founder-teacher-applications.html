<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Applications</title>
</head>

<body>

<h2>Teacher Applications</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Experience</th>
<th>Resume</th>
<th>Action</th>
</tr>
</thead>

<tbody id="appTable"></tbody>

</table>

<!-- ✅ PDF VIEWER -->
<div id="resumeViewer" style="margin-top:20px;">
    <iframe id="pdfFrame" width="100%" height="600px" style="border:none;"></iframe>
</div>

<script>

async function loadApplications(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/founder/teacher-applications");
const data = await res.json();

const table = document.getElementById("appTable");
table.innerHTML = "";

data.applications.forEach(app => {

table.innerHTML += `
<tr>
<td>${app.teacherName}</td>
<td>${app.mobile}</td>
<td>${app.email}</td>
<td>${app.experience}</td>

<td>
<button onclick="viewResume('${app.resume}')">
View Resume
</button>
</td>

<td>
<button onclick="deleteApp('${app._id}')">Delete</button>
</td>

</tr>
`;

});

}

function viewResume(url){
    document.getElementById("pdfFrame").src = url;
}

async function deleteApp(id){

const confirmDelete = confirm("Delete this application?");
if(!confirmDelete) return;

await fetch("https://academy-backend-eatl.onrender.com/api/founder/teacher-application/" + id, {
method: "DELETE"
});

loadApplications();

}

loadApplications();

</script>

</body>
</html>
