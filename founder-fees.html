<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Fee</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}
.section{background:white;padding:20px;margin-bottom:30px;border-radius:10px;}
h2{margin-top:0}
input,select{padding:8px;margin:5px;width:100%;}
button{padding:8px 15px;background:#123a63;color:white;border:none;border-radius:5px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th{background:#123a63;color:white;padding:10px;}
td{padding:8px;text-align:center;border-bottom:1px solid #eee;}
</style>
</head>

<body class="dashboard-page">
    <div id="sidebar-container"></div>

<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data => {

document.getElementById("sidebar-container").innerHTML = data;

highlightMenu();

});

function highlightMenu(){

const currentPage = window.location.pathname.split("/").pop();

const items = document.querySelectorAll(".sidebar li");

items.forEach(item => {

if(item.getAttribute("data-page") === currentPage){

item.classList.add("active-menu");

}

});

}

function navigate(page){
window.location.href = page;
}
</script>
<div class="main-content">
<div style="
    background:linear-gradient(90deg,#123a63,#1f4e91);
    padding:18px;
    border-radius:10px;
    margin-bottom:25px;
">
    <h1 style="
        color:white;
        margin:0;
        font-size:24px;
        font-weight:600;
    ">
        Student Fees
    </h1>
</div>


<!-- ADD PLAN -->
<div class="section">
<h2>Add Fee Plan</h2>

<label>Grade</label>
<input type="text" id="grade">

<label>Plan Type</label>
<select id="planType">
<option value="Monthly">Monthly</option>
<option value="Quarterly">Quarterly</option>
<option value="Yearly">Yearly</option>
</select>

<label>Base Amount</label>
<input type="number" id="baseAmount">

<label>Installments</label>
<input type="number" id="installments" value="1">

<button onclick="addPlan()">Add Plan</button>

<table>
<thead>
<tr>
<th>Grade</th>
<th>Type</th>
<th>Total</th>
<th>Installment</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="planTable"></tbody>
</table>
</div>

<!-- STUDENT COLLECTION -->
<div class="section">
<h2>Student Fee Collection</h2>

<label>Select Student</label>
<select id="studentSelect" onchange="loadPlansForStudent()"></select>

<label>Select Plan</label>
<select id="planSelect"></select>

<label>Pay Amount</label>
<input type="number" id="payAmount">

<button onclick="collectFee()">Collect</button>

<table>
<thead>
<tr>
<th>Student</th>
<th>Total</th>
<th>Paid</th>
<th>Balance</th>
<th>Receipt</th>
</tr>
</thead>
<tbody id="collectionTable"></tbody>
</table>
</div>

<script>

// LOAD STORAGE
let students = JSON.parse(localStorage.getItem("students")) || [];
let feePlans = JSON.parse(localStorage.getItem("feePlans")) || [];
let collections = JSON.parse(localStorage.getItem("collections")) || [];

/* ================= ADD PLAN ================= */

function addPlan(){

    let grade = document.getElementById("grade").value.trim();
    let type = document.getElementById("planType").value;
    let base = Number(document.getElementById("baseAmount").value);
    let inst = Number(document.getElementById("installments").value);

    if(!grade || !base){
        alert("Fill required fields");
        return;
    }

    let total = base;
    if(type==="Quarterly") total*=3;
    if(type==="Yearly") total*=12;

    let installmentAmount = total/inst;

    feePlans.push({grade,type,total,installmentAmount});
    localStorage.setItem("feePlans",JSON.stringify(feePlans));

    renderPlans();
    alert("Plan Added Successfully");
}

/* ================= RENDER PLANS ================= */

function renderPlans(){
    let tbody=document.getElementById("planTable");
    tbody.innerHTML="";

    feePlans.forEach((p,i)=>{
        tbody.innerHTML+=`
        <tr>
        <td>${p.grade}</td>
        <td>${p.type}</td>
        <td>₹ ${p.total}</td>
        <td>₹ ${p.installmentAmount.toFixed(0)}</td>
        <td><button onclick="deletePlan(${i})">Delete</button></td>
        </tr>`;
    });
}

/* ================= DELETE PLAN ================= */

function deletePlan(i){
    feePlans.splice(i,1);
    localStorage.setItem("feePlans",JSON.stringify(feePlans));
    renderPlans();
}

/* ================= LOAD STUDENTS ================= */

function loadStudents(){
    let select=document.getElementById("studentSelect");
    select.innerHTML="<option value=''>Select Student</option>";

    students.forEach(s=>{
        select.innerHTML+=
        `<option value="${s.name}|${s.grade}">${s.name}</option>`;
    });
}

/* ================= LOAD PLANS FOR SELECTED STUDENT ================= */

function loadPlansForStudent(){

    let value=document.getElementById("studentSelect").value;
    if(!value) return;

    let grade=value.split("|")[1];

    let planSelect=document.getElementById("planSelect");
    planSelect.innerHTML="<option value=''>Select Plan</option>";

    feePlans.filter(p=>String(p.grade) === String(grade))
    .forEach(p=>{
        planSelect.innerHTML+=
        `<option value="${p.total}">${p.type} - ₹${p.total}</option>`;
    });
}

/* ================= COLLECT FEE ================= */

function collectFee(){

    let studentValue=document.getElementById("studentSelect").value;
    let total=Number(document.getElementById("planSelect").value);
    let paid=Number(document.getElementById("payAmount").value);

    if(!studentValue || !total || !paid){
        alert("Fill required fields");
        return;
    }

    let name=studentValue.split("|")[0];
    let balance=total-paid;

    collections.push({name,total,paid,balance});
    localStorage.setItem("collections",JSON.stringify(collections));

    renderCollections();
}

/* ================= RENDER COLLECTIONS ================= */

function renderCollections(){
    let tbody=document.getElementById("collectionTable");
    tbody.innerHTML="";

    collections.forEach((c,i)=>{

        let student = students.find(s=>s.name === c.name);
        let mobile = student ? student.mobile : "";

        tbody.innerHTML+=`
        <tr>
        <td>${c.name}</td>
        <td>₹ ${c.total}</td>
        <td>₹ ${c.paid}</td>
        <td>₹ ${c.balance}</td>
        <td>
            <button onclick="generatePDF(${i})">PDF</button>
            <button onclick="sendWhatsApp(${i}, '${mobile}')">
                WhatsApp
            </button>
        </td>
        </tr>`;
    });
}


/* ================= PDF ================= */

function generatePDF(i){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let c = collections[i];

    let total = parseFloat(c.total) || 0;
    let paid = parseFloat(c.paid) || 0;
    let balance = parseFloat(c.balance) || 0;

    /* ===== OUTER BORDER ===== */
    doc.setDrawColor(30, 60, 120);   // Dark Blue Border
    doc.setLineWidth(1.5);
    doc.rect(10, 10, 190, 277);      // Full page border

    /* ===== HEADER ===== */
    doc.setFont("times","bold");
    doc.setFontSize(22);
    doc.setTextColor(18,58,99);      // Dark Blue Title
    doc.text("GOPES PINNACLE ACADEMY", 105, 30, { align: "center" });

    doc.setFont("times","normal");
    doc.setFontSize(14);
    doc.setTextColor(0,0,0);
    doc.text("Fee Receipt", 105, 42, { align: "center" });


    /* ===== STUDENT DETAILS ===== */
    doc.setFontSize(12);

    doc.text(`Student Name : ${c.name}`, 25, 70);
    doc.text(`Total Amount : Rs ${total.toLocaleString()}`, 25, 90);
    doc.text(`Paid Amount  : Rs ${paid.toLocaleString()}`, 25, 110);
    doc.text(`Balance      : Rs ${balance.toLocaleString()}`, 25, 130);

    /* Divider Line */
    doc.setDrawColor(200);
    doc.line(25,150,185,150);

    /* Footer */
    doc.setFontSize(11);
    doc.text("Thank you for your payment.", 25, 170);

    doc.save(c.name.replace(/\s/g,"_") + "_Receipt.pdf");
}
function sendWhatsApp(i, mobile){

    if(!mobile){
        alert("Parent mobile number not found");
        return;
    }

    let c = collections[i];

    let message =
`GOPES PINNACLE ACADEMY
Fee Receipt

Student: ${c.name}
Total: Rs ${c.total}
Paid: Rs ${c.paid}
Balance: Rs ${c.balance}

Thank you.`;

    let encodedMessage = encodeURIComponent(message);

    let whatsappURL = `https://wa.me/91${mobile}?text=${encodedMessage}`;

    window.open(whatsappURL, "_blank");
}

/* ================= INIT ================= */

renderPlans();
renderCollections();
loadStudents();

</script>
</div>
</body>
</html>
