<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Founder Login</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-page">


<div class="login-box">

    <img src="images/logo.png">
    <h2>Founder Login</h2>

    <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="text" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="remember">
        <input type="checkbox"> Remember Me
    </div>

  <button type="button" class="login-btn" onclick="loginUser()">
  Log In
</button>
<p>
  Don’t have an account? 
  <a href="founder-register.html">Register Here</a>
</p>
    <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="#">Create Account</a>
    </div>

</div>
<script>
console.log("SCRIPT LOADED ✅");

function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("LOGIN CLICKED", email, password);

  fetch("https://academy-backend-eatl.onrender.com/api/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {
  console.log("SUCCESS:", data);

  if (data.message === "Login successful") {

    // ✅ ADD THIS LINE (VERY IMPORTANT)
    localStorage.setItem("token", data.token);

    alert("Login Success ✅");

    window.location.href = "./founder-dashboard.html";
  } else {
    alert("Login Failed ❌");
  }
})
  .catch(err => {
    console.error("ERROR:", err);
    alert("Server error ❌");
  });
}
</script>
</body>
</html>
