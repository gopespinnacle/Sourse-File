<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Classes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: 'Segoe UI';
    background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
}

.sidebar h2 {
    text-align:center;
    padding:20px;
}

.sidebar ul {
    list-style:none;
    padding:0;
}

.sidebar ul li {
    padding:15px;
    cursor:pointer;
}

.sidebar ul li:hover {
    background:#1e293b;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
}

.timetable-container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 15px;
}

.day-column {
background: #f8fafc;
border-radius: 12px;
padding: 10px;
}

.day-header {
background: #2c3e50;
color: white;
padding: 6px;
text-align:center;
border-radius: 6px;
margin-bottom: 8px;
}

.period-card {
background: linear-gradient(135deg, #4f46e5, #3b82f6);
color: white;
padding: 10px;
border-radius: 10px;
margin-bottom: 10px;
cursor:pointer;
}

/* STATUS COLORS */
.live { border-left:4px solid #00e676; }
.upcoming { border-left:4px solid #ffeb3b; }
.completed { border-left:4px solid #9e9e9e; }
.disabled { opacity:0.4; }

</style>
</head>

<body>

<div class="sidebar">
<h2>Student ERP</h2>
<ul>
<li onclick="go('student-dashboard.html')">🏠 Dashboard</li>
<li>📅 My Classes</li>
<li onclick="go('student-homework.html')">📘 Homework</li>
<li onclick="go('student-results.html')">📊 Results</li>
<li onclick="logout()">🚪 Logout</li>
</ul>
</div>

<div class="main">

<h2>My Timetable</h2>

<div id="timetable"></div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href = "student-login.html";
}

/* ================= LOAD TIMETABLE ================= */

async function loadTimetable(){

const res = await fetch(
"https://academy-backend-eatl.onrender.com/api/student/my-timetable",
{
headers:{
"Authorization":"Bearer " + token
}
}
);

const data = await res.json();

renderGrid(data.data || []);

}

/* ================= STATUS ================= */

function getStatus(day, startTime, endTime){

const now = new Date();

const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const today = days[now.getDay()];

if(day !== today) return "disabled";

const [sh, sm] = startTime.split(":");
const [eh, em] = endTime.split(":");

const start = new Date();
start.setHours(sh, sm, 0);

const end = new Date();
end.setHours(eh, em, 0);

if(now >= start && now <= end) return "live";
if(now < start) return "upcoming";

return "completed";
}

/* ================= UI ================= */

function renderGrid(schedule){

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const container = document.getElementById("timetable");
container.innerHTML = "";
container.className = "timetable-container";

/* GROUP */
const grouped = {};
days.forEach(d => grouped[d] = []);

schedule.forEach(s=>{
grouped[s.day].push(s);
});

/* BUILD */
days.forEach(day=>{

const col = document.createElement("div");
col.className = "day-column";

col.innerHTML = `<div class="day-header">${day}</div>`;

grouped[day].forEach(s=>{

const status = getStatus(s.day, s.startTime, s.endTime);

const div = document.createElement("div");
div.className = "period-card " + status;

/* CLICK JOIN */
div.onclick = () => {

window.location.href =
"student-period.html?" +
"className=" + encodeURIComponent(s.className) +
"&subject=" + encodeURIComponent(s.subject || "") +
"&day=" + encodeURIComponent(s.day) +
"&startTime=" + encodeURIComponent(s.startTime) +
"&endTime=" + encodeURIComponent(s.endTime) +
"&sessionId=" + encodeURIComponent(s._id);

};

div.innerHTML = `
<div><b>${s.className}</b></div>
<div>📘 ${s.subject || "General"}</div>
<div>⏰ ${s.startTime} - ${s.endTime}</div>
`;

col.appendChild(div);

});

container.appendChild(col);

});

}

/* ================= NAV ================= */

function logout(){
localStorage.clear();
window.location.href = "student-login.html";
}

function go(page){
window.location.href = page;
}

/* AUTO REFRESH */
setInterval(loadTimetable, 10000);

loadTimetable();

</script>

</body>
</html>
