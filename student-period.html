<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Class</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family:'Segoe UI';
    background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
}

.sidebar h2 {
    text-align:center;
    padding:20px;
}

.sidebar ul {
    list-style:none;
    padding:0;
}

.sidebar ul li {
    padding:15px;
    cursor:pointer;
}

.sidebar ul li:hover {
    background:#1e293b;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:20px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:10px;
}

.join { background:green; color:white; }
.disabled { background:gray; color:white; }

</style>
</head>

<body>

<div class="sidebar">
<h2>Student ERP</h2>
<ul>
<li onclick="go('student-dashboard.html')">🏠 Dashboard</li>
<li onclick="go('student-class.html')">📅 My Classes</li>
<li onclick="go('student-homework.html')">📘 Homework</li>
<li onclick="go('student-results.html')">📊 Results</li>
<li onclick="logout()">🚪 Logout</li>
</ul>
</div>

<div class="main">

<h2>Class Details</h2>

<div class="card" id="classInfo"></div>

<div class="card">
<button class="btn join" onclick="joinClass()">Join Class</button>
</div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
    window.location.href = "student-login.html";
}

/* GET PARAMS */
const params = new URLSearchParams(window.location.search);
const className = params.get("className");
const subject = params.get("subject");
const day = params.get("day");
const startTime = params.get("startTime");
const endTime = params.get("endTime");

/* DISPLAY CLASS INFO */
document.getElementById("classInfo").innerHTML = `
<b>🏫 ${className}</b><br>
📘 ${subject}<br>
📅 ${day}<br>
⏰ ${formatTime(startTime)} - ${formatTime(endTime)}
`;

/* ================= JOIN CLASS ================= */

async function joinClass(){

        const studentId = localStorage.getItem("studentId");

    const res = await fetch(
    "https://academy-backend-eatl.onrender.com/api/student-attendance/mark",
    {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body: JSON.stringify({
            studentId,
            className,
            subject,
            day,
            startTime,
            endTime
        })
    });

    const data = await res.json();

    alert(data.message);

    
}

/* ================= NAV ================= */

function logout(){
    localStorage.clear();
    window.location.href = "student-login.html";
}

function go(page){
    window.location.href = page;
}

/* AUTO LOAD */

function formatTime(time){

    let [hour, minute] = time.split(":");

    hour = parseInt(hour);

    let ampm = hour >= 12 ? "PM" : "AM";

    hour = hour % 12;
    hour = hour ? hour : 12; // 0 → 12

    return hour + ":" + minute + " " + ampm;
}
</script>

</body>
</html>
