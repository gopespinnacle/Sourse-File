<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Live Camera Monitor</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

img{
width:100%;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Live Exam Cameras</h2>

<div class="grid" id="cameraGrid"></div>

<script>

const params = new URLSearchParams(window.location.search);
const assessmentId = params.get("assessmentId");

const token = localStorage.getItem("token");

async function loadCameras(){

const res = await fetch(
"http://academy-backend-jpup.onrender.com/api/auth/teacher/exam-cameras/"+assessmentId,
{
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

const grid = document.getElementById("cameraGrid");

grid.innerHTML="";

data.cameras.forEach(c=>{

grid.innerHTML += `

<div class="card">

<h4>${c.student.name}</h4>

<img src="${c.image}">

</div>

`;

});

}

loadCameras();

setInterval(loadCameras,3000);

</script>

</body>
</html>
