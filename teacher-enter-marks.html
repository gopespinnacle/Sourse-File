<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Enter Student Marks</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
padding:40px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:30px;
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#123a63;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#123a63;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<h2>Enter Marks</h2>

<label>Select Assessment</label> <select id="assessmentSelect"></select>

</div>

<table>

<thead>

<tr>
<th>Student</th>
<th>Marks</th>
<th>Submit</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

<script>

const token = localStorage.getItem("token");


/* LOAD ASSESSMENTS */

async function loadAssessments(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/assessments",{

headers:{
"Authorization":"Bearer "+token
}

});

const data = await res.json();

const select = document.getElementById("assessmentSelect");

data.assessments.forEach(a=>{

select.innerHTML +=
`<option value="${a._id}">${a.title} - ${a.className}</option>`;

});

}

loadAssessments();


/* LOAD STUDENTS */

async function loadStudents(){

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/students",{

headers:{
"Authorization":"Bearer "+token
}

});

const data = await res.json();

const table = document.getElementById("studentTable");

table.innerHTML="";

data.students.forEach(s=>{

table.innerHTML += `

<tr>

<td>${s.name}</td>

<td>
<input type="number" id="marks-${s._id}">
</td>

<td>
<button onclick="submitMarks('${s._id}')">Save</button>
</td>

</tr>

`;

});

}

loadStudents();


/* SUBMIT MARKS */

async function submitMarks(studentId){

const assessmentId = document.getElementById("assessmentSelect").value;

const marks = document.getElementById("marks-"+studentId).value;

const res = await fetch("https://academy-backend-eatl.onrender.com/api/auth/teacher/submit-marks",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({

assessmentId:assessmentId,
studentId:studentId,
marksObtained:marks

})

});

const data = await res.json();

alert(data.message);

}

</script>

</body>
</html>
